<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AIDC Collector — 预设筛选</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1E3A5F;
      --primary-light: #2C5282;
      --accent: #E8843C;
      --accent-hover: #D06E28;
      --success: #2D9E6C;
      --success-bg: #D1FAE5;
      --warning: #D97706;
      --warning-bg: #FEF3C7;
      --danger: #DC2626;
      --danger-bg: #FEE2E2;
      --info: #3B82F6;
      --info-bg: #EFF6FF;
      --bg: #F4F6F9;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --text: #1A202C;
      --text-muted: #64748B;
      --text-light: #94A3B8;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }

    .phone-frame {
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* 导航栏 */
    .nav-bar {
      background: var(--primary);
      color: #fff;
      padding: 44px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-bar .nav-back {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
    }
    .nav-bar .nav-back:hover { background: rgba(255,255,255,0.12); }
    .nav-bar .nav-title { font-size: 17px; font-weight: 700; }
    .nav-bar .nav-action {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      background: rgba(255,255,255,0.15);
    }
    .nav-bar .nav-action:hover { background: rgba(255,255,255,0.25); }

    /* 内容区 */
    .content { flex: 1; padding: 16px; padding-bottom: 20px; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state svg { width: 64px; height: 64px; color: var(--text-light); margin-bottom: 16px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .empty-state .btn {
      padding: 12px 24px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* 预设列表 */
    .preset-list { display: flex; flex-direction: column; gap: 12px; }
    .preset-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .preset-card:hover { box-shadow: var(--shadow-md); }
    .preset-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .preset-name { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .preset-name svg { width: 18px; height: 18px; color: var(--primary); }
    .preset-actions { display: flex; gap: 4px; }
    .preset-actions button {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preset-actions button:hover { background: var(--bg); color: var(--text); }
    .preset-actions button.danger:hover { background: var(--danger-bg); color: var(--danger); }

    .preset-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      background: var(--bg);
      border-radius: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .filter-tag.active { background: var(--primary); color: #fff; }
    .filter-tag .label { margin-right: 4px; color: var(--text-light); }
    .filter-tag .value { color: var(--text); font-weight: 500; }
    .filter-tag.active .label, .filter-tag.active .value { color: #fff; }

    .preset-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-light);
    }
    .preset-meta span { display: flex; align-items: center; gap: 4px; }
    .preset-meta svg { width: 14px; height: 14px; }

    /* 新增/编辑弹窗 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      width: 100%;
      max-width: 390px;
      background: var(--card);
      border-radius: 16px 16px 0 0;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h3 { font-size: 17px; font-weight: 700; }
    .modal-header button {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-muted);
    }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
    }
    .form-input:focus { outline: none; border-color: var(--primary); }

    .filter-group { margin-bottom: 16px; }
    .filter-group-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
    .filter-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-pill {
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }
    .filter-pill:hover { border-color: var(--primary); }
    .filter-pill.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

    .modal-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .modal-footer .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .modal-footer .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .modal-footer .btn-primary { background: var(--primary); color: #fff; }

    /* Toast 提示 */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: #fff;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-size: 14px;
      z-index: 300;
      transition: transform 0.3s;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="phone-frame">
    <!-- 导航栏 -->
    <div class="nav-bar">
      <div class="nav-back" onclick="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </div>
      <div class="nav-title">预设筛选</div>
      <div class="nav-action" onclick="openModal()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
    </div>

    <div class="content">
      <!-- 空状态 -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 3H2l8 9.46V19l4 2v-7.54L22 3z"/>
        </svg>
        <h3>还没有预设筛选</h3>
        <p>创建常用筛选条件，一键快速筛选机房</p>
        <button class="btn" onclick="openModal()">创建预设</button>
      </div>

      <!-- 预设列表 -->
      <div class="preset-list" id="presetList"></div>
    </div>
  </div>

  <!-- 新增/编辑弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">新建预设筛选</h3>
        <button onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">预设名称</label>
          <input type="text" class="form-input" id="presetName" placeholder="如：新加坡 Tier III 待考察">
        </div>

        <div class="filter-group">
          <div class="filter-group-title">城市</div>
          <div class="filter-pills">
            <button class="filter-pill" data-filter="city" data-value="新加坡">新加坡</button>
            <button class="filter-pill" data-filter="city" data-value="曼谷">曼谷</button>
            <button class="filter-pill" data-filter="city" data-value="吉隆坡">吉隆坡</button>
            <button class="filter-pill" data-filter="city" data-value="雅加达">雅加达</button>
            <button class="filter-pill" data-filter="city" data-value="胡志明市">胡志明市</button>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Tier 等级</div>
          <div class="filter-pills">
            <button class="filter-pill" data-filter="tier" data-value="Tier I">Tier I</button>
            <button class="filter-pill" data-filter="tier" data-value="Tier II">Tier II</button>
            <button class="filter-pill" data-filter="tier" data-value="Tier III">Tier III</button>
            <button class="filter-pill" data-filter="tier" data-value="Tier IV">Tier IV</button>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">考察状态</div>
          <div class="filter-pills">
            <button class="filter-pill" data-filter="visitStatus" data-value="unvisited">未考察</button>
            <button class="filter-pill" data-filter="visitStatus" data-value="scheduled">已安排</button>
            <button class="filter-pill" data-filter="visitStatus" data-value="visited">已考察</button>
            <button class="filter-pill" data-filter="visitStatus" data-value="not_required">无需考察</button>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">录入人</div>
          <div class="filter-pills">
            <button class="filter-pill" data-filter="collector" data-value="陈思远">陈思远</button>
            <button class="filter-pill" data-filter="collector" data-value="王明">王明</button>
            <button class="filter-pill" data-filter="collector" data-value="李婷婷">李婷婷</button>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">客户跟进状态</div>
          <div class="filter-pills">
            <button class="filter-pill" data-filter="customerStatus" data-value="初步沟通">初步沟通</button>
            <button class="filter-pill" data-filter="customerStatus" data-value="方案已发">方案已发</button>
            <button class="filter-pill" data-filter="customerStatus" data-value="谈判中">谈判中</button>
            <button class="filter-pill" data-filter="customerStatus" data-value="已签约">已签约</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="savePreset()">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已保存</div>

  <script>
    // 模拟预设数据
    let presets = [
      {
        id: '1',
        name: '新加坡 Tier III 待考察',
        filters: { city: '新加坡', tier: 'Tier III', visitStatus: 'unvisited' },
        useCount: 12,
        createdAt: '2026-04-01'
      },
      {
        id: '2',
        name: '我的记录',
        filters: { collector: '陈思远' },
        useCount: 45,
        createdAt: '2026-03-15'
      },
      {
        id: '3',
        name: '高优先客户',
        filters: { customerStatus: '谈判中' },
        useCount: 8,
        createdAt: '2026-04-05'
      }
    ];

    let editingId = null;
    let selectedFilters = {};

    function goBack() {
      window.history.back();
    }

    function renderPresets() {
      const list = document.getElementById('presetList');
      const empty = document.getElementById('emptyState');

      if (presets.length === 0) {
        empty.style.display = 'block';
        list.innerHTML = '';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = presets.map(p => {
        const tags = Object.entries(p.filters).map(([key, val]) => {
          const labels = {
            city: '城市',
            tier: '等级',
            visitStatus: '考察',
            collector: '录入人',
            customerStatus: '客户'
          };
          return '<span class="filter-tag"><span class="label">' + (labels[key] || key) + ':</span><span class="value">' + val + '</span></span>';
        }).join('');

        return '<div class="preset-card" onclick="applyPreset(\'' + p.id + '\')">' +
          '<div class="preset-header">' +
            '<div class="preset-name">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-7.54L22 3z"/></svg>' +
              p.name +
            '</div>' +
            '<div class="preset-actions">' +
              '<button onclick="event.stopPropagation();editPreset(\'' + p.id + '\')" title="编辑">' +
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
              '</button>' +
              '<button class="danger" onclick="event.stopPropagation();deletePreset(\'' + p.id + '\')" title="删除">' +
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>' +
              '</button>' +
            '</div>' +
          '</div>' +
          '<div class="preset-tags">' + tags + '</div>' +
          '<div class="preset-meta">' +
            '<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>使用 ' + p.useCount + ' 次</span>' +
            '<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + p.createdAt + '</span>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function openModal(id) {
      editingId = id || null;
      selectedFilters = {};

      document.getElementById('modalTitle').textContent = editingId ? '编辑预设筛选' : '新建预设筛选';
      document.getElementById('presetName').value = editingId ? presets.find(p => p.id === editingId)?.name || '' : '';

      // 重置筛选按钮
      document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('selected'));

      // 如果是编辑，回显选中状态
      if (editingId) {
        const preset = presets.find(p => p.id === editingId);
        if (preset) {
          Object.entries(preset.filters).forEach(([filter, value]) => {
            const btn = document.querySelector('.filter-pill[data-filter="' + filter + '"][data-value="' + value + '"]');
            if (btn) {
              btn.classList.add('selected');
              selectedFilters[filter] = value;
            }
          });
        }
      }

      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
    }

    // 筛选按钮点击
    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', function() {
        const filter = this.dataset.filter;
        const value = this.dataset.value;

        // 取消同组其他选中
        document.querySelectorAll('.filter-pill[data-filter="' + filter + '"]').forEach(b => {
          if (b !== this) b.classList.remove('selected');
        });

        this.classList.toggle('selected');

        if (this.classList.contains('selected')) {
          selectedFilters[filter] = value;
        } else {
          delete selectedFilters[filter];
        }
      });
    });

    function savePreset() {
      const name = document.getElementById('presetName').value.trim();
      if (!name) {
        showToast('请输入预设名称');
        return;
      }

      if (Object.keys(selectedFilters).length === 0) {
        showToast('请选择至少一个筛选条件');
        return;
      }

      if (editingId) {
        const idx = presets.findIndex(p => p.id === editingId);
        if (idx >= 0) {
          presets[idx].name = name;
          presets[idx].filters = { ...selectedFilters };
        }
        showToast('已更新');
      } else {
        presets.unshift({
          id: Date.now().toString(),
          name: name,
          filters: { ...selectedFilters },
          useCount: 0,
          createdAt: new Date().toISOString().split('T')[0]
        });
        showToast('已保存');
      }

      closeModal();
      renderPresets();
    }

    function editPreset(id) {
      openModal(id);
    }

    function deletePreset(id) {
      if (confirm('确定删除这个预设筛选吗？')) {
        presets = presets.filter(p => p.id !== id);
        renderPresets();
        showToast('已删除');
      }
    }

    function applyPreset(id) {
      const preset = presets.find(p => p.id === id);
      if (preset) {
        preset.useCount++;
        showToast('已应用：' + preset.name);
        // 实际应用时跳转到列表页并带上筛选参数
        // window.location.href = 'list.html?filter=' + encodeURIComponent(JSON.stringify(preset.filters));
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 初始化
    renderPresets();
  </script>
</body>
</html>
