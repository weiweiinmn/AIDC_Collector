<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机房列表 - AIDC Collector</title>
    <link rel="stylesheet" href="shared.css?v=20260410t1845">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-brand">
            <div class="nav-brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></svg>
            </div>
            <span>AIDC Collector</span>
        </div>
        <div class="nav-menu">
            <a href="dashboard-v2.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                仪表盘
            </a>
            <a href="datacenter-list.html" class="nav-item active">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                机房列表
            </a>
            <a href="datacenter-form.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                添加机房
            </a>
            <a href="datacenter-import.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                导入导出
            </a>
        </div>
        <div class="nav-right">
            <div class="nav-user">
                <div class="nav-avatar">管</div>
                <span>管理员</span>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1 class="page-title">
                <div class="page-title-icon brand">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </div>
                机房列表
            </h1>
            <div class="page-actions">
                <button class="btn btn-secondary" onclick="exportData()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    导出
                </button>
                <a href="datacenter-form.html" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新增机房
                </a>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon brand">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">机房总数</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon success">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="stat-collected">0</div>
                    <div class="stat-label">已收录</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon warning">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="stat-today">0</div>
                    <div class="stat-label">今日新增</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon info">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="stat-month">0</div>
                    <div class="stat-label">本月新增</div>
                </div>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-group">
                    <label class="filter-label">关键词搜索</label>
                    <div class="search-box">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="search-keyword" class="form-input" placeholder="搜索机房名称、地址..." onkeyup="handleSearch(event)">
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">状态</label>
                    <select id="filter-status" class="form-input form-select">
                        <option value="">全部状态</option>
                        <option value="new">新增</option>
                        <option value="collected">已收录</option>
                        <option value="pending">待核实</option>
                        <option value="rejected">已驳回</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">区域</label>
                    <select id="filter-region" class="form-input form-select">
                        <option value="">全部区域</option>
                        <option value="华北">华北</option>
                        <option value="东北">东北</option>
                        <option value="华东">华东</option>
                        <option value="华中">华中</option>
                        <option value="华南">华南</option>
                        <option value="西南">西南</option>
                        <option value="西北">西北</option>
                    </select>
                </div>
                <div class="filter-group" style="flex-direction: row; align-items: flex-end;">
                    <button class="btn btn-primary btn-sm" onclick="applyFilters()">搜索</button>
                    <button class="btn btn-secondary btn-sm" onclick="resetFilters()" style="margin-left: 6px;">重置</button>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="data-table-wrapper">
            <div class="table-header">
                <span class="table-title">机房数据</span>
                <span class="table-meta">共 <strong id="record-count">0</strong> 条记录</span>
            </div>
            <div id="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" id="select-all"></th>
                            <th>机房名称</th>
                            <th>区域</th>
                            <th>地址</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th style="text-align: right;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
                <div id="empty-state" class="empty-state" style="display: none;">
                    <div class="empty-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </div>
                    <div class="empty-title">暂无机房数据</div>
                    <div class="empty-desc">点击"新增机房"按钮添加第一条记录，或导入现有数据</div>
                    <a href="datacenter-form.html" class="btn btn-primary">新增机房</a>
                </div>
            </div>
            <div class="pagination-wrapper">
                <div class="pagination-info">
                    显示第 <span id="page-start">0</span>-<span id="page-end">0</span> 条，共 <span id="total-count">0</span> 条
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </main>

    <!-- 确认删除对话框 -->
    <div id="delete-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-title">确认删除</div>
            <div class="modal-desc">确定要删除这条机房记录吗？此操作不可恢复。</div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            STORAGE_KEY: 'aidc_datacenters',
            PAGE_SIZE: 20,
            STATUS_MAP: { 'new': '新增', 'collected': '已收录', 'pending': '待核实', 'rejected': '已驳回' }
        };

        let currentPage = 1;
        let currentData = [];
        let deleteTargetId = null;
        let selectedIds = new Set();

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            initEventListeners();
        });

        function initEventListeners() {
            document.getElementById('select-all').addEventListener('change', (e) => {
                if (e.target.checked) { currentData.forEach(item => selectedIds.add(item.id)); }
                else { selectedIds.clear(); }
                renderTable();
            });
            document.getElementById('filter-status').addEventListener('change', applyFilters);
            document.getElementById('filter-region').addEventListener('change', applyFilters);
        }

        function loadData() {
            const stored = localStorage.getItem(CONFIG.STORAGE_KEY);
            currentData = stored ? JSON.parse(stored) : [];
            updateStats();
            applyFilters();
        }

        function saveData() {
            localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(currentData));
            updateStats();
        }

        function updateStats() {
            const today = new Date().toDateString();
            const monthStart = new Date();
            monthStart.setDate(1);
            monthStart.setHours(0, 0, 0, 0);

            document.getElementById('stat-total').textContent = currentData.length;
            document.getElementById('stat-collected').textContent = currentData.filter(d => d.status === 'collected').length;
            document.getElementById('stat-today').textContent = currentData.filter(d => new Date(d.createdAt).toDateString() === today).length;
            document.getElementById('stat-month').textContent = currentData.filter(d => new Date(d.createdAt) >= monthStart).length;
        }

        function handleSearch(e) { if (e.key === 'Enter') applyFilters(); }

        function applyFilters() {
            const keyword = document.getElementById('search-keyword').value.toLowerCase().trim();
            const status = document.getElementById('filter-status').value;
            const region = document.getElementById('filter-region').value;

            let filtered = currentData;
            if (keyword) filtered = filtered.filter(d => (d.name && d.name.toLowerCase().includes(keyword)) || (d.address && d.address.toLowerCase().includes(keyword)));
            if (status) filtered = filtered.filter(d => d.status === status);
            if (region) filtered = filtered.filter(d => d.region === region);

            document.getElementById('record-count').textContent = filtered.length;
            document.getElementById('total-count').textContent = filtered.length;

            const start = (currentPage - 1) * CONFIG.PAGE_SIZE;
            const end = start + CONFIG.PAGE_SIZE;
            const pageData = filtered.slice(start, end);

            document.getElementById('page-start').textContent = filtered.length > 0 ? start + 1 : 0;
            document.getElementById('page-end').textContent = Math.min(end, filtered.length);

            renderTable(pageData, filtered);
            renderPagination(filtered.length);
        }

        function resetFilters() {
            document.getElementById('search-keyword').value = '';
            document.getElementById('filter-status').value = '';
            document.getElementById('filter-region').value = '';
            currentPage = 1;
            applyFilters();
        }

        function renderTable(pageData = [], filtered = []) {
            const tbody = document.getElementById('table-body');
            const emptyState = document.getElementById('empty-state');
            const table = document.querySelector('.data-table');

            if (!pageData || pageData.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            table.style.display = 'table';
            emptyState.style.display = 'none';

            tbody.innerHTML = pageData.map(item => `
                <tr data-id="${item.id}">
                    <td><input type="checkbox" ${selectedIds.has(item.id) ? 'checked' : ''} onchange="toggleSelect('${item.id}')"></td>
                    <td><strong><a href="datacenter-view.html?id=${item.id}" class="table-link">${item.name || '-'}</a></strong></td>
                    <td>${item.region || '-'}</td>
                    <td>${item.address || '-'}</td>
                    <td><span class="status-tag ${item.status || 'new'}">${CONFIG.STATUS_MAP[item.status] || '新增'}</span></td>
                    <td>${item.createdAt ? new Date(item.createdAt).toLocaleDateString('zh-CN') : '-'}</td>
                    <td>
                        <div class="action-btns" style="justify-content: flex-end;">
                            <button class="btn-icon" onclick="viewDetail('${item.id}')" title="查看详情">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                            <button class="btn-icon" onclick="editRecord('${item.id}')" title="编辑">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button class="btn-icon danger" onclick="deleteRecord('${item.id}')" title="删除">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination(total) {
            const totalPages = Math.ceil(total / CONFIG.PAGE_SIZE);
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }

            let html = `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span style="padding: 0 4px; color: var(--text-muted);">...</span>`;
                }
            }

            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>`;

            pagination.innerHTML = html;
        }

        function goToPage(page) { currentPage = page; applyFilters(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function toggleSelect(id) { selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id); }
        function viewDetail(id) { window.location.href = `datacenter-view.html?id=${id}`; }
        function editRecord(id) { window.location.href = `datacenter-form.html?id=${id}`; }

        function deleteRecord(id) {
            deleteTargetId = id;
            document.getElementById('delete-modal').style.display = 'flex';
        }

        function confirmDelete() {
            if (!deleteTargetId) return;
            currentData = currentData.filter(d => d.id !== deleteTargetId);
            saveData();
            closeDeleteModal();
            showToast('删除成功', 'success');
            const totalPages = Math.ceil(currentData.length / CONFIG.PAGE_SIZE);
            if (currentPage > totalPages && currentPage > 1) currentPage--;
            applyFilters();
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').style.display = 'none';
            deleteTargetId = null;
        }

        function exportData() {
            if (currentData.length === 0) { showToast('没有数据可导出', 'warning'); return; }
            const headers = ['机房名称', '区域', '地址', '状态', '创建时间'];
            const rows = currentData.map(d => [d.name || '', d.region || '', d.address || '', CONFIG.STATUS_MAP[d.status] || '新增', d.createdAt ? new Date(d.createdAt).toLocaleDateString('zh-CN') : '']);
            let csv = '\uFEFF';
            csv += headers.join(',') + '\n';
            rows.forEach(row => { csv += row.map(cell => `"${(cell || '').toString().replace(/"/g, '""')}"`).join(',') + '\n'; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `机房列表_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showToast('导出成功', 'success');
        }

        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconSvg = type === 'success' ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' :
                            type === 'error' ? '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' :
                            '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
            toast.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconSvg}</svg><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
