<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AIDC Collector — Excel导入</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1E3A5F;
      --primary-light: #2C5282;
      --accent: #E8843C;
      --accent-hover: #D06E28;
      --success: #2D9E6C;
      --success-bg: #D1FAE5;
      --warning: #D97706;
      --warning-bg: #FEF3C7;
      --danger: #DC2626;
      --danger-bg: #FEE2E2;
      --info: #3B82F6;
      --info-bg: #EFF6FF;
      --bg: #F4F6F9;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --text: #1A202C;
      --text-muted: #64748B;
      --text-light: #94A3B8;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

    .phone-frame {
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* 导航栏 */
    .nav-bar {
      background: var(--primary);
      color: #fff;
      padding: 44px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-bar .nav-back {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nav-bar .nav-back:hover { background: rgba(255,255,255,0.12); }
    .nav-bar .nav-title { font-size: 17px; font-weight: 700; }
    .nav-bar .nav-placeholder { width: 40px; }

    /* 内容区 */
    .content { flex: 1; padding: 16px; padding-bottom: 100px; }

    /* 上传区域 */
    .upload-zone {
      background: var(--card);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px;
    }
    .upload-zone:hover, .upload-zone.active {
      border-color: var(--primary);
      background: var(--info-bg);
    }
    .upload-zone svg { width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 12px; }
    .upload-zone h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .upload-zone p { font-size: 13px; color: var(--text-muted); }
    .upload-zone input { display: none; }

    /* 已选文件 */
    .selected-file {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
    }
    .selected-file.show { display: flex; }
    .file-icon {
      width: 44px;
      height: 44px;
      background: var(--success-bg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--success);
    }
    .file-icon svg { width: 22px; height: 22px; }
    .file-info { flex: 1; }
    .file-info .name { font-size: 14px; font-weight: 600; color: var(--text); }
    .file-info .size { font-size: 12px; color: var(--text-muted); }
    .file-remove {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .file-remove:hover { background: var(--danger-bg); color: var(--danger); }

    /* 导入设置 */
    .settings-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .settings-card h4 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .settings-card h4 svg { width: 18px; height: 18px; color: var(--primary); }

    .setting-row { margin-bottom: 12px; }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; display: block; }
    .setting-select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      background: var(--card);
      color: var(--text);
    }
    .setting-select:focus { outline: none; border-color: var(--primary); }

    /* 预览区域 */
    .preview-section {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      display: none;
    }
    .preview-section.show { display: block; }
    .preview-header {
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-header h4 { font-size: 14px; font-weight: 600; }
    .preview-count { font-size: 12px; color: var(--text-muted); }
    .preview-table {
      width: 100%;
      font-size: 12px;
      border-collapse: collapse;
    }
    .preview-table th, .preview-table td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }
    .preview-table th {
      background: var(--bg);
      font-weight: 600;
      color: var(--text-muted);
      position: sticky;
      top: 0;
    }
    .preview-table tr:last-child td { border-bottom: none; }
    .preview-more {
      padding: 12px;
      text-align: center;
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      cursor: pointer;
    }

    /* 导入结果 */
    .result-section {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      display: none;
    }
    .result-section.show { display: block; }
    .result-header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .result-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .result-icon.success { background: var(--success-bg); color: var(--success); }
    .result-icon.warning { background: var(--warning-bg); color: var(--warning); }
    .result-icon.error { background: var(--danger-bg); color: var(--danger); }
    .result-icon svg { width: 24px; height:24px; }
    .result-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .result-info p { font-size: 13px; color: var(--text-muted); }

    .result-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
    }
    .result-stat {
      background: var(--card);
      padding: 12px;
      text-align: center;
    }
    .result-stat .num { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; }
    .result-stat .label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .result-stat.success .num { color: var(--success); }
    .result-stat.warning .num { color: var(--warning); }
    .result-stat.error .num { color: var(--danger); }

    /* 底部按钮 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 390px;
      margin: 0 auto;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-primary:disabled { background: var(--text-light); cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* 加载动画 */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 模板下载卡片 */
    .template-card {
      background: var(--info-bg);
      border: 1px solid #BFDBFE;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .template-card svg { width: 20px; height: 20px; color: var(--info); flex-shrink: 0; }
    .template-card .text { flex: 1; font-size: 13px; color: var(--text); }
    .template-card .text a { color: var(--info); font-weight: 500; text-decoration: none; }
    .template-card .text a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="phone-frame">
    <!-- 导航栏 -->
    <div class="nav-bar">
      <div class="nav-back" onclick="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </div>
      <div class="nav-title">Excel 导入</div>
      <div class="nav-placeholder"></div>
    </div>

    <div class="content">
      <!-- 模板下载提示 -->
      <div class="template-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <div class="text">
          没有 Excel 文件？<a href="javascript:void(0)" onclick="downloadTemplate()">下载标准模板</a>
        </div>
      </div>

      <!-- 上传区域 -->
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <h3>点击选择 Excel 文件</h3>
        <p>支持 .xlsx, .xls 格式，最大 10MB</p>
        <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFileSelect(this)">
      </div>

      <!-- 已选文件 -->
      <div class="selected-file" id="selectedFile">
        <div class="file-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <div class="file-info">
          <div class="name" id="fileName">文件名.xlsx</div>
          <div class="size" id="fileSize">123 KB</div>
        </div>
        <button class="file-remove" onclick="removeFile()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- 导入设置 -->
      <div class="settings-card" id="settingsCard" style="display:none;">
        <h4>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          导入设置
        </h4>
        <div class="setting-row">
          <label class="setting-label">冲突处理方式</label>
          <select class="setting-select" id="conflictStrategy">
            <option value="skip">跳过已存在的机房</option>
            <option value="overwrite">覆盖已有数据</option>
            <option value="create">创建新记录（允许重复）</option>
          </select>
        </div>
        <div class="setting-row">
          <label class="setting-label">导入模板类型</label>
          <select class="setting-select" id="templateType">
            <option value="full">完整数据（65个字段）</option>
            <option value="basic">基础信息（仅必填字段）</option>
          </select>
        </div>
      </div>

      <!-- 预览区域 -->
      <div class="preview-section" id="previewSection">
        <div class="preview-header">
          <h4>数据预览</h4>
          <span class="preview-count" id="previewCount">共 0 条记录</span>
        </div>
        <div style="overflow-x:auto;max-height:200px;">
          <table class="preview-table" id="previewTable">
            <thead id="previewHead"></thead>
            <tbody id="previewBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 导入结果 -->
      <div class="result-section" id="resultSection">
        <div class="result-header">
          <div class="result-icon success" id="resultIcon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
          </div>
          <div class="result-info">
            <h4 id="resultTitle">导入成功</h4>
            <p id="resultDesc">已完成数据导入</p>
          </div>
        </div>
        <div class="result-stats">
          <div class="result-stat success">
            <div class="num" id="statCreated">0</div>
            <div class="label">新建</div>
          </div>
          <div class="result-stat warning">
            <div class="num" id="statUpdated">0</div>
            <div class="label">更新</div>
          </div>
          <div class="result-stat error">
            <div class="num" id="statFailed">0</div>
            <div class="label">失败</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部按钮 -->
    <div class="bottom-bar">
      <button class="btn btn-outline" onclick="goBack()">取消</button>
      <button class="btn btn-primary" id="importBtn" onclick="doImport()" disabled>开始导入</button>
    </div>
  </div>

  <script>
    let selectedFile = null;
    let previewData = [];

    function goBack() {
      window.history.back();
    }

    function downloadTemplate() {
      // 模拟下载模板
      alert('正在下载标准模板...\n\n实际使用时将调用云函数生成并下载模板文件');
    }

    function handleFileSelect(input) {
      if (input.files.length > 0) {
        selectedFile = input.files[0];
        
        // 显示文件信息
        document.getElementById('fileName').textContent = selectedFile.name;
        document.getElementById('fileSize').textContent = formatFileSize(selectedFile.size);
        document.getElementById('selectedFile').classList.add('show');
        document.getElementById('settingsCard').style.display = 'block';
        document.getElementById('importBtn').disabled = false;

        // 解析预览
        parseExcel(selectedFile);
      }
    }

    function removeFile() {
      selectedFile = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('selectedFile').classList.remove('show');
      document.getElementById('settingsCard').style.display = 'none';
      document.getElementById('previewSection').classList.remove('show');
      document.getElementById('importBtn').disabled = true;
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function parseExcel(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const workbook = XLSX.read(e.target.result, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          previewData = XLSX.utils.sheet_to_json(sheet);

          if (previewData.length > 0) {
            renderPreview(previewData);
          }
        } catch (err) {
          alert('文件解析失败：' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function renderPreview(data) {
      const previewCount = Math.min(5, data.length);
      const headers = Object.keys(data[0]).slice(0, 5); // 只显示前5列

      // 渲染表头
      document.getElementById('previewHead').innerHTML = '<tr>' + 
        headers.map(h => '<th>' + h + '</th>').join('') + 
        '</tr>';

      // 渲染数据行
      let rows = '';
      for (let i = 0; i < previewCount; i++) {
        rows += '<tr>';
        headers.forEach(h => {
          const val = data[i][h] || '';
          rows += '<td title="' + val + '">' + val + '</td>';
        });
        rows += '</tr>';
      }
      document.getElementById('previewBody').innerHTML = rows;
      document.getElementById('previewCount').textContent = '共 ' + data.length + ' 条记录';
      document.getElementById('previewSection').classList.add('show');
    }

    function doImport() {
      if (!selectedFile) return;

      const btn = document.getElementById('importBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>导入中...';

      // 模拟导入过程
      setTimeout(() => {
        const created = Math.floor(previewData.length * 0.6);
        const updated = Math.floor(previewData.length * 0.3);
        const failed = previewData.length - created - updated;

        document.getElementById('statCreated').textContent = created;
        document.getElementById('statUpdated').textContent = updated;
        document.getElementById('statFailed').textContent = failed;

        const resultIcon = document.getElementById('resultIcon');
        const resultTitle = document.getElementById('resultTitle');
        const resultDesc = document.getElementById('resultDesc');

        if (failed === 0) {
          resultIcon.className = 'result-icon success';
          resultIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>';
          resultTitle.textContent = '导入成功';
          resultDesc.textContent = '所有数据已成功导入';
        } else {
          resultIcon.className = 'result-icon warning';
          resultIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>';
          resultTitle.textContent = '导入完成';
          resultDesc.textContent = '部分数据导入失败，请检查格式';
        }

        document.getElementById('resultSection').classList.add('show');
        btn.textContent = '完成';
        btn.disabled = false;
        btn.onclick = goBack;
      }, 2000);
    }
  </script>
</body>
</html>
