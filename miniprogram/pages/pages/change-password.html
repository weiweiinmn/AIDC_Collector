<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AIDC Collector — 修改密码</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1E3A5F;
      --primary-light: #2C5282;
      --accent: #E8843C;
      --accent-hover: #D06E28;
      --success: #2D9E6C;
      --success-bg: #D1FAE5;
      --warning: #D97706;
      --danger: #DC2626;
      --danger-bg: #FEE2E2;
      --bg: #F4F6F9;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --text: #1A202C;
      --text-muted: #64748B;
      --text-light: #94A3B8;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); min-height: 100vh; }

    .phone-frame {
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* 导航栏 */
    .nav-bar {
      background: var(--primary);
      color: #fff;
      padding: 44px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-bar .nav-back {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nav-bar .nav-back:hover { background: rgba(255,255,255,0.12); }
    .nav-bar .nav-title { font-size: 17px; font-weight: 700; }
    .nav-bar .nav-placeholder { width: 40px; }

    /* 首次登录提示 */
    .first-login-banner {
      background: linear-gradient(135deg, var(--accent) 0%, #d06e28 100%);
      color: #fff;
      padding: 20px;
      margin: 16px;
      border-radius: var(--radius);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .first-login-banner svg { width: 24px; height: 24px; flex-shrink: 0; margin-top: 2px; }
    .first-login-banner h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .first-login-banner p { font-size: 13px; opacity: 0.9; line-height: 1.5; }

    /* 表单区域 */
    .form-section { padding: 16px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .form-input-wrap { position: relative; }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      padding-left: 44px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
      background: var(--card);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,58,95,0.1); }
    .form-input::placeholder { color: var(--text-light); }
    .form-input.error { border-color: var(--danger); }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-muted);
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
    }
    .password-toggle:hover { color: var(--text); }

    .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
    .form-hint.error { color: var(--danger); }
    .form-hint.success { color: var(--success); }

    /* 密码强度指示 */
    .password-strength { margin-top: 8px; }
    .strength-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
    .strength-bar .fill { height: 100%; width: 0; transition: width 0.3s, background 0.3s; }
    .strength-bar .fill.weak { width: 33%; background: var(--danger); }
    .strength-bar .fill.medium { width: 66%; background: var(--warning); }
    .strength-bar .fill.strong { width: 100%; background: var(--success); }
    .strength-text { font-size: 12px; color: var(--text-muted); }
    .strength-text.weak { color: var(--danger); }
    .strength-text.medium { color: var(--warning); }
    .strength-text.strong { color: var(--success); }

    /* 密码要求列表 */
    .password-requirements {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-top: 16px;
    }
    .password-requirements h4 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .requirement-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .requirement-item:last-child { margin-bottom: 0; }
    .requirement-item svg { width: 16px; height: 16px; }
    .requirement-item.met { color: var(--success); }
    .requirement-item.unmet { color: var(--text-muted); }

    /* 提交按钮 */
    .submit-btn {
      width: calc(100% - 32px);
      margin: 24px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: var(--primary-light); }
    .submit-btn:disabled { background: var(--text-light); cursor: not-allowed; }

    /* 成功提示 */
    .success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .success-overlay.show { display: flex; }
    .success-icon {
      width: 80px;
      height: 80px;
      background: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .success-icon svg { width: 40px; height: 40px; color: #fff; }
    .success-overlay h2 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .success-overlay p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
    .success-overlay .btn {
      padding: 12px 32px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* 加载动画 */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="phone-frame">
    <!-- 导航栏 -->
    <div class="nav-bar">
      <div class="nav-back" onclick="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </div>
      <div class="nav-title">修改密码</div>
      <div class="nav-placeholder"></div>
    </div>

    <!-- 首次登录提示 -->
    <div class="first-login-banner" id="firstLoginBanner" style="display: none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4M12 8h.01"/>
      </svg>
      <div>
        <h3>首次登录需修改密码</h3>
        <p>为确保账号安全，请设置新密码后再继续使用</p>
      </div>
    </div>

    <!-- 表单区域 -->
    <form class="form-section" id="passwordForm" onsubmit="handleSubmit(event)">
      <div class="form-group" id="oldPasswordGroup">
        <label class="form-label">当前密码</label>
        <div class="form-input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" class="form-input" id="oldPassword" placeholder="请输入当前密码">
          <button type="button" class="password-toggle" onclick="togglePassword('oldPassword', 'eyeIcon1')">
            <svg id="eyeIcon1" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">新密码</label>
        <div class="form-input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" class="form-input" id="newPassword" placeholder="请输入新密码" oninput="checkPasswordStrength()">
          <button type="button" class="password-toggle" onclick="togglePassword('newPassword', 'eyeIcon2')">
            <svg id="eyeIcon2" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="password-strength">
          <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
          <div class="strength-text" id="strengthText">请输入密码</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">确认新密码</label>
        <div class="form-input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" class="form-input" id="confirmPassword" placeholder="请再次输入新密码" oninput="checkConfirm()">
          <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', 'eyeIcon3')">
            <svg id="eyeIcon3" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="form-hint" id="confirmHint"></div>
      </div>

      <!-- 密码要求 -->
      <div class="password-requirements">
        <h4>密码要求</h4>
        <div class="requirement-item" id="req1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
          <span>至少 8 个字符</span>
        </div>
        <div class="requirement-item" id="req2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
          <span>包含大写字母</span>
        </div>
        <div class="requirement-item" id="req3">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
          <span>包含小写字母</span>
        </div>
        <div class="requirement-item" id="req4">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
          <span>包含数字</span>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">确认修改</button>
    </form>
  </div>

  <!-- 成功提示 -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <h2>密码修改成功</h2>
    <p>请使用新密码登录</p>
    <button class="btn" onclick="goToLogin()">返回登录</button>
  </div>

  <script>
    // 检查是否首次登录
    const urlParams = new URLSearchParams(window.location.search);
    const isFirstLogin = urlParams.get('first') === '1';

    if (isFirstLogin) {
      document.getElementById('firstLoginBanner').style.display = 'flex';
      document.getElementById('oldPasswordGroup').style.display = 'none';
    }

    // 返回上一页
    function goBack() {
      window.history.back();
    }

    // 返回登录页
    function goToLogin() {
      window.location.href = 'login-phone.html';
    }

    // 切换密码可见性
    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    // 检查密码强度
    function checkPasswordStrength() {
      const password = document.getElementById('newPassword').value;
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');

      // 更新要求列表
      const req1 = document.getElementById('req1');
      const req2 = document.getElementById('req2');
      const req3 = document.getElementById('req3');
      const req4 = document.getElementById('req4');

      const hasLength = password.length >= 8;
      const hasUpper = /[A-Z]/.test(password);
      const hasLower = /[a-z]/.test(password);
      const hasNumber = /[0-9]/.test(password);

      updateRequirement(req1, hasLength);
      updateRequirement(req2, hasUpper);
      updateRequirement(req3, hasLower);
      updateRequirement(req4, hasNumber);

      // 计算强度
      const score = (hasLength ? 1 : 0) + (hasUpper ? 1 : 0) + (hasLower ? 1 : 0) + (hasNumber ? 1 : 0);

      fill.className = 'fill';
      text.className = 'strength-text';

      if (password.length === 0) {
        fill.style.width = '0';
        text.textContent = '请输入密码';
      } else if (score <= 2) {
        fill.classList.add('weak');
        text.classList.add('weak');
        text.textContent = '密码强度：弱';
      } else if (score === 3) {
        fill.classList.add('medium');
        text.classList.add('medium');
        text.textContent = '密码强度：中';
      } else {
        fill.classList.add('strong');
        text.classList.add('strong');
        text.textContent = '密码强度：强';
      }
    }

    function updateRequirement(el, met) {
      el.className = 'requirement-item ' + (met ? 'met' : 'unmet');
      el.querySelector('svg').innerHTML = met
        ? '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/>'
        : '<circle cx="12" cy="12" r="10"/>';
    }

    // 检查确认密码
    function checkConfirm() {
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const hint = document.getElementById('confirmHint');

      if (confirm.length === 0) {
        hint.textContent = '';
        hint.className = 'form-hint';
      } else if (password === confirm) {
        hint.textContent = '密码一致';
        hint.className = 'form-hint success';
      } else {
        hint.textContent = '两次密码不一致';
        hint.className = 'form-hint error';
      }
    }

    // 提交表单
    function handleSubmit(e) {
      e.preventDefault();
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');

      // 验证
      if (!isFirstLogin && !oldPassword) {
        alert('请输入当前密码');
        return;
      }

      if (newPassword.length < 8) {
        alert('密码至少需要 8 个字符');
        return;
      }

      if (newPassword !== confirmPassword) {
        alert('两次输入的密码不一致');
        return;
      }

      // 模拟提交
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 提交中...';

      setTimeout(() => {
        document.getElementById('successOverlay').classList.add('show');
      }, 1500);
    }
  </script>
</body>
</html>
