        <!-- 状态分布（仪表盘专属） -->

            <div class="card-header">

                    </span>
                    状态分布
                </span>
                <a href="datacenter-list.html" class="btn btn-text">

                </a>
            </div>
            <div class="card-body" id="status-distribution"></div>
        </div>

        <!-- 最近录入 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">最近录入</span>
                <a href="datacenter-list.html" class="btn btn-text">
                    查看全部
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
            </div>
            <div id="recent-table-container">
                <table class="data-table" id="recent-table">
                    <thead>
                        <tr>
                            <th>机房名称</th>
                            <th>区域</th>
                            <th>地址</th>
                            <th>状态</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="recent-tbody"></tbody>
                </table>
                <div id="empty-recent" class="empty-state" style="display: none;">
                    <div class="empty-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    </div>
                    <div class="empty-title">暂无机房数据</div>
                    <div class="empty-desc">点击"新增机房"开始录入您的第一个机房</div>
                    <a href="datacenter-form.html" class="btn btn-primary">新增机房</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CONFIG = { STORAGE_KEY: 'aidc_datacenters' };
        const STATUS_MAP = { 'new': '新增', 'collected': '已收录', 'pending': '待核实', 'rejected': '已驳回' };

        document.addEventListener('DOMContentLoaded', () => {
            loadStatusDistribution();
            loadRecentData();
        });

        function loadStatusDistribution() {
            const stored = localStorage.getItem(CONFIG.STORAGE_KEY);
            const dataList = stored ? JSON.parse(stored) : [];
            const container = document.getElementById('status-distribution');
            if (!container) return;
            const total = dataList.length;
            const counts = {
                collected: dataList.filter(d => d.status === 'collected').length,
                new:       dataList.filter(d => d.status === 'new').length,
                pending:   dataList.filter(d => d.status === 'pending').length,
                rejected:  dataList.filter(d => d.status === 'rejected').length,
            };
            const labels = { collected: '已收录', new: '新增', pending: '待核实', rejected: '已驳回' };
            const colors = { collected: 'success', new: 'info', pending: 'warning', rejected: 'danger' };
            if (total === 0) { container.innerHTML = '<div class="empty-hint">暂无数据</div>'; return; }
            container.innerHTML = Object.entries(counts).map(([k, v]) => {
                const pct = total > 0 ? Math.round(v / total * 100) : 0;
                return '<div class="dist-row"><div class="dist-label"><span class="status-dot ' + colors[k] + '"></span>' + labels[k] + '</div><div class="dist-bar"><div class="dist-fill ' + colors[k] + '" style="width:' + pct + '%"></div></div><div class="dist-count">' + v + '</div></div>';
            }).join('');
        }

        function loadRecentData() {
            const stored = localStorage.getItem(CONFIG.STORAGE_KEY);
            const dataList = stored ? JSON.parse(stored) : [];
            const tbody = document.getElementById('recent-tbody');
            const table = document.getElementById('recent-table');
            const emptyState = document.getElementById('empty-recent');

            if (dataList.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            const recent = [...dataList]
                .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))
                .slice(0, 5);

            tbody.innerHTML = recent.map(item => `
                <tr>
                    <td><a href="datacenter-view.html?id=${item.id}" class="table-link">${item.name || '-'}</a></td>
                    <td>${item.region || '-'}</td>
                    <td>${item.address || '-'}</td>
                    <td><span class="status-tag ${item.status || 'new'}">${STATUS_MAP[item.status] || '新增'}</span></td>
                    <td>${item.createdAt ? new Date(item.createdAt).toLocaleDateString('zh-CN') : '-'}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
