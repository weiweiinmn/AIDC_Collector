<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5">
    <title>机房列表 - AIDC Collector</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="shared-light.css">

      var u = null;

    })();

    <script src="api.js"></script>
    <style>
    /* ── 筛选区基础 ───────────────────────────────────────────── */
    .filter-wrap { margin-bottom: 16px; }

    /* 第一行：基础筛选 */
    .filter-row-primary {
        display: flex;
        gap: 10px;
        flex-wrap: nowrap;
        align-items: flex-end;
        padding: 12px 16px;
        overflow-x: hidden;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
    }
    .filter-row-primary .filter-group { flex: 1; min-width: 80px; }

    /* 进阶筛选展开/折叠 */
    .filter-advanced-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: var(--radius-full);
        border: 1px solid var(--border-strong);
        background: var(--bg-page);
        color: var(--text-secondary);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .filter-advanced-toggle:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
        border-color: var(--accent);
    }
    .filter-advanced-toggle.active {
        background: var(--accent-dim);
        border-color: var(--accent);
        color: var(--accent);
    }
    .filter-advanced-toggle svg { width: 14px; height: 14px; transition: transform 0.2s; }
    .filter-advanced-toggle.active svg { transform: rotate(180deg); }

    /* ── 进阶筛选面板 ───────────────────────────────── */
    .filter-advanced-panel {
        display: none;
        margin-top: 6px;
        padding: 16px 20px 12px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border);
        border-top: none;
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }
    .theme-light .filter-advanced-panel { background: rgba(0,0,0,0.02); }
    .filter-advanced-panel.open { display: block; }

    /* 分类区块 */
    .adv-section { margin-bottom: 10px; }
    .adv-section:last-child { margin-bottom: 0; }
    .adv-section-title {
        font-size: 10px; font-weight: 700;
        text-transform: uppercase; letter-spacing: .07em;
        color: var(--gray-500);
        margin-bottom: 6px; padding-bottom: 4px;
        border-bottom: 1px solid var(--border-light);
        display: flex; align-items: center; gap: 5px;
    }
    .adv-section-title svg { width: 11px; height: 11px; flex-shrink: 0; }

    /* 两列紧凑网格 → 三列宽网格 */
    .adv-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px 16px; }
    .adv-field { display: flex; flex-direction: column; gap: 3px; }
    .adv-label { font-size: 10px; font-weight: 500; color: var(--gray-500); padding-left: 2px; }
    .adv-field .form-input, .adv-field .form-select {
        padding: 6px 10px 6px 9px; font-size: 12px; min-height: 32px; height: 32px;
        appearance: none; -webkit-appearance: none;
        background-image: var(--select-arrow);
        background-repeat: no-repeat;
        background-position: right 8px center;
        background-size: 10px;
    }

    /* 底部栏 */
    .filter-footer {
        display: flex; align-items: center; gap: 8px;
        padding-top: 8px; border-top: 1px solid var(--border-light); margin-top: 10px;
    }

    /* 同事行 */
    .adv-colleague-row { display: flex; gap: 8px; align-items: flex-end; }
    .adv-colleague-row .adv-field { flex: 1; }
    .adv-colleague-row .form-select { flex: 1; }
    .add-colleague-btn {
        display: flex; align-items: center; gap: 4px;
        padding: 5px 12px; border-radius: var(--radius-md);
        border: 1px dashed var(--border-strong); background: transparent;
        color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all .15s;
        white-space: nowrap; height: 30px; flex-shrink: 0;
    }
    .add-colleague-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .add-colleague-btn svg { width: 12px; height: 12px; }


    /* 新增同事弹窗 */
    .colleague-modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(4px);
    }
    .colleague-modal.open { display: flex; }
    .colleague-modal-card {
        background: var(--bg-card);
        border-radius: var(--radius-xl);
        padding: 28px;
        width: 360px;
        max-width: 90vw;
        border: 1px solid var(--border-strong);
        box-shadow: var(--shadow-xl);
        animation: fadeInUp 0.2s ease;
    }
    @keyframes fadeInUp {
        from { opacity:0; transform:translateY(10px); }
        to   { opacity:1; transform:translateY(0); }
    }
    .colleague-modal-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 16px;
    }
    .colleague-modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
        justify-content: flex-end;
    }
    .colleague-modal-actions .btn { min-width: 80px; }

    /* 已选筛选项标签 */
    .active-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
    }
    .active-filter-tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 8px;
        border-radius: var(--radius-full);
        font-size: 12px;
        font-weight: 500;
        background: var(--accent-dim);
        color: var(--accent);
        border: 1px solid rgba(34,197,94,0.2);
    }
    .active-filter-tag button {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--accent);
        padding: 0;
        line-height: 1;
        font-size: 14px;
        opacity: 0.7;
    }
    .active-filter-tag button:hover { opacity: 1; }

    /* 统计摘要 */
    .filter-summary {
        font-size: 12px;
        color: var(--text-muted);
        padding: 6px 0;
    }
    .filter-summary strong { color: var(--text-secondary); }
/* Sortable column hover */
    .sort-icon {
        font-size: 16px !important;
        font-weight: bold;
        opacity: 0.5;
        transition: opacity 0.15s;
    }
    th.sortable:hover .sort-icon,
    th.sortable.active .sort-icon {
        opacity: 1;
    }
    th.sortable {
        cursor: pointer;
        user-select: none;
        transition: background-color 0.15s;
    }
    th.sortable:hover {
        background: var(--bg-hover);
    }
    .theme-light th.sortable:hover {
        background: var(--gray-200);
    }

    /* ========== 弹窗样式 ========== */
    .popup-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .popup-overlay.open { display: flex; }

    .popup-panel {
        background: rgba(15,23,42,0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 16px;
        width: 100%;
        max-width: 820px;
        max-height: 88vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        overflow: hidden;
    }
    .theme-light .popup-panel {
        background: rgba(255,255,255,0.88);
        border-color: rgba(0,0,0,0.08);
        box-shadow: 0 24px 80px rgba(0,0,0,0.12);
    }

    /* 弹窗头部 */
    .popup-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .popup-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .popup-title .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--accent); flex-shrink: 0;
    }
    .popup-header-right { display: flex; align-items: center; gap: 8px; }
    .popup-edit-btn {
        padding: 5px 14px; border-radius: 8px; border: 1px solid var(--accent);
        background: transparent; color: var(--accent); font-size: 12px;
        cursor: pointer; transition: all .15s; font-weight: 500;
    }
    .popup-edit-btn:hover { background: var(--accent); color: #fff; }
    .popup-edit-btn.saving { opacity: .5; pointer-events: none; }
    .popup-close-btn {
        width: 30px; height: 30px; border-radius: 8px; border: none;
        background: var(--bg-hover); color: var(--text-secondary);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: all .15s; font-size: 16px; flex-shrink: 0;
    }
    .popup-close-btn:hover { background: var(--danger-bg); color: var(--danger); }

    /* 编辑提示条 */
    .popup-edit-bar {
        display: none;
        padding: 8px 20px;
        background: rgba(245,158,11,0.12);
        border-bottom: 1px solid rgba(245,158,11,0.25);
        font-size: 12px;
        color: var(--warning);
        flex-shrink: 0;
        align-items: center;
        gap: 6px;
    }
    .popup-edit-bar.show { display: flex; }
    .popup-edit-bar svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* 弹窗主体 */
    .popup-body {
        overflow-y: auto;
        flex: 1;
        padding: 16px 20px;
        scrollbar-width: thin;
        scrollbar-color: var(--gray-700) transparent;
    }
    .popup-body::-webkit-scrollbar { width: 4px; }
    .popup-body::-webkit-scrollbar-thumb { background: var(--gray-700); border-radius: 4px; }

    /* 弹窗内 section */
    .popup-section {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 12px;
        overflow: hidden;
    }
    .theme-light .popup-section { background: rgba(0,0,0,0.02); }
    .popup-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--gray-500);
        padding: 8px 14px 6px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .popup-section-title svg { width: 12px; height: 12px; }
    .popup-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
    }
    .popup-field {
        padding: 7px 14px;
        border-bottom: 1px solid var(--border-light);
        display: flex;
        flex-direction: column;
        gap: 2px;
        transition: background .12s;
    }
    .popup-field:nth-last-child(-n+2) { border-bottom: none; }
    .popup-field-label {
        font-size: 10px;
        color: var(--gray-500);
        font-weight: 500;
        letter-spacing: .03em;
    }
    .popup-field-value {
        font-size: 13px;
        color: var(--text-primary);
        min-height: 18px;
        line-height: 1.5;
    }
    .popup-field-value.empty { color: var(--gray-600); font-style: italic; }

    /* 编辑状态下的字段 */
    .popup-field.edit-mode { padding: 6px 12px; }
    .popup-field.edit-mode .popup-field-value { display: none; }
    .popup-field.edit-mode .popup-edit-input { display: block !important; }

    .popup-edit-input {
        display: none;
        width: 100%;
        padding: 3px 7px;
        background: var(--bg-card);
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 12px;
        outline: none;
        box-shadow: 0 0 0 2px rgba(34,197,94,0.15);
    }
    .popup-edit-input:focus { border-color: var(--accent); }
    .popup-edit-select {
        display: none;
        width: 100%;
        padding: 3px 7px;
        background: var(--bg-card);
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 12px;
        outline: none;
    }
    .popup-field.edit-mode .popup-edit-select { display: block; }

    /* 弹窗底部操作条 */
    .popup-footer {
        display: none;
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        justify-content: flex-end;
        gap: 8px;
        background: rgba(0,0,0,0.15);
    }
    .popup-footer.show { display: flex; }
    .popup-footer .btn { padding: 7px 18px; font-size: 13px; border-radius: 8px; }

    /* changelog 行内 */
    .popup-changelog { padding: 8px 14px; }
    .popup-changelog-item {
        display: flex; gap: 10px; padding: 7px 10px;
        background: var(--bg-card); border-radius: 7px; margin-bottom: 6px;
        border-left: 3px solid var(--border);
    }
    .popup-changelog-item.create { border-left-color: var(--success); }
    .popup-changelog-item.update { border-left-color: var(--info); }
    .popup-changelog-item.status { border-left-color: var(--warning); }
    .popup-changelog-meta { font-size: 11px; color: var(--gray-500); margin-bottom: 2px; }
    .popup-changelog-text { font-size: 12px; color: var(--text-secondary); }

    </style>

    <style>
    .theme-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-strong);
      background: transparent; color: var(--text-secondary);
      cursor: pointer; transition: all var(--transition-base); flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--brand); }
    .theme-toggle .icon-sun, .theme-toggle .icon-moon { width: 18px; height: 18px; }
    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    body.theme-light .theme-toggle .icon-sun { display: block; }
    body.theme-light .theme-toggle .icon-moon { display: none; }
    
    </style>

</head>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1 class="page-title">机房列表</h1>
            <div class="page-actions">
                <button class="btn btn-secondary btn-sm" onclick="exportCurrentView()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    导出结果
                </button>
                <a href="datacenter-form.html" class="btn btn-primary btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新增机房
                </a>
            </div>
        </div>

        <!-- 筛选区 -->
        <div class="filter-wrap">

            <!-- 第一行：基础筛选（重要字段直接露出） -->
            <div class="filter-row-primary">
                <!-- 关键词搜索 — 次要，缩小 -->
                <div class="filter-group">
                    <label class="filter-label">搜索</label>
                    <input type="text" id="search-keyword" class="form-input" placeholder="关键词..." onkeyup="handleSearch(event)">
                </div>
                <!-- 签约方 -->
                <div class="filter-group">
                    <label class="filter-label">签约方</label>
                    <select id="filter-source" class="form-input form-select">
                        <option value=""></option>
                        <option value="客户主动联系">客户主动联系</option>
                        <option value="展会">展会</option>
                        <option value="网络">网络</option>
                        <option value="同行推荐">同行推荐</option>
                        <option value="合作伙伴">合作伙伴</option>
                        <option value="自主开发">自主开发</option>
                    </select>
                </div>
                <!-- 国家/地区 -->
                <div class="filter-group">
                    <label class="filter-label">地区</label>
                    <select id="filter-country" class="form-input form-select">
                        <option value=""></option>
                        <option value="中国">中国</option>
                        <option value="泰国">泰国</option>
                        <option value="马来西亚">马来西亚</option>
                        <option value="印尼">印尼</option>
                        <option value="菲律宾">菲律宾</option>
                        <option value="日本">日本</option>
                        <option value="欧洲">欧洲</option>
                        <option value="澳大利亚">澳大利亚</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <!-- MW数 -->
                <div class="filter-group">
                    <label class="filter-label">MW数</label>
                    <select id="filter-mw" class="form-input form-select">
                        <option value=""></option>

    <!-- 主题切换 -->
    <script>
    (function(){
      var t = localStorage.getItem('aidc_theme');
      if (t==='light') document.body.classList.add('theme-light');
    })();
    document.getElementById('themeToggle').addEventListener('click', function(){
      var isLight = document.body.classList.toggle('theme-light');
      localStorage.setItem('aidc_theme', isLight ? 'light' : 'dark');
    });

    var user = null;
    try { user = JSON.parse(localStorage.getItem('aidc_user')); } catch(e){}
    if (user) {
      var av = document.querySelector('.nav-avatar');
      if (av) av.textContent = (user.name||'管').charAt(0);
    }

    // ── 全局状态 ────────────────────────────────────────────────
    var currentList   = [];
    var currentPage   = 1;
    var PAGE_SIZE     = 20;
    var selectedIds    = new Set();
    var customersCache = [];

    var KYC_MAP = {
        'not_started':  { label:'未开始',  cls:'kyc-info'    },
        'in_progress':  { label:'进行中',  cls:'kyc-warning' },
        'pending_doc':  { label:'待补充', cls:'kyc-warning' },
        'approved':     { label:'已完成', cls:'kyc-success' },
        'rejected':     { label:'已驳回', cls:'kyc-danger'  },
        'not_required': { label:'不需要', cls:'kyc-accent'  },
    };
    function getKycLabel(s){ var m=KYC_MAP[s]; return m?m.label:(s?'—':'-'); }
    function getKycCls(s)  { var m=KYC_MAP[s]; return m?m.cls:'kyc-info'; }

    // ── 同事管理 ────────────────────────────────────────────────
    var COLLEAGUE_KEY = 'aidc_colleagues';
    function getColleagues() {
        try { return JSON.parse(localStorage.getItem(COLLEAGUE_KEY)||'[]'); } catch(e){ return []; }
    }
    function saveColleagues(list) {
        localStorage.setItem(COLLEAGUE_KEY, JSON.stringify(list));
    }
    function addColleague(name) {
        var list = getColleagues();
        name = name.trim();
        if (!name || list.indexOf(name) >= 0) return false;
        list.push(name);
        saveColleagues(list);
        return true;
    }
    function refreshLiaisonDropdown() {
        var sel = document.getElementById('filter-liaison');
        if (!sel) return;
        var colleagues = getColleagues();
        // 也从已有机房数据里收集
        var fromData = {};
        currentList.forEach(function(d){ if(d.liaison) fromData[d.liaison]=true; });
        var allNames = {};
        colleagues.forEach(function(n){ allNames[n]=true; });
        Object.keys(fromData).forEach(function(n){ allNames[n]=true; });
        var names = Object.keys(allNames).sort();
        sel.innerHTML = '<option value="">全部同事</option>' +
            names.map(function(n){ return '<option value="'+escAttr(n)+'">'+esc(n)+'</option>'; }).join('');
    }

    function openColleagueModal() {
        document.getElementById('new-colleague-name').value = '';
        document.getElementById('colleague-modal').classList.add('open');
        setTimeout(function(){ document.getElementById('new-colleague-name').focus(); }, 50);
    }
    function closeColleagueModal() {
        document.getElementById('colleague-modal').classList.remove('open');
    }
    function confirmAddColleague() {
        var name = document.getElementById('new-colleague-name').value.trim();
        if (!name) { showToast('请输入同事姓名', 'error'); return; }
        if (addColleague(name)) {
            refreshLiaisonDropdown();
            document.getElementById('filter-liaison').value = name;
            closeColleagueModal();
            showToast('同事 "'+name+'" 已添加', 'success');
        } else {

    // ── 筛选 ────────────────────────────────────────────────────
    function applyFilters() {
        var keyword   = (document.getElementById('search-keyword')   || {value:''}).value.toLowerCase().trim();
        var country   = (document.getElementById('filter-country')   || {value:''}).value;
        var status    = (document.getElementById('filter-status')    || {value:''}).value;
        var kyc       = (document.getElementById('filter-kyc')         || {value:''}).value;
        var liaison   = (document.getElementById('filter-liaison')   || {value:''}).value.toLowerCase().trim();
        var customer  = (document.getElementById('filter-customer')  || {value:''}).value;
        var source    = (document.getElementById('filter-source')    || {value:''}).value;
        var property_ = (document.getElementById('filter-property')  || {value:''}).value;
        var rackScale = (document.getElementById('filter-rack-scale')|| {value:''}).value;
        var delivery  = (document.getElementById('filter-delivery')  || {value:''}).value;
        var power     = (document.getElementById('filter-power')      || {value:''}).value;
        var upsCfg    = (document.getElementById('filter-ups')        || {value:''}).value;
        var genRed    = (document.getElementById('filter-generator') || {value:''}).value;
        var billing   = (document.getElementById('filter-billing')   || {value:''}).value;
        var cooling   = (document.getElementById('filter-cooling')   || {value:''}).value;
        var loadCap   = (document.getElementById('filter-load')       || {value:''}).value;
        var liquidSp  = (document.getElementById('filter-liquid')    || {value:''}).value;
        var raisedFl  = (document.getElementById('filter-floor')     || {value:''}).value;
        var isp       = (document.getElementById('filter-isp')        || {value:''}).value;
        var sup800g   = (document.getElementById('filter-800g')     || {value:''}).value;
        var roceSp    = (document.getElementById('filter-roce')      || {value:''}).value;
        var redundancy= (document.getElementById('filter-redundancy') || {value:''}).value;
        var filterMw  = (document.getElementById('filter-mw')        || {value:''}).value;
        var pue       = (document.getElementById('filter-pue')        || {value:''}).value;
        var isoCert   = (document.getElementById('filter-iso')       || {value:''}).value;
        var levelCert= (document.getElementById('filter-level')      || {value:''}).value;
        var ops247    = (document.getElementById('filter-ops247')    || {value:''}).value;
        var liqMaint  = (document.getElementById('filter-liquid-maint')||{value:''}).value;

        var filtered = currentList.filter(function(d) {
            // 关键词搜索
            if (keyword) {
                var kwFields = [
                    (d.name||'').toLowerCase(), (d.dc_name||'').toLowerCase(),
                    (d.address||'').toLowerCase(), (d.park||'').toLowerCase(),
                    (d.customer||'').toLowerCase(), (d.reserved_customers||'').toLowerCase(),
                    (d.liaison||'').toLowerCase(), (d.source||'').toLowerCase(),
                    (d.province||'').toLowerCase(), (d.city||'').toLowerCase(),
                    (d.contact||'').toLowerCase(), (d.remark||'').toLowerCase(),
                ];
                var matched = kwFields.some(function(f){ return f.includes(keyword); });
                if (!matched) return false;
            }
            // 主行筛选
            if (country   && d.country   !== country)     return false;
            if (status    && d.status    !== status)      return false;
            if (kyc       && d.kycStatus !== kyc)        return false;
            if (liaison   && (d.liaison||'').toLowerCase() !== liaison) return false;
            if (customer  && d.customer  !== customer)    return false;
            if (source    && d.source    !== source)       return false;
            if (property_ && (d.property||'') !== property_) return false;
            if (pue) {
                var pv = parseFloat(d.pue_value||d.pue)||0;
                if (pue==='excellent'&&pv>=1.3)   return false;
                if (pue==='good'&&(pv<1.3||pv>1.4))   return false;
                if (pue==='average'&&(pv<1.4||pv>1.5)) return false;
                if (pue==='poor'&&pv<=1.5)   return false;
            }
            if (sup800g   && (d.support800g||'') !== sup800g)    return false;
            if (roceSp    && (d.roceSupport||'')  !== roceSp)     return false;
            if (redundancy&& (d.networkRedundancy||'') !== redundancy) return false;
            if (isoCert   && (d.isoCertified||'') !== isoCert)    return false;
            if (levelCert && (d.levelCertification||'') !== levelCert) return false;
            if (ops247    && (d.ops247||'')        !== ops247)     return false;
            if (liqMaint  && (d.liquidCoolingMaintenance||'') !== liqMaint) return false;
            // 机柜规模
            if (rackScale) {
                var r = d.rackCount||0;
                if (rackScale==='micro'&&r>=50)       return false;
                if (rackScale==='small'&&(r<50||r>200))   return false;
                if (rackScale==='medium'&&(r<200||r>500))  return false;
                if (rackScale==='large'&&(r<500||r>1000))  return false;
                if (rackScale==='hyperscale'&&r<=1000) return false;
            }
            // 功率
            if (power) {
                var kw = parseFloat(d.powerPerRack)||0;
                if (power==='low'&&kw>=6)      return false;
                if (power==='standard'&&(kw<6||kw>10)) return false;
                if (power==='high'&&(kw<10||kw>15))   return false;
                if (power==='ultra'&&kw<=15)  return false;
            }
            // MW 规模
            if (filterMw) {
                var mw = parseFloat(d.availPowerMw)||0;
                if (filterMw==='micro'&&mw>=1)      return false;
                if (filterMw==='small'&&(mw<1||mw>5))      return false;
                if (filterMw==='medium'&&(mw<5||mw>20))     return false;
                if (filterMw==='large'&&(mw<20||mw>100))    return false;
                if (filterMw==='hyperscale'&&mw<=100) return false;
            }
            // 冷却方式
            if (cooling && (d.coolingSystem||'') !== cooling) return false;
            // 承重能力
            if (loadCap) {
                var bl = parseFloat(d.floorLoad||d.bearing||0);
                if (loadCap==='standard'&&bl>=800)   return false;
                if (loadCap==='heavy'&&(bl<800||bl>1200))  return false;
                if (loadCap==='ultra-heavy'&&bl<=1200) return false;
            }
            // 液冷支持
            if (liquidSp && (d.liquidCoolingSupport||'') !== liquidSp) return false;
            // 架空地板
            if (raisedFl) {
                var hasFloor = d.raisedFloorHeight ? '有' : '无';
                if (raisedFl !== hasFloor) return false;
            }
            // UPS 配置
            if (upsCfg && (d.upsConfig||'') !== upsCfg) return false;
            // 柴发冗余
            if (genRed && (d.generatorRedundancy||'') !== genRed) return false;
            // 电费模式
            if (billing && (d.billingMode||'') !== billing) return false;
            // 运营商
            if (isp && (d.isp||'') !== isp) return false;
            // 交付时间
            if (delivery) {
                var ed = d.expectedDate||d.delivery_date||'';
                if (!ed) {
                    if (delivery!=='immediate') return false;
                } else {
                    var now = new Date();
                    var target = new Date(ed.indexOf('-')>0 ? ed : ed+'-01');
                    var diffDays = (target-now)/(1000*60*60*24);
                    if (delivery==='immediate'&&diffDays>0)    return false;
                    if (delivery==='3m'&&(diffDays<0||diffDays>90))    return false;
                    if (delivery==='6m'&&(diffDays<0||diffDays>180))   return false;
                    if (delivery==='1y'&&(diffDays<0||diffDays>365))   return false;
                    if (delivery==='future'&&diffDays<=0) return false;
                }
            }
            return true;
        });

        document.getElementById('record-count').textContent = filtered.length;
        document.getElementById('total-count').textContent   = filtered.length;
        document.getElementById('filter-count').textContent = filtered.length;
        currentPage = 1;
        var start = 0, end = PAGE_SIZE;
        document.getElementById('page-start').textContent = filtered.length>0?1:0;
        document.getElementById('page-end').textContent   = Math.min(end, filtered.length);
        renderTable(filtered.slice(start, end));
        _lastFiltered = filtered;
        renderPagination(filtered.length);
    }

    function renderTable(pageData) {
        var tbody = document.getElementById('table-body');
        var empty = document.getElementById('empty-state');
        var table = document.querySelector('.data-table');
        if (!pageData||pageData.length===0) {
            table.style.display='none'; empty.style.display='block'; return;
        }
        table.style.display='table'; empty.style.display='none';

        var STATUS_ORDER = {'new':1,'collected':2,'negotiating':3,'signed':4,'rejected':5,'rented':6,'已收录':2,'洽谈中':3,'已签约':4,'已驳回':5};
        var KYC_ORDER = {'completed':4,'in_progress':3,'not_started':1,'not_applicable':2,'已完成':4,'进行中':3,'未开始':1,'不适用':2};

        pageData = pageData.slice().sort(function(a,b){
            var va = a[sortKey]||'', vb = b[sortKey]||'';
            if (sortKey==='mw'||sortKey==='pue') {
                return sortDir==='asc' ? (parseFloat(va)||0)-(parseFloat(vb)||0) : (parseFloat(vb)||0)-(parseFloat(va)||0);
            }
            if (sortKey==='createdAt'||sortKey==='delivery_date') {
                var ta = new Date(va).getTime()||0, tb = new Date(vb).getTime()||0;
                return sortDir==='asc' ? ta-tb : tb-ta;
            }
            if (sortKey==='status') { va=STATUS_ORDER[va]||99; vb=STATUS_ORDER[vb]||99; }
            if (sortKey==='kyc') { va=KYC_ORDER[va]||0; vb=KYC_ORDER[vb]||0; }
            return sortDir==='asc' ? String(va).localeCompare(String(vb),'zh-CN') : String(vb).localeCompare(String(va),'zh-CN');
        });

        tbody.innerHTML = pageData.map(function(item){
            return '<tr data-id="'+item.id+'">' +
                '<td><a href="javascript:void(0)" class="table-link" onclick="openPopup(\''+item.id+'\')">'+(item.dc_name||item.name||'未命名')+'</a>' +
                (item.park?'<div class="sub-text" style="font-size:11px">'+esc(item.park||'')+(item.building?(' · '+item.building+'号楼'):'')+'</div>':'')+'</td>' +
                '<td>'+(item.country||'-')+'<br><span class="sub-text" style="font-size:11px">'+(item.city||'')+'</span></td>' +
                '<td style="text-align:center">'+(item.mw?(item.mw+' MW'):'-')+'</td>' +
                '<td>'+(item.delivery_date||'-')+'</td>' +
                '<td><span class="status-tag '+AIDC_API.getStatusCls(item.status||item.cooperation_status||'')+'">'+AIDC_API.getStatusLabel(item.status||item.cooperation_status||'')+'</span></td>' +
                '<td style="text-align:center">'+(item.pue_value!==undefined&&item.pue_value!==null&&item.pue_value!==''?item.pue_value:'-')+'</td>' +
                '<td style="text-align:center">'+(item.expandable?'<span class="expand-tag yes">是</span>':'<span class="expand-tag no">否</span>')+'</td>' +
                '<td><span class="kyc-td '+getKycCls(item.kyc_status||'')+'">'+getKycLabel(item.kyc_status||'')+'</span></td>' +
                '<td>'+(item.createdAt?new Date(item.createdAt).toLocaleDateString('zh-CN'):'-')+'</td>' +
                '<td>'+(item.liaison?'<span class="dc-tag" style="background:var(--gray-800)">'+esc(item.liaison)+'</span>':'-')+'</td>' +
                '<td>'+(item.reserved_customers?'<span class="dc-tag" style="background:var(--gray-800)">'+esc(item.reserved_customers)+'</span>':'-')+'</td>' +
                '</tr>';
        }).join('');
    }

        for (var i=1; i<=totalPages; i++) {
            html += '<button class="page-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';

            // 刷新当前列表
            loadData();
            renderPopupContent();
        } else {
            showToast('保存失败: ' + (res&&res.message||'未知错误'), 'error');
        }
    }

    function renderPopupContent() {
        var d = _popupData;
        if (!d) return;
        var editMode = _popupEditMode;

        // 标题
        var titleEl = document.getElementById('popup-title');
        var titleDot = document.getElementById('popup-title-dot');
        titleEl.textContent = d.dc_name || d.name || '机房详情';
        titleDot.style.background = _popupEditMode ? 'var(--warning)' : 'var(--accent)';

        // 编辑按钮状态
        var editBtn = document.getElementById('popup-edit-btn');
        editBtn.textContent = editMode ? '退出编辑' : '编辑';
        editBtn.style.background = editMode ? 'var(--bg-hover)' : 'transparent';
        editBtn.style.color = editMode ? 'var(--text-secondary)' : 'var(--accent)';

        // 底部按钮条
        document.getElementById('popup-footer').className = 'popup-footer' + (editMode ? ' show' : '');

        // 编辑提示条
        document.getElementById('popup-edit-bar').className = 'popup-edit-bar' + (editMode ? ' show' : '');

        // 渲染各 section
        document.getElementById('popup-sec-basic').innerHTML = buildBasicSec(d, editMode);
        document.getElementById('popup-sec-power').innerHTML = buildPowerSec(d, editMode);
        document.getElementById('popup-sec-network').innerHTML = buildNetworkSec(d, editMode);
        document.getElementById('popup-sec-cooling').innerHTML = buildCoolingSec(d, editMode);
        document.getElementById('popup-sec-certs').innerHTML = buildCertsSec(d, editMode);
        document.getElementById('popup-sec-cost').innerHTML = buildCostSec(d, editMode);
        document.getElementById('popup-sec-contact').innerHTML = buildContactSec(d, editMode);
        document.getElementById('popup-sec-changelog').innerHTML = buildChangelogSec(d.id, editMode);
    }

    function ev(name, label, value, type, options, editMode) {
        // type: text|select|textarea
        var displayVal = value || value === 0 ? esc(String(value)) : '<span class="empty">-</span>';
        var inp = '';
        if (type === 'select' && options) {
            var opts = options.map(function(o){ return '<option value="'+o.v+'"'+(value===o.v?' selected':'')+'>'+o.l+'</option>'; }).join('');
            inp = '<select class="popup-edit-select" name="'+name+'" onchange="onPopupFieldChange()"><option value="">请选择</option>'+opts+'</select>';
        } else if (type === 'textarea') {
            inp = '<textarea class="popup-edit-input" name="'+name+'" rows="2" oninput="onPopupFieldChange()">'+(value||'')+'</textarea>';
        } else {
            inp = '<input class="popup-edit-input" type="'+(type||'text')+'" name="'+name+'" value="'+esc(String(value||''))+'" oninput="onPopupFieldChange()">';
        }
        return '<div class="popup-field'+(editMode?' edit-mode':'')+'">' +
            '<span class="popup-field-label">'+label+'</span>' +
            '<span class="popup-field-value'+(value||value===0?'':' empty')+'">'+displayVal+'</span>' +
            inp +
            '</div>';
    }

    function buildBasicSec(d, editMode) {
        var statusOpts = [
            {v:'new',l:'新增'},{v:'collected',l:'已收录'},{v:'negotiating',l:'洽谈中'},{v:'signed',l:'已签约'},{v:'rejected',l:'已淘汰'}
        ];
        var kycOpts = [
            {v:'',l:'请选择'},{v:'not_started',l:'未开始'},{v:'in_progress',l:'进行中'},
            {v:'pending_doc',l:'待补充材料'},{v:'approved',l:'已完成'},{v:'rejected',l:'已驳回'},{v:'not_required',l:'不适用'}
        ];
        var srcOpts = [
            {v:'',l:'请选择'},{v:'客户主动联系',l:'客户主动联系'},{v:'展会',l:'展会'},{v:'网络',l:'网络'},
            {v:'同行推荐',l:'同行推荐'},{v:'合作伙伴',l:'合作伙伴'},{v:'自主开发',l:'自主开发'}
        ];
        var region = [d.country,d.province,d.city,d.zone].filter(Boolean).join(' ');
        return '' +
            '<div class="popup-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>基本信息</div>' +
            '<div class="popup-grid">' +
            ev('name', '机房名称', d.dc_name||d.name, 'text', null, editMode) +
            ev('region', '区域', region, 'text', null, editMode) +
            ev('park', '园区', d.park, 'text', null, editMode) +
            ev('building', '号楼', d.building, 'text', null, editMode) +
            ev('code', '机房编码', d.code, 'text', null, editMode) +
            ev('source', '签约方', d.source, 'select', srcOpts, editMode) +
            ev('status', '状态', d.status, 'select', statusOpts, editMode) +
            ev('liaison', '对接同事', d.liaison, 'text', null, editMode) +
            ev('kycStatus', 'KYC状态', d.kycStatus, 'select', kycOpts, editMode) +
            ev('address', '详细地址', d.address, 'text', null, editMode) +
            '</div>';
    }

    function buildPowerSec(d, editMode) {
        var coolingOpts = [{v:'',l:'请选择'},{v:'风冷',l:'风冷'},{v:'水冷',l:'水冷'},{v:'液冷',l:'液冷'},{v:'风冷+液冷',l:'风冷+液冷'},{v:'自然冷源',l:'自然冷源'}];
        return '' +
            '<div class="popup-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>电力与空间</div>' +
            '<div class="popup-grid">' +
            ev('rackCount', '机柜数量', d.rackCount, 'number', null, editMode) +
            ev('availRacks', '可用机柜', d.availRacks, 'number', null, editMode) +
            ev('powerPerRack', '单机柜功率(kW)', d.powerPerRack, 'number', null, editMode) +
            ev('maxPowerMw', '总功率(MW)', d.maxPowerMw, 'number', null, editMode) +
            ev('availPowerMw', '可用功率(MW)', d.availPowerMw, 'number', null, editMode) +
            ev('coolingSystem', '冷却方式', d.coolingSystem, 'select', coolingOpts, editMode) +
            ev('bearing', '承重(kg/㎡)', d.bearing||d.bearingCapacity, 'number', null, editMode) +
            ev('floorHeight', '净层高(m)', d.floorHeight, 'number', null, editMode) +
            '</div>';
    }

    function buildNetworkSec(d, editMode) {
        var ispOpts = [{v:'',l:'请选择'},{v:'中国电信',l:'中国电信'},{v:'中国移动',l:'中国移动'},{v:'中国联通',l:'中国联通'},{v:'BGP多线',l:'BGP多线'},{v:'第三方',l:'第三方'}];
        var redOpts = [{v:'',l:'请选择'},{v:'N+1',l:'N+1'},{v:'2N',l:'2N'},{v:'无',l:'无'}];
        return '' +
            '<div class="popup-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>网络与互联</div>' +
            '<div class="popup-grid">' +
            ev('isp', '运营商', d.isp||d.operator, 'select', ispOpts, editMode) +
            ev('bandwidth', '带宽资源', d.bandwidth, 'text', null, editMode) +
            ev('fiberResources', '光纤资源', d.fiberResources, 'text', null, editMode) +
            ev('networkRedundancy', '网络冗余', d.networkRedundancy, 'select', redOpts, editMode) +
            ev('expandable', '是否可扩容', d.expandable?'是':'否', 'select', [{v:'true',l:'是'},{v:'false',l:'否'}], editMode) +
            ev('expandableDesc', '扩容说明', d.expandableDesc, 'textarea', null, editMode) +
            '</div>';
    }

    function buildCoolingSec(d, editMode) {
        var heatDensOpts = [{v:'',l:'请选择'},{v:'低(<4kW)',l:'低(<4kW)'},{v:'中(4-8kW)',l:'中(4-8kW)'},{v:'高(8-15kW)',l:'高(8-15kW)'},{v:'超高(>15kW)',l:'超高(>15kW)'}];
        return '' +
            '<div class="popup-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/><path d="M20 16l-4-4 4-4M4 8l4 4-4 4M16 4l-4 4-4-4M8 20l4-4 4 4"/></svg>制冷与承重</div>' +
            '<div class="popup-grid">' +
            ev('heatDensity', '机柜功率密度', d.heatDensity||d.heat_dens, 'select', heatDensOpts, editMode) +
            ev('pue', 'PUE值', d.pue||d.pue_value, 'number', null, editMode) +
            ev('chillerCapacity', '制冷机组(kW)', d.chillerCapacity||d.chiller_cap, 'number', null, editMode) +
            ev('coolingRedundancy', '制冷冗余', d.coolingRedundancy, 'text', null, editMode) +
            '</div>';
    }

    function buildCertsSec(d, editMode) {
        return '' +
            '<div class="popup-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>认证与资质</div>' +
            '<div class="popup-grid">' +
            ev('iso', 'ISO认证', d.iso||d.isoCert, 'text', null, editMode) +
            ev('level', '等级认证', d.level||d.tierLevel||d.levelCert, 'text', null, editMode) +
            ev('operatorCert', '运营商资质', d.operatorCert, 'text', null, editMode) +
            ev('compliance', '合规证书', d.compliance, 'text', null, editMode) +
            ev('iso9001', 'ISO 9001', d.iso9001, 'select', [{v:'true',l:'有'},{v:'false',l:'无'}], editMode) +
            ev('iso27001', 'ISO 27001', d.iso27001, 'select', [{v:'true',l:'有'},{v:'false',l:'无'}], editMode) +
            '</div>';
    }

    function buildCostSec(d, editMode) {
        var timeOpts = [{v:'',l:'请选择'},{v:'immediate',l:'已可交付'},{v:'1m',l:'1个月内'},{v:'3m',l:'3个月内'},{v:'6m',l:'半年内'},{v:'1y',l:'一年内'},{v:'future',l:'一年后'}];
        return '' +
            '<div class="popup-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>交付与成本</div>' +
            '<div class="popup-grid">' +
            ev('expectedDate', '预计交付', d.expectedDate||d.delivery_date, 'text', null, editMode) +
            ev('deliveryTime', '交付时间', d.deliveryTime||d.delivery_cycle, 'select', timeOpts, editMode) +
            ev('unitPrice', '单价(元/kW/月)', d.unitPrice, 'number', null, editMode) +
            ev('setupFee', '建设费(万元)', d.setupFee, 'number', null, editMode) +
            ev('annualCost', '年费(万元)', d.annualCost, 'number', null, editMode) +
            ev('reserved_customers', '预留客户', d.reserved_customers, 'text', null, editMode) +
            '</div>';
    }

    function buildContactSec(d, editMode) {
        return '' +
            '<div class="popup-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>联系信息</div>' +
            '<div class="popup-grid">' +
            ev('contact', '联系人', d.contact, 'text', null, editMode) +
            ev('phone', '联系电话', d.phone||d.tel, 'tel', null, editMode) +
            ev('email', '联系邮箱', d.email, 'email', null, editMode) +
            ev('website', '官方网站', d.website, 'text', null, editMode) +
            ev('remark', '备注', d.remark, 'textarea', null, editMode) +
            '</div>';
    }

    function buildChangelogSec(id, editMode) {
        var res = AIDC_API.getDatacenterChangelogs(id);
        var logs = (res && res.data) || [];
        if (logs.length === 0) {
            return '<div class="popup-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>操作记录</div><div style="padding:14px;color:var(--gray-500);font-size:12px;text-align:center">暂无变更记录</div>';
        }
        var items = logs.slice(0, 5).map(function(log) {
            var cls = log.type === 'create' ? 'create' : log.type === 'delete' ? 'delete' : 'update';
            var typeName = {create:'新增',update:'修改',delete:'删除',status:'状态变更'}[log.type]||'变更';
            var t = new Date(log.createdAt);
            var time = t.getFullYear()+'-'+('0'+(t.getMonth()+1)).slice(-2)+'-'+('0'+t.getDate()).slice(-2);
            return '<div class="popup-changelog-item '+cls+'"><div><div class="popup-changelog-meta">'+typeName+' · '+(log.operatorName||'系统')+' · '+time+'</div><div class="popup-changelog-text">'+(log.content||'')+'</div></div></div>';
        }).join('');
        return '' +
            '<div class="popup-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>操作记录 <span style="opacity:.5;font-weight:400">('+logs.length+'条)</span></div>' +
            '<div class="popup-changelog" style="padding:10px 14px">' + items + '</div>';
    }



(function(){
    var u = null;
    try { u = JSON.parse(localStorage.getItem("aidc_user")); } catch(e){}
    if (u) {
        var nu = document.getElementById('navUser');
        if (nu) nu.innerHTML = '<div class="nav-avatar">'+(u.name||'管').charAt(0)+'</div><span>'+(u.name||'管理员')+'</span>';
    }
    var tt = document.getElementById('themeToggle');
    if (tt) tt.addEventListener('click', function(){ document.body.classList.toggle('theme-light'); });
    document.getElementById('navLogout') && document.getElementById('navLogout').addEventListener('click', function(){
        localStorage.removeItem('aidc_user');
        window.location.href = 'login.html';
    });
})();

</script>
