<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5">
    <title>机房列表 - AIDC Collector</title>

    <link rel="stylesheet" href="shared-light.css">

    <script src="api.js"></script>
    <style>
    
/* ===== 筛选区（对齐添加机房页面风格） ===== */
.filter-wrap { margin-bottom: 16px; }

/* 筛选卡片 */
.filter-card {
  background: #0F172A;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px;
  padding: 18px 24px;
  margin-bottom: 6px;
}
.filter-card-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.filter-card-icon {
  display: flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; flex-shrink: 0;
}
.filter-card-icon svg { width: 16px; height: 16px; }
.filter-card-title {
  font-size: 13px; font-weight: 600; color: #F1F5F9;
}

/* 筛选分类标题 */
.filter-section-title {
  font-size: 12px; font-weight: 500; color: #94A3B8;
  margin: 16px 0 10px 0; padding-bottom: 6px;
  border-bottom: 1px dashed rgba(255,255,255,.08);
}

/* 筛选行：12列等宽网格 */
.filter-row {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px 16px;
  margin-bottom: 8px;
}
.filter-row:last-child { margin-bottom: 0; }

/* 筛选字段 */
.filter-field { display: flex; flex-direction: column; }
.filter-field.col-3 { grid-column: span 3; }   /* 4个/行 */
.filter-field.col-4 { grid-column: span 4; }   /* 3个/行 */
.filter-field.col-6 { grid-column: span 6; }   /* 2个/行 */
.filter-field.col-12 { grid-column: span 12; }  /* 全宽 */
.filter-label {
  font-size: 11px; font-weight: 500; color: #94A3B8;
  margin-bottom: 6px; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.filter-field .form-input,
.filter-field .form-select {
  height: 34px; padding: 0 10px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.04); color: #F1F5F9;
  font-size: 12px; width: 100%; box-sizing: border-box;
  appearance: none; -webkit-appearance: none;
  transition: border-color .15s;
}
.filter-field .form-input:focus,
.filter-field .form-select:focus {
  outline: none; border-color: #0EA5E9; background: rgba(14,165,233,.06);
}
.filter-field .form-input::placeholder { color: #475569; }

/* 筛选操作栏 */
.filter-actions {
  display: flex; justify-content: flex-end; gap: 8px;
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,.06);
}

/* 进阶筛选展开/折叠 */
.filter-advanced-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,.12);
  background: transparent; color: #94A3B8;
  font-size: 12px; cursor: pointer; transition: all .15s;
  white-space: nowrap; flex-shrink: 0;
}
.filter-advanced-toggle:hover {
  background: rgba(255,255,255,.06); color: #F1F5F9; border-color: #0EA5E9;
}
.filter-advanced-toggle.active {
  background: rgba(14,165,233,.12); border-color: #0EA5E9; color: #38BDF8;
}
.filter-advanced-toggle svg { width: 12px; height: 12px; transition: transform .2s; }
.filter-advanced-toggle.active svg { transform: rotate(180deg); }

/* 进阶筛选面板 */
.filter-advanced-panel {
  display: none; margin-top: 6px;
  padding: 20px 24px;
}
.filter-advanced-panel.open { display: block; }

/* 筛选结果标签 */
.active-filters {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.active-filter-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  background: rgba(14,165,233,.12); color: #38BDF8;
  font-size: 11px; font-weight: 500;
}
.active-filter-tag button {
  width: 14px; height: 14px; border-radius: 50%;
  background: rgba(14,165,233,.3); color: #38BDF8;
  border: none; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  font-size: 9px; opacity: 0.7; transition: all .15s;
}
.active-filter-tag button:hover { opacity: 1; background: #EF4444; color: #fff; }
.filter-summary { font-size: 11px; color: #475569; margin-left: auto; }
.filter-summary strong { color: #94A3B8; }

    /* 统计摘要 */
    .filter-summary {
        font-size: 12px;
        color: var(--text-muted);
        padding: 6px 0;
    }
    .filter-summary strong { color: var(--text-secondary); }
/* Sortable column hover */
    .sort-icon {
        font-size: 16px !important;
        font-weight: bold;
        opacity: 0.5;
        transition: opacity 0.15s;
    }
    th.sortable:hover .sort-icon,
    th.sortable.active .sort-icon {
        opacity: 1;
    }
    th.sortable {
        cursor: pointer;
        user-select: none;
        transition: background-color 0.15s;
    }
    th.sortable:hover {
        background: var(--bg-hover);
    }
    .theme-light th.sortable:hover {
        background: var(--gray-200);
    }

    /* ========== 弹窗样式 ========== */
    .popup-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .popup-overlay.open { display: flex; }

    .popup-panel {
        background: rgba(15,23,42,0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 16px;
        width: 100%;
        max-width: 820px;
        max-height: 88vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        overflow: hidden;
    }
    .theme-light .popup-panel {
        background: rgba(255,255,255,0.88);
        border-color: rgba(0,0,0,0.08);
        box-shadow: 0 24px 80px rgba(0,0,0,0.12);
    }

    /* 弹窗头部 */
    .popup-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .popup-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .popup-title .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--accent); flex-shrink: 0;
    }
    .popup-header-right { display: flex; align-items: center; gap: 8px; }
    .popup-edit-btn {
        padding: 5px 14px; border-radius: 8px; border: 1px solid var(--accent);
        background: transparent; color: var(--accent); font-size: 12px;
        cursor: pointer; transition: all .15s; font-weight: 500;
    }
    .popup-edit-btn:hover { background: var(--accent); color: #fff; }
    .popup-edit-btn.saving { opacity: .5; pointer-events: none; }
    .popup-close-btn {
        width: 30px; height: 30px; border-radius: 8px; border: none;
        background: var(--bg-hover); color: var(--text-secondary);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: all .15s; font-size: 16px; flex-shrink: 0;
    }
    .popup-close-btn:hover { background: var(--danger-bg); color: var(--danger); }

    /* 行级编辑按钮 */
    .op-edit-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 28px; height: 28px; border-radius: 6px;
        background: rgba(14,165,233,.1); color: var(--accent);
        transition: background .15s; text-decoration: none;
    }
    .op-edit-btn:hover { background: var(--accent); color: #fff; }

    /* 编辑提示条 */
    .popup-edit-bar {
        display: none;
        padding: 8px 20px;
        background: rgba(245,158,11,0.12);
        border-bottom: 1px solid rgba(245,158,11,0.25);
        font-size: 12px;
        color: var(--warning);
        flex-shrink: 0;
        align-items: center;
        gap: 6px;
    }
    .popup-edit-bar.show { display: flex; }
    .popup-edit-bar svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* 弹窗主体 */
    .popup-body {
        overflow-y: auto;
        flex: 1;
        padding: 16px 20px;
        scrollbar-width: thin;
        scrollbar-color: var(--gray-700) transparent;
    }
    .popup-body::-webkit-scrollbar { width: 4px; }
    .popup-body::-webkit-scrollbar-thumb { background: var(--gray-700); border-radius: 4px; }

    /* 弹窗内 section */
    .popup-section {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 12px;
        overflow: hidden;
    }
    .theme-light .popup-section { background: rgba(0,0,0,0.02); }
    .popup-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--gray-500);
        padding: 8px 14px 6px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .popup-section-title svg { width: 12px; height: 12px; }
    .popup-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
    }
    .popup-field {
        padding: 7px 14px;
        border-bottom: 1px solid var(--border-light);
        display: flex;
        flex-direction: column;
        gap: 2px;
        transition: background .12s;
    }
    .popup-field:nth-last-child(-n+2) { border-bottom: none; }
    .popup-field-label {
        font-size: 10px;
        color: var(--gray-500);
        font-weight: 500;
        letter-spacing: .03em;
    }
    .popup-field-value {
        font-size: 13px;
        color: var(--text-primary);
        min-height: 18px;
        line-height: 1.5;
    }
    .popup-field-value.empty { color: var(--gray-600); font-style: italic; }

    /* 编辑状态下的字段 */
    .popup-field.edit-mode { padding: 6px 12px; }
    .popup-field.edit-mode .popup-field-value { display: none; }
    .popup-field.edit-mode .popup-edit-input { display: block !important; }

    .popup-edit-input {
        display: none;
        width: 100%;
        padding: 3px 7px;
        background: var(--bg-card);
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 12px;
        outline: none;
        box-shadow: 0 0 0 2px rgba(34,197,94,0.15);
    }
    .popup-edit-input:focus { border-color: var(--accent); }
    .popup-edit-select {
        display: none;
        width: 100%;
        padding: 3px 7px;
        background: var(--bg-card);
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 12px;
        outline: none;
    }
    .popup-field.edit-mode .popup-edit-select { display: block; }

    /* 弹窗底部操作条 */
    .popup-footer {
        display: none;
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        justify-content: flex-end;
        gap: 8px;
        background: rgba(0,0,0,0.15);
    }
    .popup-footer.show { display: flex; }
    .popup-footer .btn { padding: 7px 18px; font-size: 13px; border-radius: 8px; }

    /* changelog 行内 */
    .popup-changelog { padding: 8px 14px; }
    .popup-changelog-item {
        display: flex; gap: 10px; padding: 7px 10px;
        background: var(--bg-card); border-radius: 7px; margin-bottom: 6px;
        border-left: 3px solid var(--border);
    }
    .popup-changelog-item.create { border-left-color: var(--success); }
    .popup-changelog-item.update { border-left-color: var(--info); }
    .popup-changelog-item.status { border-left-color: var(--warning); }
    .popup-changelog-meta { font-size: 11px; color: var(--gray-500); margin-bottom: 2px; }
    .popup-changelog-text { font-size: 12px; color: var(--text-secondary); }

    </style>

    

</head>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1 class="page-title">机房列表</h1>
            <div class="page-actions">
                <button class="btn btn-secondary btn-sm" onclick="exportCurrentView()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    导出结果
                </button>
                <a href="datacenter-form.html" class="btn btn-primary btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新增机房
                </a>
            </div>
        </div>

        <!-- 筛选区 -->
        <div class="filter-wrap">

            <!-- 筛选卡片一：基础筛选 -->
            <div class="filter-card">
                <div class="filter-card-header">
                    <span class="filter-card-icon" style="color:#0EA5E9;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <span class="filter-card-title">快速筛选</span>
                </div>
                <div class="filter-row">
                    <div class="filter-field col-3">
                        <label class="filter-label">关键词</label>
                        <input type="text" id="search-keyword" class="form-input" placeholder="机房名称/地址..." onkeyup="handleSearch(event)">
                    </div>
                    <div class="filter-field col-3">
                        <label class="filter-label">地区</label>
                        <select id="filter-country" class="form-select" onchange="applyFilters()">
                            <option value="">全部地区</option>
                            <option value="中国">中国</option>
                            <option value="泰国">泰国</option>
                            <option value="马来西亚">马来西亚</option>
                            <option value="印尼">印尼</option>
                            <option value="菲律宾">菲律宾</option>
                            <option value="日本">日本</option>
                            <option value="新加坡">新加坡</option>
                            <option value="欧洲">欧洲</option>
                            <option value="澳大利亚">澳大利亚</option>
                        </select>
                    </div>
                    <div class="filter-field col-3">
                        <label class="filter-label">MW规模</label>
                        <select id="filter-mw" class="form-select" onchange="applyFilters()">
                            <option value="">全部规模</option>
                            <option value="micro">&lt;1 MW</option>
                            <option value="small">1-5 MW</option>
                            <option value="medium">5-20 MW</option>
                            <option value="large">20-100 MW</option>
                            <option value="hyperscale">&gt;100 MW</option>
                        </select>
                    </div>
                    <div class="filter-field col-3">
                        <label class="filter-label">状态</label>
                        <select id="filter-status" class="form-select" onchange="applyFilters()">
                            <option value="">全部状态</option>
                            <option value="new">新增</option>
                            <option value="collected">已收录</option>
                            <option value="negotiating">洽谈中</option>
                            <option value="signed">已签约</option>
                            <option value="rejected">已淘汰</option>
                        </select>
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-field col-3">
                        <label class="filter-label">交付时间</label>
                        <select id="filter-delivery" class="form-select" onchange="applyFilters()">
                            <option value="">全部时间</option>
                            <option value="immediate">已可交付</option>
                            <option value="3m">3个月内</option>
                            <option value="6m">半年内</option>
                            <option value="1y">一年内</option>
                        </select>
                    </div>
                    <div class="filter-field col-3">
                        <label class="filter-label">PUE值</label>
                        <select id="filter-pue" class="form-select" onchange="applyFilters()">
                            <option value="">全部PUE</option>
                            <option value="excellent">&lt;1.3 优秀</option>
                            <option value="good">1.3-1.4 良好</option>
                            <option value="average">1.4-1.5 一般</option>
                            <option value="poor">&gt;1.5 较差</option>
                        </select>
                    </div>
                    <div class="filter-field col-3">
                        <label class="filter-label">KYC状态</label>
                        <select id="filter-kyc" class="form-select" onchange="applyFilters()">

        var billing   = (document.getElementById('filter-billing')   || {value:''}).value;
        var cooling   = (document.getElementById('filter-cooling')   || {value:''}).value;
        var loadCap   = (document.getElementById('filter-load')       || {value:''}).value;
        var liquidSp  = (document.getElementById('filter-liquid')    || {value:''}).value;
        var raisedFl  = (document.getElementById('filter-floor')     || {value:''}).value;
        var isp       = (document.getElementById('filter-isp')        || {value:''}).value;
        var sup800g   = (document.getElementById('filter-800g')     || {value:''}).value;
        var roceSp    = (document.getElementById('filter-roce')      || {value:''}).value;
        var redundancy= (document.getElementById('filter-redundancy') || {value:''}).value;
        var filterMw  = (document.getElementById('filter-mw')        || {value:''}).value;
        var pue       = (document.getElementById('filter-pue')        || {value:''}).value;
        var isoCert   = (document.getElementById('filter-iso')       || {value:''}).value;
        var levelCert= (document.getElementById('filter-level')      || {value:''}).value;
        var ops247    = (document.getElementById('filter-ops247')    || {value:''}).value;
        var liqMaint  = (document.getElementById('filter-liquid-maint')||{value:''}).value;

        var filtered = currentList.filter(function(d) {
            // 关键词搜索
            if (keyword) {
                var kwFields = [
                    (d.name||'').toLowerCase(), (d.dc_name||'').toLowerCase(),
                    (d.address||'').toLowerCase(), (d.park||'').toLowerCase(),
                    
                    (d.liaison||'').toLowerCase(), (d.source||'').toLowerCase(),
                    (d.province||'').toLowerCase(), (d.city||'').toLowerCase(),
                    (d.contact||'').toLowerCase(), (d.remark||'').toLowerCase()];
                var matched = kwFields.some(function(f){ return f.includes(keyword); });
                if (!matched) return false;
            }
            // 主行筛选
            if (country   && d.country   !== country)     return false;
            if (status    && d.status    !== status)      return false;
            if (kyc       && d.kycStatus !== kyc)        return false;
            if (liaison   && (d.liaison||'').toLowerCase() !== liaison) return false;
            
            if (source    && d.source    !== source)       return false;
            if (property_ && (d.property||'') !== property_) return false;
            if (pue) {
                var pv = parseFloat(d.pue_value||d.pue)||0;
                if (pue==='excellent'&&pv>=1.3)   return false;
                if (pue==='good'&&(pv<1.3||pv>1.4))   return false;
                if (pue==='average'&&(pv<1.4||pv>1.5)) return false;
                if (pue==='poor'&&pv<=1.5)   return false;
            }
            if (sup800g   && (d.support800g||'') !== sup800g)    return false;
            if (roceSp    && (d.roceSupport||'')  !== roceSp)     return false;
            if (redundancy&& (d.networkRedundancy||'') !== redundancy) return false;
            if (isoCert   && (d.isoCertified||'') !== isoCert)    return false;
            if (levelCert && (d.levelCertification||'') !== levelCert) return false;
            if (ops247    && (d.ops247||'')        !== ops247)     return false;
            if (liqMaint  && (d.liquidCoolingMaintenance||'') !== liqMaint) return false;
            // 机柜规模
            if (rackScale) {
                var r = d.rackCount||0;
                if (rackScale==='micro'&&r>=50)       return false;
                if (rackScale==='small'&&(r<50||r>200))   return false;
                if (rackScale==='medium'&&(r<200||r>500))  return false;
                if (rackScale==='large'&&(r<500||r>1000))  return false;
                if (rackScale==='hyperscale'&&r<=1000) return false;
            }
            // 功率
            if (power) {
                var kw = parseFloat(d.powerPerRack)||0;
                if (power==='low'&&kw>=6)      return false;
                if (power==='standard'&&(kw<6||kw>10)) return false;
                if (power==='high'&&(kw<10||kw>15))   return false;
                if (power==='ultra'&&kw<=15)  return false;
            }
            // MW 规模
            if (filterMw) {
                var mw = parseFloat(d.availPowerMw)||0;
                if (filterMw==='micro'&&mw>=1)      return false;
                if (filterMw==='small'&&(mw<1||mw>5))      return false;
                if (filterMw==='medium'&&(mw<5||mw>20))     return false;
                if (filterMw==='large'&&(mw<20||mw>100))    return false;
                if (filterMw==='hyperscale'&&mw<=100) return false;
            }
            // 冷却方式
            if (cooling && (d.coolingSystem||'') !== cooling) return false;
            // 承重能力
            if (loadCap) {
                var bl = parseFloat(d.floorLoad||d.bearing||0);
                if (loadCap==='standard'&&bl>=800)   return false;
                if (loadCap==='heavy'&&(bl<800||bl>1200))  return false;
                if (loadCap==='ultra-heavy'&&bl<=1200) return false;
            }
            // 液冷支持
            if (liquidSp && (d.liquidCoolingSupport||'') !== liquidSp) return false;
            // 架空地板
            if (raisedFl) {
                var hasFloor = d.raisedFloorHeight ? '有' : '无';
                if (raisedFl !== hasFloor) return false;
            }
            // UPS 配置
            if (upsCfg && (d.upsConfig||'') !== upsCfg) return false;
            // 柴发冗余
            if (genRed && (d.generatorRedundancy||'') !== genRed) return false;
            // 电费模式
            if (billing && (d.billingMode||'') !== billing) return false;
            // 运营商
            if (isp && (d.isp||'') !== isp) return false;
            // 交付时间
            if (delivery) {
                var ed = d.expectedDate||d.delivery_date||'';
                if (!ed) {
                    if (delivery!=='immediate') return false;
                } else {
                    var now = new Date();
                    var target = new Date(ed.indexOf('-')>0 ? ed : ed+'-01');
                    var diffDays = (target-now)/(1000*60*60*24);
                    if (delivery==='immediate'&&diffDays>0)    return false;
                    if (delivery==='3m'&&(diffDays<0||diffDays>90))    return false;
                    if (delivery==='6m'&&(diffDays<0||diffDays>180))   return false;
                    if (delivery==='1y'&&(diffDays<0||diffDays>365))   return false;
                    if (delivery==='future'&&diffDays<=0) return false;
                }
            }
            return true;
        });

        document.getElementById('record-count').textContent = filtered.length;
        document.getElementById('total-count').textContent   = filtered.length;
        document.getElementById('filter-count').textContent = filtered.length;
        currentPage = 1;
        var start = 0, end = PAGE_SIZE;
        document.getElementById('page-start').textContent = filtered.length>0?1:0;
        document.getElementById('page-end').textContent   = Math.min(end, filtered.length);
        renderTable(filtered.slice(start, end));
        _lastFiltered = filtered;
        renderPagination(filtered.length);
    }

    function resetFilters() {
        var ids = ['search-keyword','filter-country','filter-status','filter-kyc',
                   'filter-liaison','filter-liaison-adv','filter-source','filter-property',
                   'filter-rack-scale','filter-power','filter-ups','filter-generator','filter-billing',
                   'filter-cooling','filter-load','filter-liquid','filter-floor',
                   'filter-isp','filter-800g','filter-roce','filter-redundancy',
                   'filter-mw','filter-pue','filter-delivery',
                   'filter-iso','filter-level','filter-ops247','filter-liquid-maint'];
        ids.forEach(function(id){
            var el = document.getElementById(id);
            if (el) el.value = el.tagName==='INPUT'?(el.type==='checkbox'?false:''):'';
        });
        var cb = document.getElementById('filter-rented-bottom');
        if (cb) cb.checked = false;
        applyFilters();
    }

    // ── 渲染表格 ────────────────────────────────────────────────
    var sortKey = 'createdAt';
    var sortDir = 'desc';

    function toggleSort(key) {
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = 'desc';
        }
        document.querySelectorAll('th.sortable .sort-icon').forEach(function(el){ el.textContent='↕'; });
        var active = document.querySelector('th[data-sort="'+key+'"] .sort-icon');
        if (active) active.textContent = sortDir === 'asc' ? '↑' : '↓';
        if (typeof applyFilters === 'function') applyFilters();
    }

    function renderTable(pageData) {
        var tbody = document.getElementById('table-body');
        var empty = document.getElementById('empty-state');
        var table = document.querySelector('.data-table');
        if (!pageData||pageData.length===0) {
            table.style.display='none'; empty.style.display='block'; return;
        }
        table.style.display='table'; empty.style.display='none';

        var STATUS_ORDER = {'new':1,'collected':2,'negotiating':3,'signed':4,'rejected':5,'rented':6,'已收录':2,'洽谈中':3,'已签约':4,'已驳回':5};
        var KYC_ORDER = {'completed':4,'in_progress':3,'not_started':1,'not_applicable':2,'已完成':4,'进行中':3,'未开始':1,'不适用':2};

        pageData = pageData.slice().sort(function(a,b){
            var va = a[sortKey]||'', vb = b[sortKey]||'';
            if (sortKey==='mw'||sortKey==='pue') {
                return sortDir==='asc' ? (parseFloat(va)||0)-(parseFloat(vb)||0) : (parseFloat(vb)||0)-(parseFloat(va)||0);
            }
            if (sortKey==='createdAt'||sortKey==='delivery_date') {
                var ta = new Date(va).getTime()||0, tb = new Date(vb).getTime()||0;
                return sortDir==='asc' ? ta-tb : tb-ta;
            }
            if (sortKey==='status') { va=STATUS_ORDER[va]||99; vb=STATUS_ORDER[vb]||99; }
            if (sortKey==='kyc') { va=KYC_ORDER[va]||0; vb=KYC_ORDER[vb]||0; }
            return sortDir==='asc' ? String(va).localeCompare(String(vb),'zh-CN') : String(vb).localeCompare(String(va),'zh-CN');
        });

        tbody.innerHTML = pageData.map(function(item){
            return '<tr data-id="'+item.id+'">' +
                '<td><a href="javascript:void(0)" class="table-link" onclick="openPopup(\''+item.id+'\')">'+(item.dc_name||item.name||'未命名')+'</a>' +
                (item.park?'<div class="sub-text" style="font-size:11px">'+esc(item.park||'')+(item.building?(' · '+item.building+'号楼'):'')+'</div>':'')+'</td>' +
                '<td>'+(item.country||'-')+'<br><span class="sub-text" style="font-size:11px">'+(item.city||'')+'</span></td>' +
                '<td style="text-align:center">'+(item.mw?(item.mw+' MW'):'-')+'</td>' +
                '<td>'+(item.delivery_date||'-')+'</td>' +
                '<td><span class="status-tag '+AIDC_API.getStatusCls(item.status||item.cooperation_status||'')+'">'+AIDC_API.getStatusLabel(item.status||item.cooperation_status||'')+'</span></td>' +
                '<td style="text-align:center">'+(item.pue_value!==undefined&&item.pue_value!==null&&item.pue_value!==''?item.pue_value:'-')+'</td>' +
                '<td style="text-align:center">'+(item.expandable?'<span class="expand-tag yes">是</span>':'<span class="expand-tag no">否</span>')+'</td>' +
                '<td><span class="kyc-td '+getKycCls(item.kyc_status||'')+'">'+getKycLabel(item.kyc_status||'')+'</span></td>' +
                '<td>'+(item.createdAt?new Date(item.createdAt).toLocaleDateString('zh-CN'):'-')+'</td>' +
                '<td>'+(item.liaison?'<span class="dc-tag" style="background:var(--gray-800)">'+esc(item.liaison)+'</span>':'-')+'</td>' +
                '<td style="white-space:nowrap"><a href="datacenter-form.html?id='+item.id+'" class="op-edit-btn" title="编辑" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></a></td>' +
                '</tr>';
        }).join('');
    }

    // ── 分页 ────────────────────────────────────────────────────
    function renderPagination(total) {
        var el = document.getElementById('pagination');
        if (!el) return;
        var totalPages = Math.ceil(total / PAGE_SIZE);
        if (totalPages <= 1) { el.innerHTML=''; return; }
        var html = '';
        for (var i=1; i<=totalPages; i++) {
            html += '<button class="page-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
        }
        el.innerHTML = html;
    }
    var _lastFiltered = [];
    function goPage(p) {
        currentPage = p;
        var start = (p-1)*PAGE_SIZE, end = start+PAGE_SIZE;
        document.getElementById('page-start').textContent = _lastFiltered.length>0?start+1:0;
        document.getElementById('page-end').textContent = Math.min(end, _lastFiltered.length);
        renderTable(_lastFiltered.slice(start, end));
    }

    // ── 辅助函数 ────────────────────────────────────────────────
    function esc(s) {
        var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML;
    }
    function escAttr(s) {
        return (s||'').replace(/"/g,'&quot;');
    }

    function showToast(msg, type) {
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast toast-'+(type||'info');
        el.style.display = 'block';
        clearTimeout(el._t);
        el._t = setTimeout(function(){ el.style.display='none'; }, 3000);
    }

    function getFilteredList() { applyFilters(); return currentList.filter(function(){ return true; }); }

    
</script>
</body>
</html>
