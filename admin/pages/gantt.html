    <style>
    :root {
        --brand: #0EA5E9; --brand-light: #38BDF8; --accent: #22C55E;
        --bg: #020617; --card: #0F172A; --card-hover: #162032;
        --border: rgba(255,255,255,.08); --border-mid: rgba(255,255,255,.12);
        --text-primary: #F1F5F9; --text-sec: #94A3B8; --text-muted: #475569;
        --s-signing: #8B5CF6; --s-delivery: #0EA5E9; --s-boi: #F59E0B;
        --s-purchase: #EC4899; --s-entry: #22C55E; --s-compute: #14B8A6;
        --left-w: 240px; --week-w: 40px; --row-h: 50px; --header-h: 58px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    
    
    
    
    
    
    
    
    
    
    
    
    
    .main { padding: 24px; min-height: calc(100vh - 56px); }
    .page-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .page-sub { font-size: 13px; color: var(--text-sec); margin-bottom: 20px; }
    .ctrl-bar {
        background: var(--card); border: 1px solid var(--border); border-radius: 8px;
        padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .ctrl-lbl { font-size: 12px; color: var(--text-muted); }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
        padding: 4px 12px; border-radius: 20px; font-size: 12px;
        background: rgba(255,255,255,.04); color: var(--text-sec);
        border: 1px solid var(--border); cursor: pointer;
    }
    .chip:hover { background: rgba(255,255,255,.08); }
    .chip.active { background: rgba(14,165,233,.15); color: var(--brand); border-color: var(--brand); }
    .btn-primary {
        padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
        background: var(--brand); color: white; display: flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { background: var(--brand-light); }
    .gt-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card); }
    .gt-scroll { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 280px); position: relative; }
    .gt { display: grid; }
    .gt-tl-header { position: sticky; top: 0; z-index: 20; display: grid; background: #0B1623; border-bottom: 1px solid var(--border-mid); }
    .gt-lk { position: sticky; left: 0; z-index: 10; background: #020617; border-right: 1px solid var(--border-mid); }
    .gt-corner { position: sticky; left: 0; top: 0; z-index: 25; background: #0B1623; border-right: 1px solid var(--border-mid); border-bottom: 1px solid var(--border-mid); }
    .gt-bar { border-radius: 3px; box-shadow: 0 1px 3px rgba(0,0,0,.3); transition: all .15s; }
    .gt-bar:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.4); }
    .tooltip {
        position: fixed; background: rgba(15,23,42,.98); border: 1px solid var(--border-mid);
        border-radius: 6px; padding: 8px 12px; font-size: 12px; color: var(--text-primary);
        z-index: 1000; pointer-events: none; max-width: 280px; box-shadow: 0 4px 12px rgba(0,0,0,.5);
    }
    .modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,.6);
        display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal {
        background: var(--card); border: 1px solid var(--border); border-radius: 12px;
        width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
    }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--text-sec); }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-sec); margin-bottom: 6px; }
    .form-input, .form-select { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: rgba(255,255,255,.02); color: var(--text-primary); font-size: 13px; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; }
    .btn-ghost { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
    .btn-brand { background: var(--brand); color: white; }
    .btn-danger { background: rgba(239,68,68,.12); color: #EF4444; border: 1px solid rgba(239,68,68,.3); }
    </style>
</head>

    <main class="main">
        <h1 class="page-title">项目进度</h1>
        <p class="page-sub">每个机房项目可展开查看子任务，点击甘特条可编辑任务起止日期与进度</p>
        <div class="ctrl-bar">
            <span class="ctrl-lbl">项目</span><div class="chips" id="projChips"></div>
            <span class="ctrl-lbl" style="margin-left:16px">阶段</span><div class="chips" id="stageChips"></div>
            <button class="btn-primary" style="margin-left:auto" onclick="openProjectModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新建项目</button>
        </div>
        <div class="gt-wrap"><div class="gt-scroll" id="gtScroll"><div class="gt" id="gtTable"></div></div></div>
    </main>
    <div class="modal-overlay" id="taskModal"><div class="modal"><div class="modal-header"><span class="modal-title" id="taskModalTitle">编辑任务</span><button class="modal-close" onclick="closeTaskModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="modal-body"><input type="hidden" id="editProjId"><input type="hidden" id="editTaskId"><div class="form-group"><label class="form-label">任务阶段</label><select id="editStage" class="form-select"></select></div><div class="form-group"><label class="form-label">任务名称</label><input type="text" id="editName" class="form-input" placeholder="如：预计签约"></div><div class="form-group"><label class="form-label">开始日期</label><input type="date" id="editStart" class="form-input"></div><div class="form-group"><label class="form-label">结束日期</label><input type="date" id="editEnd" class="form-input"></div><div class="form-group"><label class="form-label">进度（%）</label><input type="number" id="editPct" class="form-input" min="0" max="100" value="0"></div><div class="form-group"><label class="form-label">备注</label><textarea id="editNote" class="form-input" rows="3" placeholder="可选备注信息"></textarea></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="deleteTask()" id="btnDelete" style="display:none;margin-right:auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><polyline points="3,6 5,6 5,21 19,21 19,6"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="12" y1="6" x2="12" y2="19"/></svg>删除</button><button class="btn btn-ghost" onclick="closeTaskModal()">取消</button><button class="btn btn-brand" onclick="saveTask()">保存</button></div></div></div>
    <div class="modal-overlay" id="projModal"><div class="modal"><div class="modal-header"><span class="modal-title" id="projModalTitle">新建项目</span><button class="modal-close" onclick="closeProjModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="modal-body"><input type="hidden" id="editProjId2"><div class="form-group"><label class="form-label">项目名称</label><input type="text" id="projName" class="form-input" placeholder="如：AIMS - 吉隆坡"></div><div class="form-group"><label class="form-label">关联机房</label><select id="projDcSelect" class="form-select"></select></div><div class="form-group"><label class="form-label">设计功率（MW）</label><input type="number" id="projPower" class="form-input" step="0.1" placeholder="如：3.0"></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeProjModal()">取消</button><button class="btn btn-brand" onclick="saveProject()">保存</button></div></div></div>

    <script src="gantt.js">

(function(){
    var u = null;
    try { u = JSON.parse(localStorage.getItem("aidc_user")); } catch(e){}
    if (u) {
        var nu = document.getElementById('navUser');
        if (nu) nu.innerHTML = '<div class="nav-avatar">'+(u.name||'管').charAt(0)+'</div><span>'+(u.name||'管理员')+'</span>';
    }
    var tt = document.getElementById('themeToggle');
    if (tt) tt.addEventListener('click', function(){ document.body.classList.toggle('theme-light'); });
    document.getElementById('navLogout') && document.getElementById('navLogout').addEventListener('click', function(){
        localStorage.removeItem('aidc_user');
        window.location.href = 'login.html';
    });
})();

</script>
