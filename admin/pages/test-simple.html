<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户录入测试</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a1628;color:#e2e8f0;min-height:100vh;padding:32px}
.box{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;max-width:480px}
.hd{font-size:15px;font-weight:600;color:#f1f5f9;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #334155}
.row{display:flex;gap:10px;margin-bottom:16px}
.txt{flex:1;height:40px;padding:0 14px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#fff;font-size:14px}
.btn{height:40px;padding:0 20px;border-radius:8px;border:none;background:#0ea5e9;color:#fff;font-size:14px;cursor:pointer;font-weight:500}
.btn:hover{background:#0284c7}
.tags{min-height:36px;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.tag{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:16px;background:rgba(14,165,233,.15);color:#38bdf8;font-size:13px}
.tagx{width:16px;height:16px;border-radius:50%;background:rgba(14,165,233,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:#38bdf8;flex-shrink:0}
.tagx:hover{background:#ef4444;color:#fff}
.hint{font-size:12px;color:#64748b}
.log{background:#000;border:1px solid #1a3a2a;border-radius:8px;padding:12px;margin-top:16px;font-family:monospace;font-size:12px;color:#22c55e;white-space:pre-wrap;max-height:200px;overflow:auto}
</style>
</head>
<body>
<h1 style="font-size:20px;color:#38bdf8;margin-bottom:20px">客户录入功能测试</h1>
<div class="box">
  <div class="hd">预留客户</div>
  <div class="row">
    <input type="text" class="txt" id="c-input" placeholder="输入客户代号，多个用逗号（,）分隔" onkeydown="hk(event)">
    <button class="btn" onclick="addC()">录入客户</button>
  </div>
  <div class="tags" id="c-tags"></div>
  <div class="hint">输入后点击"录入客户"或按 Enter 键添加，点击 × 删除</div>
</div>
<div class="log" id="log">ready\n</div>

<script>
var cs = [];
function log(m){document.getElementById('log').textContent += m+'\n'}
function hk(e){if(e.key==='Enter'){e.preventDefault();addC()}}
function addC(){
  var v=(document.getElementById('c-input').value||'').trim();
  log('addC called: "'+v+'"');
  if(!v){log('empty, skip');return}
  var ns=v.split(/[,，]/).map(function(s){return s.trim()}).filter(function(s){return s});
  log('parsed: '+JSON.stringify(ns));
  ns.forEach(function(n){if(cs.indexOf(n)===-1)cs.push(n)});
  document.getElementById('c-input').value='';
  render();log('cs now: '+JSON.stringify(cs))
}
function rmC(n){var i=cs.indexOf(n);if(i>-1){cs.splice(i,1);render();log('removed: '+n)}}
function render(){
  var el=document.getElementById('c-tags'),h='';
  cs.forEach(function(n){h+='<span class=tag>'+n+'<span class=tagx onclick=rmC("'+n.replace(/"/g,'\\"')+'")>x</span></span>'});
  el.innerHTML=h
}
log('loaded ok, cs='+JSON.stringify(cs));
</script>
</body>
</html>
