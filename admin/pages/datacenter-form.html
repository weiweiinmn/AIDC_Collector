<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加机房 - AIDC Collector</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="shared-light.css">
    <style>
    /* ============================================
       datacenter-form.html — V4 字段版
       ============================================ */

    /* ── 输入框统一 ── */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none !important;
        margin: 0 !important;
    }
    input[type="number"] { -moz-appearance: textfield; }

    /* ── 主题切换按钮 ── */
    .theme-toggle {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 8px;
        border: 1px solid rgba(255,255,255,.12);
        background: transparent; color: #94A3B8; cursor: pointer;
        transition: all .15s; flex-shrink: 0;
    }
    .theme-toggle:hover { background: rgba(255,255,255,.06); color: #F1F5F9; }
    .theme-toggle .icon-sun { display: none; }
    body.theme-light .theme-toggle .icon-sun { display: block; }
    body.theme-light .theme-toggle .icon-moon { display: none; }

    /* ── 表单布局 ── */
    body {
        margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #020617; color: #F1F5F9; min-height: 100vh;
    }
    .main-content { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── 卡片 ── */
    .card {
        background: #0F172A; border: 1px solid rgba(255,255,255,.08);
        border-radius: 12px; padding: 24px 28px; margin-bottom: 20px;
    }

    /* ── 模块标题 ── */
    .section-header {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 20px; padding-bottom: 12px;
        border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .section-icon {
        display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
        width: 20px; height: 20px;
    }
    .section-icon svg { width: 16px; height: 16px; }
    .section-title { font-size: 14px; font-weight: 600; color: #F1F5F9; line-height: 1; }

    /* ── 表单网格：核心字段（窄行，4列）── */
    .form-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
    }
    .form-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .form-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 500; color: #94A3B8; line-height: 1; }
    .form-label .unit { font-size: 11px; color: #475569; font-weight: 400; }
    .form-input, .form-select {
        height: 36px; padding: 0 12px; border-radius: 6px;
        border: 1px solid rgba(255,255,255,.08);
        background: rgba(255,255,255,.03); color: #F1F5F9;
        font-size: 13px; font-family: inherit;
        transition: border-color .15s; box-sizing: border-box;
        width: 100%;
    }
    .form-input:focus, .form-select:focus {
        outline: none; border-color: #0EA5E9;
    }
    .form-input::placeholder { color: #334155; }
    .form-select option { background: #1E293B; }

    /* 输入+单位 */
    .input-unit { position: relative; }
    .input-unit input { padding-right: 44px; }
    .input-unit .unit-label {
        position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        font-size: 12px; color: #475569; pointer-events: none;
    }

    /* ── 核心字段高亮行 ── */
    .core-fields {
        display: grid;
        grid-template-columns: 2fr 1.5fr 1.5fr;
        gap: 14px; align-items: end;
    }
    .core-fields .form-group { flex: 1; }

    /* ── 五级联动 ── */
    .region-cascade {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
    }
    .region-cascade select { height: 36px; font-size: 13px; border-radius: 6px; }

    /* ── 提交按钮 ── */
    .form-actions {
        display: flex; justify-content: center; gap: 16px;
        margin-top: 28px; padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,.06);
    }
    .btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 10px 24px; border-radius: 8px;
        font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer;
        transition: all .15s; border: none; text-decoration: none;
    }
    .btn-secondary { background: rgba(255,255,255,.06); color: #94A3B8; border: 1px solid rgba(255,255,255,.08); }
    .btn-secondary:hover { background: rgba(255,255,255,.1); color: #F1F5F9; }
    .btn-primary { background: #0EA5E9; color: #fff; }
    .btn-primary:hover { background: #38BDF8; }

    /* ── 周历弹窗 ── */
    .modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,.6); z-index: 9999;
        align-items: center; justify-content: center;
    }
    .modal-box {
        background: #0F172A; border: 1px solid rgba(255,255,255,.12);
        border-radius: 14px; padding: 24px; min-width: 560px;
        box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .modal-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 18px;
    }
    .modal-title { font-size: 15px; font-weight: 600; color: #F1F5F9; }
    .modal-close {
        width: 28px; height: 28px; border-radius: 6px; border: none;
        background: rgba(255,255,255,.06); color: #94A3B8; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
    }
    .wp-controls {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 12px;
    }
    .wp-nav-btn {
        padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,.08);
        background: transparent; color: #94A3B8; cursor: pointer; font-size: 13px;
    }
    .wp-year { font-size: 15px; font-weight: 600; color: #F1F5F9; }
    .wp-grid {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    }
    .wp-month { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); border-radius: 8px; padding: 10px; }
    .wp-month-label { font-size: 12px; color: #64748B; margin-bottom: 8px; }
    .wp-weeks { display: flex; flex-direction: column; gap: 3px; }
    .wp-week {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 8px; border-radius: 5px; cursor: pointer;
        font-size: 12px; color: #94A3B8;
        transition: all .1s;
    }
    .wp-week:hover { background: rgba(14,165,233,.15); color: #0EA5E9; }
    .wp-week.selected { background: rgba(14,165,233,.2); color: #0EA5E9; }
    .wp-week-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .wp-tip { font-size: 12px; color: #475569; margin-top: 12px; text-align: center; }
    .wp-btns { display: flex; justify-content: center; gap: 10px; margin-top: 16px; }

    /* ── 标签说明 ── */
    .tag-info { font-size: 11px; color: #475569; margin-top: 2px; }
    .tag-required { color: #EF4444; margin-left: 2px; }

    /* ── 分类标签 ── */
    .field-section-label {
        font-size: 11px; color: #475569; font-weight: 500;
        margin-bottom: 10px; letter-spacing: .05em; text-transform: uppercase;
    }

    /* ============================================
       浅色主题
       ============================================ */
    body.theme-light { background: #F8FAFC; color: #0F172A; }
    body.theme-light .card { background: #fff; border-color: #E2E8F0; }
    body.theme-light .section-title { color: #0F172A; }
    body.theme-light .form-label { color: #64748B; }
    body.theme-light .form-input, body.theme-light .form-select { background: #fff; border-color: #CBD5E1; color: #0F172A; }
    body.theme-light .form-input:focus { border-color: #0EA5E9; }
    body.theme-light .form-input::placeholder { color: #CBD5E1; }
    body.theme-light .form-select option { background: #fff; color: #0F172A; }
    body.theme-light .btn-secondary { background: #F1F5F9; color: #64748B; border-color: #CBD5E1; }
    body.theme-light .wp-week { color: #64748B; }
    body.theme-light .modal-box { background: #fff; border-color: #E2E8F0; }
    body.theme-light .modal-title { color: #0F172A; }
    body.theme-light .wp-year { color: #0F172A; }
    </style>
</head>

    <main class="main-content">

        <!-- 页面标题 -->
        <div style="margin-bottom: 24px;">
            <h1 style="font-size: 20px; font-weight: 700; color: #F1F5F9; margin: 0 0 4px;">添加机房</h1>
            <p style="font-size: 13px; color: #475569; margin: 0;">按 AIDC 选址调研表（V4）录入机房数据</p>
        </div>

        <!-- =====================
             ★ 核心信息（最优先）
             ===================== -->
        <div class="card" style="border-color: rgba(14,165,233,.25); background: rgba(14,165,233,.04);">
            <div class="section-header">
                <span class="section-icon" style="color:#0EA5E9">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </span>
                <span class="section-title">核心信息</span>
            </div>

            <!-- 第一行：机房名称 + 服务商 + 交付时间 -->
            <div class="form-grid" style="margin-bottom: 16px;">
                <div class="form-group" style="grid-column: span 2;">
                    <label class="form-label">机房名称<span class="tag-required">*</span></label>
                    <input type="text" class="form-input" name="name" placeholder="如: Telehouse Bangkok TY3" maxlength="100">
                </div>
                <div class="form-group" style="grid-column: span 1;">
                    <label class="form-label">机房服务商</label>
                    <input type="text" class="form-input" name="provider" placeholder="如: Telehouse / Equinix">
                </div>
                <div class="form-group" style="grid-column: span 1;">
                    <label class="form-label">预计交付运营时间</label>
                    <div class="input-unit">
                        <input type="text" class="form-input" name="delivery_date" id="delivery-date-input" placeholder="点击选择交付时间" readonly onclick="openDeliveryWeekPicker()">
                        <span class="unit-label">📅</span>
                    </div>
                </div>
            </div>

            <!-- 第二行：所在地（五级联动） -->
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">机房所在地<span class="tag-required">*</span></label>
                <div class="region-cascade">
                    <div>
                        <select class="form-select" id="r1" onchange="onCountryChange()">
                            <option value="">国家</option><option>中国</option><option>泰国</option><option>马来西亚</option><option>印尼</option><option>菲律宾</option><option>新加坡</option><option>日本</option><option>欧洲</option><option>澳大利亚</option><option>美国</option><option>其他</option>
                        </select>
                    </div>
                    <div>
                        <select class="form-select" id="r2" onchange="onProvChange()"><option value="">省/州</option></select>
                    </div>
                    <div>
                        <select class="form-select" id="r3" onchange="onCityChange()"><option value="">城市</option></select>
                    </div>
                    <div>
                        <select class="form-select" id="r4"><option value="">区/县</option></select>
                    </div>
                    <div>
                        <input type="text" class="form-input" id="r5" placeholder="街道/详细地址" maxlength="200">
                    </div>
                </div>
            </div>

            <!-- 第三行：电力 + 扩容 + 制冷 -->
            <div class="form-grid" style="margin-top: 16px;">
                <div class="form-group">
                    <label class="form-label">市电总容量 <span class="unit">kVA</span></label>
                    <div class="input-unit">
                        <input type="number" class="form-input" name="total_power_kva" placeholder="0">
                        <span class="unit-label">kVA</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">当前可用电力 <span class="unit">MW</span></label>
                    <div class="input-unit">
                        <input type="number" class="form-input" name="available_power_mw" placeholder="0" step="0.1">
                        <span class="unit-label">MW</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">可扩容电力上限 <span class="unit">MW</span></label>
                    <div class="input-unit">
                        <input type="number" class="form-input" name="max_power_mw" placeholder="0" step="0.1">
                        <span class="unit-label">MW</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">是否可扩容</label>
                    <select class="form-select" name="expandable">
                        <option value="">请选择</option>
                        <option value="是">是</option>
                        <option value="否">否</option>
                        <option value="可改造">可改造</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">机房制冷方式</label>
                    <select class="form-select" name="cooling_type">
                        <option value="">请选择</option>
                        <option>风冷</option><option>水冷</option><option>液冷（冷板）</option><option>液冷（浸没）</option><option>自然冷却</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">是否支持冷板式液冷</label>
                    <select class="form-select" name="cold_plate_support">
                        <option value="">请选择</option>
                        <option value="是">是</option><option value="否">否</option><option value="可改造">可改造</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- =====================
             二、基本信息
             ===================== -->
        <div class="card">
            <div class="section-header">
                <span class="section-icon" style="color:#22C55E">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <span class="section-title">基本信息</span>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">机房产权归属</label>
                    <select class="form-select" name="property_type">
                        <option value="">请选择</option>
                        <option>自有</option><option>租赁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">详细地址</label>
                    <input type="text" class="form-input" name="address" placeholder="街道/园区/楼栋/楼层" maxlength="200">
                </div>
                <div class="form-group">
                    <label class="form-label">联系人</label>
                    <input type="text" class="form-input" name="contact_person" placeholder="姓名">
                </div>
                <div class="form-group">
                    <label class="form-label">联系方式</label>
                    <input type="text" class="form-input" name="contact_phone" placeholder="电话/邮箱">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label class="form-label">信息来源</label>
                    <input type="text" class="form-input" name="source" placeholder="如: 客户推荐 / 展会 / 网络搜索">
                </div>
            </div>
        </div>

        <!-- =====================
             三、机柜资源
             ===================== -->
        <div class="card">
            <div class="section-header">
                <span class="section-icon" style="color:#F59E0B">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                </span>
                <span class="section-title">机柜资源</span>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">总机柜数量 <span class="unit">个</span></label>
                    <div class="input-unit">
                        <input type="number" class="form-input" name="cabinet_count" placeholder="0">
                        <span class="unit-label">个</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">当前可提供机柜 <span class="unit">个</span></label>
                    <div class="input-unit">
                        <input type="number" class="form-input" name="cabinet_available" placeholder="0">
                        <span class="unit-label">个</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">机柜最高支撑功率 <span class="unit">kW/柜</span></label>
                    <div class="input-unit">
                        <input type="number" class="form-input" name="cabinet_max_power" placeholder="0" step="0.1">
                        <span class="unit-label">kW/柜</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">现有液冷机柜功率 <span class="unit">kW/柜</span></label>
                    <div class="input-unit">
                        <input type="number" class="form-input" name="liquid_cabinet_power" placeholder="0" step="0.1">
                        <span class="unit-label">kW/柜</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">现有液冷机柜数量 <span class="unit">个</span></label>
                    <div class="input-unit">
                        <input type="number" class="form-input" name="liquid_cabinet_count" placeholder="0">
                        <span class="unit-label">个</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- =====================
             四、电力系统
             ===================== -->

function onCountryChange() {
    var country = document.getElementById('r1').value;
    var provEl = document.getElementById('r2');
    var cityEl = document.getElementById('r3');
    var areaEl = document.getElementById('r4');
    provEl.innerHTML = '<option value="">省/州</option>';
    cityEl.innerHTML = '<option value="">城市</option>';
    areaEl.innerHTML = '<option value="">区/县</option>';
    if (!country || !REGION_DATA[country]) return;
    var provs = Object.keys(REGION_DATA[country]);
    provs.forEach(function(p){
        var opt = document.createElement('option');
        opt.value = p; opt.textContent = p; provEl.appendChild(opt);
    });
}
function onProvChange() {
    var country = document.getElementById('r1').value;
    var prov = document.getElementById('r2').value;
    var cityEl = document.getElementById('r3');
    var areaEl = document.getElementById('r4');
    cityEl.innerHTML = '<option value="">城市</option>';
    areaEl.innerHTML = '<option value="">区/县</option>';
    if (!country || !prov || !REGION_DATA[country] || !REGION_DATA[country][prov]) return;
    var cities = Object.keys(REGION_DATA[country][prov]);
    cities.forEach(function(c){
        var opt = document.createElement('option');
        opt.value = c; opt.textContent = c; cityEl.appendChild(opt);
    });
}
function onCityChange() {
    var country = document.getElementById('r1').value;
    var prov = document.getElementById('r2').value;
    var city = document.getElementById('r3').value;
    var areaEl = document.getElementById('r4');
    areaEl.innerHTML = '<option value="">区/县</option>';
    if (!country || !prov || !city) return;
    var cityData = REGION_DATA[country][prov];
    if (!cityData || !Array.isArray(cityData) || cityData.length === 0) return;
    var areas = cityData.filter(function(a){ return a !== '其他' && a !== city; });
    areas.forEach(function(a){
        var opt = document.createElement('option');
        opt.value = a; opt.textContent = a; areaEl.appendChild(opt);
    });
    var opt = document.createElement('option');
    opt.value = '其他'; opt.textContent = '其他'; areaEl.appendChild(opt);
}

    var data = {};
    document.querySelectorAll('input[name], select[name], textarea[name]').forEach(function(el){
        if (el.type === 'radio' && !el.checked) return;
        data[el.name] = el.value;
    });
    // 五级联动地区
    data.country  = document.getElementById('r1').value;
    data.province = document.getElementById('r2').value;
    data.city     = document.getElementById('r3').value;
    data.area     = document.getElementById('r4').value;
    data.street   = document.getElementById('r5').value;
    return data;
}

// ── 提交 ────────────────────────────────────────────────
function handleSubmit(e) {
    e && e.preventDefault();
    var data = collectFormData();
    if (!data.name) { alert('请填写机房名称'); return; }
    try {
        var result = AIDC_API.createDatacenter(data);
        if (result.error) { alert('保存失败：' + result.error); return; }
        alert('机房信息已提交保存！');
        window.location.href = 'datacenter-list.html';
    } catch(err) { alert('保存失败：' + err.message); }
}

// ── 周历选择 ─────────────────────────────────────────────
var wpYear = new Date().getFullYear();
var wpMode = 'delivery';

function openDeliveryWeekPicker() {
    wpMode = 'delivery';
    document.getElementById('wpModalTitle').textContent = '选择预计交付时间';
    document.getElementById('weekPickerModal').style.display = 'flex';
    renderWeekPicker();
}
function closeDeliveryWeekPicker() {
    document.getElementById('weekPickerModal').style.display = 'none';
}
function wpStepYear(dir) {
    wpYear += dir;
    renderWeekPicker();
}
function wpStepMonth(dir) {
    var now = new Date();
    var start = new Date(wpYear, 0, 1);
    start.setDate(start.getDate() + dir * 30);
    wpYear = start.getFullYear();
    renderWeekPicker();
}
function renderWeekPicker() {
    document.getElementById('wpYearLabel').textContent = wpYear + ' 年';
    var grid = document.getElementById('wpGrid');
    var html = '';
    for (var m = 1; m <= 12; m++) {
        var firstDay = new Date(wpYear, m-1, 1);
        var lastDay = new Date(wpYear, m, 0);
        html += '<div class="wp-month">';
        html += '<div class="wp-month-label">' + m + '月</div><div class="wp-weeks">';
        // 找每月第一周
        var weekStart = new Date(firstDay);
        weekStart.setDate(weekStart.getDate() - (weekStart.getDay() === 0 ? 6 : weekStart.getDay() - 1));
        var weekEnd = new Date(weekStart);
        weekEnd.setDate(weekEnd.getDate() + 6);
        var weekCount = 0;
        while (weekStart <= lastDay) {
            var wn = getWeekNumber(weekEnd);
            var label = m + '月第' + (weekCount+1) + '周';
            html += '<div class="wp-week" onclick="wpSelect('' + fmtDate(weekStart) + '', '' + fmtDate(weekEnd) + '')">';
            html += '<div class="wp-week-dot"></div>' + label + '</div>';
            weekStart.setDate(weekStart.getDate() + 7);
            weekEnd.setDate(weekEnd.getDate() + 7);
            weekCount++;
            if (weekCount > 6) break;
        }
        html += '</div></div>';
    }
    grid.innerHTML = html;
}
function getWeekNumber(date) {
    var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
    var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
    return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}
function fmtDate(d) {
    var dd = new Date(d);
    return dd.getFullYear() + '-' + String(dd.getMonth()+1).padStart(2,'0') + '-' + String(dd.getDate()).padStart(2,'0');
}
function wpSelect(start, end) {
    document.getElementById('delivery-date-input').value = start + ' ~ ' + end;
    closeDeliveryWeekPicker();
}
function wpSetThisWeek() {
    var now = new Date();
    var day = now.getDay(), diff = day===0 ? -6 : 1-day;
    var monday = new Date(now); monday.setDate(now.getDate()+diff);
    var sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    wpSelect(fmtDate(monday), fmtDate(sunday));
}
function wpSetNextMonth() {
    var next = new Date(new Date().getFullYear(), new Date().getMonth()+1, 1);
    var last = new Date(new Date().getFullYear(), new Date().getMonth()+2, 0);
    wpSelect(fmtDate(next), fmtDate(last));
}

// 点击遮罩关闭
document.getElementById('weekPickerModal') && document.getElementById('weekPickerModal').addEventListener('click', function(e){ if(e.target===this) closeDeliveryWeekPicker(); });
