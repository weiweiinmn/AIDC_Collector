    <script>
        let recordId = null;
        let record = null;

        document.addEventListener('DOMContentLoaded', function() {
            var urlParams = new URLSearchParams(window.location.search);
            recordId = urlParams.get('id');
            if (!recordId) { showToast('缺少机房ID', 'error'); setTimeout(function(){ window.location.href = 'datacenter-list.html'; }, 1500); return; }
            loadData();
        });

        function loadData() {
            var res = AIDC_API.getDatacenters({ pageSize: 1000 });
            var list = res.data.list || [];
            record = list.find(function(d){ return d.id === recordId; });
            if (!record) { showToast('机房记录不存在', 'error'); setTimeout(function(){ window.location.href = 'datacenter-list.html'; }, 1500); return; }
            renderData();
        }

        var KYC_MAP = {
            'not_started':  { label: '未开始',     cls: 'kyc-info'    },
            'in_progress':  { label: '进行中',     cls: 'kyc-warning' },
            'pending_doc':  { label: '待补充材料', cls: 'kyc-warning' },
            'approved':     { label: '已完成',     cls: 'kyc-success' },
            'rejected':     { label: '已驳回',     cls: 'kyc-danger'  },
            'not_required': { label: '不需要',     cls: 'kyc-accent'  },
        };

        function renderData() {
            var name = record.name || '机房详情';
            document.getElementById('datacenter-name').textContent = name;
            document.title = name + ' - AIDC Collector';
            document.getElementById('edit-btn').href = 'datacenter-form.html?id=' + recordId;

            document.getElementById('stat-cabinet').textContent   = record.rackCount || 0;
            document.getElementById('stat-available').textContent = '-';
            document.getElementById('stat-server').textContent    = record.powerPerRack || '-';
            document.getElementById('stat-pue').textContent       = record.pue || '-';

            setDetailValue('name',    record.name);
            setDetailValue('region',  (record.country||'') + (record.province?' '+record.province:'') + (record.city?' '+record.city:''));
            setDetailValue('address', record.address);
            setDetailValue('source',  record.source);
            setDetailValue('liaison', record.liaison);

            var kycEl = document.getElementById('detail-kycStatus');
            var km = KYC_MAP[record.kycStatus] || { label: record.kycStatus||'-', cls: 'kyc-info' };
            kycEl.textContent = km.label;
            kycEl.className   = 'kyc-tag ' + km.cls;
            if (record.kycRemark) {
                document.getElementById('kyc-remark-row').style.display = '';
                setDetailValue('kycRemark', record.kycRemark);
            }

            var statusEl = document.getElementById('detail-status');
            statusEl.textContent = AIDC_API.getStatusLabel(record.status);
            statusEl.className   = 'status-tag ' + AIDC_API.getStatusCls(record.status);

            if (record.remark) {
                document.getElementById('remark-section').style.display = 'block';
                setDetailValue('remark', record.remark);
            }

            renderChangelog();
        }

        function renderChangelog() {
            var res = AIDC_API.getDatacenterChangelogs(recordId);
            var logs = (res && res.data) || [];
            var countEl  = document.getElementById('changelog-count');
            var emptyEl  = document.getElementById('changelog-empty');
            var listEl   = document.getElementById('changelog-list');
            var latestEl = document.getElementById('changelog-latest');

            countEl.textContent = logs.length + ' 条';
            if (logs.length === 0) {
                emptyEl.style.display = '';
                listEl.innerHTML = '';
                latestEl.textContent = '';
                return;
            }
            emptyEl.style.display = 'none';
            latestEl.textContent = (logs[0].operatorName||'') + ' · ' + formatTime(logs[0].createdAt);

            var iconSvg = {
                create: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
                delete: '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
                update: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
                status: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
            };
            var typeLabel = { create: '新增', update: '修改', delete: '删除', status: '状态变更' };

            listEl.innerHTML = logs.map(function(log) {
                var ic = log.type === 'create' ? 'success' : (log.type === 'delete' ? 'danger' : 'info');
                return '<div class="changelog-item ' + ic + '">' +
                    '<div class="changelog-icon ' + ic + '">' +
                    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' + (iconSvg[log.type]||iconSvg.update) + '</svg>' +
                    '</div>' +
                    '<div class="changelog-content">' +
                    '<div class="changelog-header">' +
                    '<span class="changelog-type ' + ic + '">' + (typeLabel[log.type]||'变更') + '</span>' +
                    '<span class="changelog-op">' + esc(log.operatorName||'') + '</span>' +
                    '<span class="changelog-time">' + formatTime(log.createdAt) + '</span>' +
                    '</div>' +
                    '<div class="changelog-text">' + esc(log.content||'') + '</div>' +
                    '</div></div>';
            }).join('');
        }

        function toggleChangelog(el) {
            var body = el.nextElementSibling;
            var icon = el.querySelector('.toggle-icon');
            body.style.display = body.style.display === 'none' ? '' : 'none';
            icon.style.transform = body.style.display === 'none' ? '' : 'rotate(90deg)';
        }

        function formatTime(isoStr) {
            if (!isoStr) return '';
            var d = new Date(isoStr);
            return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
        }

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function setDetailValue(key, value) {
            var el = document.getElementById('detail-' + key);
            if (el) {
                el.textContent = value || '-';
                if (!value) el.classList.add('empty');
            }
        }

        function goBack() { window.location.href = 'datacenter-list.html'; }

        function showToast(message, type) {
            type = type || 'success';
            var existing = document.querySelector('.toast');
            if (existing) existing.remove();
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            var icons = {
                success: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
                error:   '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
            };
            toast.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+(icons[type]||icons.success)+'</svg><span>'+message+'</span>';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
<script>
(function(){
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  // 读取本地存储的偏好
  var saved = localStorage.getItem('aidc_theme');
  if (saved === 'light') {
    document.body.classList.add('theme-light');
  }
  btn.addEventListener('click', function(){
    document.body.classList.toggle('theme-light');
    var isLight = document.body.classList.contains('theme-light');
    localStorage.setItem('aidc_theme', isLight ? 'light' : 'dark');
  });
  // 监听 OS 级深色模式（可选支持）
  var mq = window.matchMedia('(prefers-color-scheme: dark)');
  if (!saved && !mq.matches) {
    document.body.classList.add('theme-light');
  }
})();
</script>
</body>
</html>
