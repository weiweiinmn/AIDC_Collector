<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5">
    <title>仪表盘 - AIDC Collector</title>
    <link rel="stylesheet" href="shared.css?v=1776180444">
    <link rel="stylesheet" href="shared-light.css">
    <!-- 登录态校验 -->
    <script>
    (function(){
      var u = null;
      try { u = JSON.parse(localStorage.getItem("aidc_user")); } catch(e){}
      if (!u) { window.location.href = "login.html"; return; }
    })();
    </script>
    <script src="api.js"></script>
    <style>
    /* ── 仪表盘页面专属样式 ─────────────────────────────────── */
    :root {
        --dash-bg:        #0b1120;
        --dash-card-bg:   #111827;
        --dash-border:    rgba(255,255,255,0.06);
        --dash-glow:      rgba(34,197,94,0.15);
        --dash-radius:    12px;
        --dash-kpi-h:     88px;
    }

    body.theme-light {
        --dash-bg:        #f5f6fa;
        --dash-card-bg:   #ffffff;
        --dash-border:    rgba(0,0,0,0.07);
        --dash-glow:      rgba(22,163,74,0.08);
    }

    .dash-page {
        background: var(--dash-bg);
        min-height: 100vh;
        padding: 20px 24px 40px;
    }

    /* ── KPI 卡片区 ───────────────────────────────────────── */
    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 20px;
    }

    .kpi-card {
        background: var(--dash-card-bg);
        border: 1px solid var(--dash-border);
        border-radius: var(--dash-radius);
        padding: 18px 20px;
        position: relative;
        overflow: hidden;
        transition: border-color 0.2s, transform 0.2s;
    }
    .kpi-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
    }
    .kpi-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: var(--kpi-color, var(--accent));
        border-radius: var(--dash-radius) var(--dash-radius) 0 0;
    }

    .kpi-card:nth-child(1) { --kpi-color: #22c55e; }
    .kpi-card:nth-child(3) { --kpi-color: #f59e0b; }
    .kpi-card:nth-child(4) { --kpi-color: #8b5cf6; }

    /* 已签约 MW — 金色强调风格 */
    .kpi-card--primary {
        border-color: rgba(245, 158, 11, 0.35);
        background: linear-gradient(135deg, var(--dash-card-bg) 60%, rgba(245,158,11,0.08));
    }
    .kpi-card--primary:hover { border-color: rgba(245, 158, 11, 0.6); }
    .kpi-card--primary::before { background: #f59e0b; }
    .kpi-card--primary .kpi-value { color: #f59e0b; }
    .kpi-card--primary .kpi-icon { background: rgba(245,158,11,0.15); color: #f59e0b; }

    .kpi-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
    }
    .kpi-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--gray-500);
        letter-spacing: 0.03em;
    }
    .kpi-icon {
        width: 32px; height: 32px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.04);
        color: var(--kpi-color);
    }
    .kpi-icon svg { width: 16px; height: 16px; }
    body.theme-light .kpi-icon {
        background: rgba(0,0,0,0.04);
    }

    .kpi-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1;
        margin-bottom: 6px;
        letter-spacing: -0.02em;
    }

    .kpi-sub {
        font-size: 11px;
        color: var(--gray-500);
    }
    .kpi-sub strong {
        color: var(--kpi-color);
        font-weight: 600;
    }

    /* ── 状态进度条（第二行） ──────────────────────────────── */
    .status-section {
        background: var(--dash-card-bg);
        border: 1px solid var(--dash-border);
        border-radius: var(--dash-radius);
        padding: 18px 20px;
        margin-bottom: 20px;
    }

    .status-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }
    .status-section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
    }
    .status-bars {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
    }
    .status-bar-item { }
    .status-bar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
    }
    .status-tag {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
    }
    .status-tag.success  { background: rgba(34,197,94,0.12);  color: #22c55e; }
    .status-tag.info    { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .status-tag.warning { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .status-tag.accent  { background: rgba(139,92,246,0.12); color: #8b5cf6; }
    .status-tag.danger  { background: rgba(239,68,68,0.12);  color: #ef4444; }
    .status-bar-count {
        font-size: 12px;
        color: var(--gray-500);
        font-weight: 600;
    }
    .status-bar-track {
        height: 5px;
        background: rgba(255,255,255,0.06);
        border-radius: 3px;
        overflow: hidden;
    }
    body.theme-light .status-bar-track {
        background: rgba(0,0,0,0.06);
    }
    .status-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.6s ease;
    }
    .status-bar-fill.success  { background: #22c55e; }
    .status-bar-fill.info    { background: #3b82f6; }
    .status-bar-fill.warning { background: #f59e0b; }

    /* ── 基础设施能力 ─────────────────────────────────────── */
    .capability-section {
        background: var(--dash-card-bg);
        border: 1px solid var(--dash-border);
        border-radius: var(--dash-radius);
        padding: 18px 20px;
        margin-bottom: 20px;
    }
    .capability-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }
    .capability-section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
    }
    .capability-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
    }
    @media (max-width: 640px) {
        .capability-grid { grid-template-columns: 1fr; }
    }
    .capability-item {
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--dash-border);
        border-radius: 10px;
        padding: 14px 16px;
        transition: border-color 0.2s;
    }
    body.theme-light .capability-item {
        background: rgba(0,0,0,0.015);
    }
    .capability-item:hover { border-color: rgba(255,255,255,0.12); }
    .capability-item-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
    }
    .capability-label {
        font-size: 12px;
        color: var(--gray-500);
        font-weight: 500;
    }
    .capability-badge {
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 5px;
        font-weight: 600;
    }
    .capability-badge.green  { background: rgba(34,197,94,0.12);  color: #22c55e; }
    .capability-badge.yellow { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .capability-badge.blue   { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .capability-main {
        display: flex;
        align-items: baseline;
        gap: 4px;
        margin-bottom: 8px;
    }
    .capability-num {
        font-size: 26px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1;
    }
    .capability-unit {
        font-size: 13px;
        color: var(--gray-500);
        font-weight: 500;
    }
    .capability-sub {
        font-size: 11px;
        color: var(--gray-600);
        margin-bottom: 8px;
    }
    .capability-track {
        height: 4px;
        background: rgba(255,255,255,0.06);
        border-radius: 2px;
        overflow: hidden;
    }
    body.theme-light .capability-track {
        background: rgba(0,0,0,0.06);
    }
    .capability-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.6s ease;
    }
    .capability-fill.green  { background: #22c55e; }
    .capability-fill.yellow { background: #f59e0b; }
    .capability-fill.blue   { background: #3b82f6; }
    .status-bar-fill.accent  { background: #8b5cf6; }
    .status-bar-fill.danger  { background: #ef4444; }

    /* ── 三栏布局（国家分布 + KYC + 快速操作） ───────────── */
    .dash-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px;
    }

    .dash-panel {
        background: var(--dash-card-bg);
        border: 1px solid var(--dash-border);
        border-radius: var(--dash-radius);
        padding: 16px 20px;
    }

    .dash-panel-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--gray-500);
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .dash-panel-title svg { width: 14px; height: 14px; }

    /* 国家分布 */
    .country-list { display: flex; flex-direction: column; gap: 8px; }
    .country-item {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .country-flag {
        width: 28px; height: 20px;
        border-radius: 3px;
        background: rgba(255,255,255,0.06);
        display: flex; align-items: center; justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        overflow: hidden;
    }
    .country-name {
        font-size: 13px;
        color: var(--text-secondary);
        flex: 1;
    }
    .country-count {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-primary);
    }
    .country-bar-wrap {
        flex: 1;
        height: 4px;
        background: rgba(255,255,255,0.05);
        border-radius: 2px;
        overflow: hidden;
    }
    body.theme-light .country-bar-wrap {
        background: rgba(0,0,0,0.05);
    }
    .country-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #10b981);
        border-radius: 2px;
    }

    /* KYC 饼图（CSS 实现） */
    .kyc-summary { display: flex; flex-direction: column; gap: 10px; }
    .kyc-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        background: rgba(255,255,255,0.02);
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    body.theme-light .kyc-row {
        background: rgba(0,0,0,0.02);
        border-color: rgba(0,0,0,0.06);
    }
    .kyc-dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .kyc-label { font-size: 13px; color: var(--text-secondary); flex: 1; }
    .kyc-count { font-size: 14px; font-weight: 700; color: var(--text-primary); }

    /* 快速操作（右侧栏） */
    .qa-stack { display: flex; flex-direction: column; gap: 8px; }
    .qa-action {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--dash-border);
        border-radius: 8px;
        text-decoration: none;
        transition: all 0.15s;
        color: var(--text-secondary);
    }
    body.theme-light .qa-action {
        background: rgba(0,0,0,0.02);
    }
    .qa-action:hover {
        background: rgba(34,197,94,0.08);
        border-color: rgba(34,197,94,0.25);
        color: var(--accent);
        transform: translateX(2px);
    }
    .qa-action-icon {
        width: 30px; height: 30px;
        border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.05);
        flex-shrink: 0;
    }
    body.theme-light .qa-action-icon {
        background: rgba(0,0,0,0.05);
    }
    .qa-action-icon svg { width: 15px; height: 15px; }
    .qa-action-text { font-size: 13px; font-weight: 500; }
    .qa-action-sub { font-size: 11px; opacity: 0.6; margin-left: auto; }

    /* ── 最近录入 ───────────────────────────────────────── */
    .recent-panel {
        background: var(--dash-card-bg);
        border: 1px solid var(--dash-border);
        border-radius: var(--dash-radius);
        overflow: hidden;
    }
    .recent-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid var(--dash-border);
    }
    .recent-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
    }
    .recent-table {
        width: 100%;
        border-collapse: collapse;
    }
    .recent-table th {
        padding: 10px 16px;
        font-size: 11px;
        font-weight: 600;
        color: var(--gray-600);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        text-align: left;
        background: rgba(255,255,255,0.01);
        border-bottom: 1px solid var(--dash-border);
    }
    body.theme-light .recent-table th {
        background: rgba(0,0,0,0.01);
    }
    .recent-table td {
        padding: 11px 16px;
        font-size: 13px;
        color: var(--text-secondary);
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    body.theme-light .recent-table td {
        border-bottom-color: rgba(0,0,0,0.04);
    }
    .recent-table tr:last-child td { border-bottom: none; }
    .recent-table tr:hover td { background: rgba(255,255,255,0.02); }
    body.theme-light .recent-table tr:hover td { background: rgba(0,0,0,0.015); }
    .recent-table .name-cell {
        color: var(--text-primary);
        font-weight: 500;
    }
    .recent-table .name-cell a {
        color: var(--text-primary);
        text-decoration: none;
    }
    .recent-table .name-cell a:hover { color: var(--accent); }
    .customer-tag {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        background: rgba(255,255,255,0.05);
        color: var(--text-secondary);
    }
    body.theme-light .customer-tag {
        background: rgba(0,0,0,0.05);
    }

    /* ── KYC 阻塞清单 ───────────────────────────────────── */
    .kyc-blocker-section {
        background: var(--dash-card-bg);
        border: 1px solid var(--dash-border);
        border-radius: var(--dash-radius);
        padding: 18px 20px;
        margin-bottom: 20px;
    }
    .kyc-blocker-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
    }
    .kyc-blocker-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
    }
    .kyc-blocker-count-badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 600;
    }
    .kyc-blocker-count-badge.danger  { background: rgba(239,68,68,0.12);  color: #ef4444; }
    .kyc-blocker-count-badge.success { background: rgba(34,197,94,0.12);  color: #22c55e; }
    .kyc-blocker-list { display: flex; flex-direction: column; gap: 8px; }
    .kyc-blocker-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.04);
        border-radius: 10px;
        transition: border-color 0.2s;
    }
    body.theme-light .kyc-blocker-item {
        background: rgba(0,0,0,0.015);
        border-color: rgba(0,0,0,0.06);
    }
    .kyc-blocker-item:hover { border-color: rgba(239,68,68,0.25); }
    .kyc-blocker-item.clear:hover { border-color: rgba(34,197,94,0.25); }
    .kyc-blocker-icon {
        width: 32px; height: 32px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        font-size: 16px;
    }
    .kyc-blocker-icon.warn { background: rgba(245,158,11,0.12); }
    .kyc-blocker-icon.ok   { background: rgba(34,197,94,0.12); }
    .kyc-blocker-info { flex: 1; min-width: 0; }
    .kyc-blocker-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .kyc-blocker-name a {
        color: var(--text-primary);
        text-decoration: none;
    }
    .kyc-blocker-name a:hover { color: var(--accent); }
    .kyc-blocker-detail {
        font-size: 11px;
        color: var(--gray-500);
        margin-top: 2px;
    }
    .kyc-blocker-tag {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 5px;
        font-weight: 600;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .kyc-blocker-tag.pending { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .kyc-blocker-tag.stale   { background: rgba(239,68,68,0.12);  color: #ef4444; }
    .kyc-blocker-empty {
        text-align: center;
        padding: 20px;
        color: var(--gray-500);
        font-size: 13px;
    }
    .kyc-blocker-empty-icon { font-size: 28px; margin-bottom: 6px; }

    /* 底部提示 */
    .dash-footer {
        text-align: center;
        padding: 16px;
        font-size: 11px;
        color: var(--gray-600);
    }

    /* 加载动画 */
    .dash-skeleton {
        background: linear-gradient(90deg,
            rgba(255,255,255,0.03) 25%,
            rgba(255,255,255,0.07) 50%,
            rgba(255,255,255,0.03) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 4px;
    }
    body.theme-light .dash-skeleton {
        background: linear-gradient(90deg,
            rgba(0,0,0,0.03) 25%,
            rgba(0,0,0,0.06) 50%,
            rgba(0,0,0,0.03) 75%);
        background-size: 200% 100%;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* 快速操作（顶部紧凑横排） */
    .quick-actions-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .qa-btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 14px; border-radius: 20px;
        font-size: 13px; font-weight: 500; text-decoration: none;
        border: 1.5px solid transparent; transition: all 0.18s ease; white-space: nowrap;
    }
    .qa-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .qa-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .qa-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 3px 12px rgba(22,163,74,0.35); }
    .qa-secondary { background: var(--bg-card); color: var(--text-secondary); border-color: var(--border-strong); }
    .qa-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
        .dash-row { grid-template-columns: 1fr 1fr; }
    }
    
    </style>

    

</head>

                    <div class="capability-main">

    <!-- 主题切换 -->
    <script>
    (function(){
      var t = localStorage.getItem('aidc_theme');
      if (t==='light') document.body.classList.add('theme-light');
    })();
    document.getElementById('themeToggle').addEventListener('click', function(){
      var isLight = document.body.classList.toggle('theme-light');
      localStorage.setItem('aidc_theme', isLight ? 'light' : 'dark');
    });

    var user = null;
    try { user = JSON.parse(localStorage.getItem('aidc_user')); } catch(e){}
    if (user) {
      var av = document.querySelector('.nav-avatar');
      if (av) av.textContent = (user.name||'管').charAt(0);
    }

    var KYC_MAP = {
        'not_started':  { label:'未开始',  cls:'danger' },
        'in_progress':  { label:'进行中',  cls:'warning'},
        'pending_doc':  { label:'待补充', cls:'warning'},
        'approved':     { label:'已完成', cls:'success'},
        'rejected':     { label:'已驳回', cls:'danger' },
        'not_required': { label:'不需要', cls:'accent' },
    };
    var STATUS_MAP = {
        'new':         { label:'新增',   cls:'info'    },
        'collected':   { label:'已收录', cls:'success' },
        'negotiating': { label:'洽谈中', cls:'warning' },
        'signed':      { label:'已签约', cls:'accent'  },
        'rejected':    { label:'已淘汰', cls:'danger'  },
    };

    function esc(s) {
        var d = document.createElement('div');
        d.textContent = s||'';
        return d.innerHTML;
    }

    function loadDashboard() {
        AIDC_API.seedDatacenters();
        AIDC_API.seedUsers();
        var res   = AIDC_API.getStats();
        var stats = res.data || {};

        var dist  = stats.statusDist || {};
        var total = stats.total || 0;
        var negCount = (dist['negotiating']||0);
        var negPct   = total > 0 ? (negCount / total * 100).toFixed(0) + '%' : '0%';
        var mwPct    = stats.totalMw > 0 && total > 0
                          ? (stats.signedMw / stats.totalMw * 100).toFixed(0) + '%'
                          : '—';

        // KPI 卡片
        // ① 机房总数 + 本月新增
        document.getElementById('kpi-total-value').textContent = total;
        document.getElementById('kpi-total-sub').textContent   = stats.monthCount || 0;
        // ② 已签约 MW（核心战略指标，金色卡片）
        document.getElementById('kpi-mw-value').textContent = stats.signedMw
            ? stats.signedMw + ' MW'
            : '—';
        document.getElementById('kpi-mw-sub').textContent = mwPct;
        // ③ 洽谈中
        document.getElementById('kpi-neg-value').textContent = negCount;
        document.getElementById('kpi-neg-sub').textContent   = negPct;
        // ④ 本周新增 + 月累计
        document.getElementById('kpi-week-value').textContent = stats.weekCount || 0;
        document.getElementById('kpi-week-sub').textContent   = stats.monthCount || 0;

        // 状态分布
        renderStatusBars(dist, stats.total||0);

        // 基础设施能力
        renderCapability(stats);

        // 加载完整列表计算 KYC 和国家
        var listRes = AIDC_API.getDatacenters({ pageSize: 1000 });
        var list    = listRes.data ? listRes.data.list || [] : [];
        renderCountry(list, stats.total||0);
        renderKYC(list);

        // 最近录入
        var recent = list.slice(0, 6);
        renderRecent(recent);
    }

    function renderStatusBars(dist, total) {
        var el = document.getElementById('status-bars');
        if (!el) return;
        var items = Object.keys(dist).map(function(k){
            return { key:k, label: (STATUS_MAP[k]||{label:k}).label, cls:(STATUS_MAP[k]||{cls:'info'}).cls, count:dist[k]||0 };
        });
        items.sort(function(a,b){ return b.count-a.count; });
        if (items.length===0) { el.innerHTML='<div style="color:var(--gray-600);font-size:13px;">暂无数据</div>'; return; }
        el.innerHTML = items.map(function(item){
            var pct = total>0 ? (item.count/total*100).toFixed(1) : 0;
            return '<div class="status-bar-item">' +
                '<div class="status-bar-header">' +
                '<span class="status-tag '+item.cls+'">'+item.label+'</span>' +
                '<span class="status-bar-count">'+item.count+' 个 · '+pct+'%</span>' +
                '</div>' +
                '<div class="status-bar-track">' +
                '<div class="status-bar-fill '+item.cls+'" style="width:'+pct+'%"></div>' +
                '</div></div>';
        }).join('');
    }

    function renderCapability(stats) {
        var total = stats.total || 0;
        var section = document.getElementById('cap-800g');
        if (!section) return;

        // 800G 网络
        var g800c = stats.network800gCount || 0;
        var g800t = stats.network800gTotal || total;
        var g800p = g800t > 0 ? (g800c / g800t * 100).toFixed(0) : 0;
        document.getElementById('cap-800g-num').textContent   = g800c;
        document.getElementById('cap-800g-sub').textContent   = '占总数 ' + g800p + '%';
        document.getElementById('cap-800g-badge').textContent = g800c + '/' + g800t;
        document.getElementById('cap-800g-fill').style.width  = g800p + '%';

        // 液冷
        var liqc  = stats.liquidCoolingCount || 0;
        var liqt  = stats.liquidCoolingTotal || total;
        var liqp  = liqt > 0 ? (liqc / liqt * 100).toFixed(0) : 0;
        document.getElementById('cap-liquid-num').textContent   = liqc;
        document.getElementById('cap-liquid-sub').textContent   = '占总数 ' + liqp + '%';
        document.getElementById('cap-liquid-badge').textContent = liqc + '/' + liqt;
        document.getElementById('cap-liquid-fill').style.width  = liqp + '%';

        // PUE 均值
        var pue = stats.avgPue;
        document.getElementById('cap-pue-num').textContent = pue !== null && pue !== undefined ? pue : '—';
        var pueBadge = document.getElementById('cap-pue-badge');
        if (pue !== null && pue !== undefined) {
            if (pue <= 1.4) {
                pueBadge.textContent = '🌟 领先';
                pueBadge.className = 'capability-badge green';
            } else if (pue <= 1.5) {
                pueBadge.textContent = '✅ 良好';
                pueBadge.className = 'capability-badge blue';
            } else {
                pueBadge.textContent = '⚠️ 待优化';
                pueBadge.className = 'capability-badge yellow';
            }
            // PUE 进度条：1.0=0%，2.0=100%，反向（越低越好）
            var puePct = Math.max(0, Math.min(100, (2.0 - pue) / 1.0 * 100)).toFixed(0);
            document.getElementById('cap-pue-fill').style.width = puePct + '%';
        } else {
            pueBadge.textContent = '—';
            pueBadge.className = 'capability-badge green';
            document.getElementById('cap-pue-fill').style.width = '0%';
        }
    }

    function renderCountry(list, total) {
        var el = document.getElementById('country-list');
        if (!el) return;
        var byCountry = {};
        list.forEach(function(d){ byCountry[d.country||'未知'] = (byCountry[d.country||'未知']||0)+1; });
        var items = Object.keys(byCountry).map(function(c){ return {name:c, count:byCountry[c]}; });
        items.sort(function(a,b){ return b.count-a.count; });
        if (items.length===0) { el.innerHTML='<div style="color:var(--gray-600);font-size:13px;">暂无数据</div>'; return; }
        el.innerHTML = items.slice(0,6).map(function(item){
            var pct = total>0 ? (item.count/total*100).toFixed(0) : 0;
            return '<div class="country-item">' +
                '<div class="country-name">'+esc(item.name)+'</div>' +
                '<div class="country-bar-wrap"><div class="country-bar-fill" style="width:'+pct+'%;opacity:'+(0.4+parseFloat(pct)/100*0.6).toFixed(2)+'"></div></div>' +
                '<div class="country-count">'+item.count+'</div></div>';
        }).join('');
    }

    function renderKYC(list) {
        var el = document.getElementById('kyc-summary');
        if (!el) return;
        var byKYC = {};
        list.forEach(function(d){ byKYC[d.kycStatus||'not_started'] = (byKYC[d.kycStatus||'not_started']||0)+1; });
        var total = list.length;
        var done  = (byKYC['approved']||0) + (byKYC['not_required']||0);
        var undone = total - done;

        var rows = [
            { key:'approved',     label:'已完成',     color:'#22c55e' },
            { key:'in_progress', label:'进行中',      color:'#f59e0b' },
            { key:'pending_doc', label:'待补充材料',  color:'#f97316' },
            { key:'not_started', label:'未开始',      color:'#6b7280' },
            { key:'rejected',    label:'已驳回',      color:'#ef4444' },
            { key:'not_required',label:'不需要',      color:'#8b5cf6' },
        ];
        el.innerHTML = rows.map(function(r){
            var count = byKYC[r.key]||0;
            return '<div class="kyc-row">' +
                '<div class="kyc-dot" style="background:'+r.color+'"></div>' +
                '<span class="kyc-label">'+r.label+'</span>' +
                '<span class="kyc-count">'+count+'</span></div>';
        }).join('');
    }

    function renderRecent(list) {
        var tbody = document.getElementById('recent-tbody');
        if (!tbody) return;
        if (!list||list.length===0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--gray-600);padding:24px;">暂无数据</td></tr>';
            return;
        }
        tbody.innerHTML = list.map(function(d){
            var sm = STATUS_MAP[d.status]||{label:'-',cls:'info'};
            return '<tr>' +
                '<td class="name-cell"><a href="datacenter-view.html?id='+d.id+'">'+esc(d.name||'-')+'</a></td>' +
                '<td>'+esc((d.country||'')+(d.city?' '+d.city:'')).trim()+'</td>' +
                '<td><span class="customer-tag">'+esc(d.customer||'-')+'</span></td>' +
                '<td><span class="status-tag '+sm.cls+'">'+sm.label+'</span></td>' +
                '<td>'+(d.createdAt?new Date(d.createdAt).toLocaleDateString('zh-CN'):'-')+'</td></tr>';
        }).join('');
    }

    loadDashboard();
    

(function(){
    var u = null;
    try { u = JSON.parse(localStorage.getItem("aidc_user")); } catch(e){}
    if (u) {
        var nu = document.getElementById('navUser');
        if (nu) nu.innerHTML = '<div class="nav-avatar">'+(u.name||'管').charAt(0)+'</div><span>'+(u.name||'管理员')+'</span>';
    }
    var tt = document.getElementById('themeToggle');
    if (tt) tt.addEventListener('click', function(){ document.body.classList.toggle('theme-light'); });
    document.getElementById('navLogout') && document.getElementById('navLogout').addEventListener('click', function(){
        localStorage.removeItem('aidc_user');
        window.location.href = 'login.html';
    });
})();

</script>
