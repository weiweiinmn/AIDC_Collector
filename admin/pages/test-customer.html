<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户录入测试</title>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a1628; color: #e2e8f0; padding: 40px; }
h1 { color: #38bdf8; font-size: 20px; }
.test-box { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; max-width: 500px; }
label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
.input-row { display: flex; gap: 10px; margin-bottom: 16px; }
.input-row input { flex: 1; height: 40px; padding: 0 14px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 14px; }
.input-row button { height: 40px; padding: 0 20px; border-radius: 8px; border: none; background: #0ea5e9; color: #fff; font-size: 14px; cursor: pointer; }
.input-row button:hover { background: #0284c7; }
.tags { display: flex; flex-wrap: wrap; gap: 8px; min-height: 36px; }
.tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 16px; background: rgba(14,165,233,0.15); color: #38bdf8; font-size: 13px; }
.tag .x { width: 16px; height: 16px; border-radius: 50%; background: rgba(14,165,233,0.3); color: #38bdf8; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; }
.tag .x:hover { background: #ef4444; color: #fff; }
.hint { font-size: 12px; color: #64748b; margin-top: 8px; }
#debug { background: #0f172a; border: 1px solid #1e3a5f; border-radius: 8px; padding: 12px; margin-top: 20px; font-family: monospace; font-size: 12px; color: #22c55e; white-space: pre-wrap; min-height: 60px; }
</style>
</head>
<body>
<h1>客户录入功能测试</h1>
<div class="test-box">
    <label>预留客户</label>
    <div class="input-row">
        <input type="text" id="customer-input" placeholder="输入客户代号，多个用逗号分隔" onkeydown="handleKey(event)">
        <button onclick="addCustomer()">录入客户</button>
    </div>
    <div class="tags" id="tags"></div>
    <div class="hint">输入后点击"录入客户"或按 Enter 键。点击 × 删除。</div>
</div>
<div id="debug"></div>

<script>
var customers = [];
var debug = document.getElementById('debug');

function log(msg) {
    debug.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
}

function handleKey(e) {
    log('keydown: ' + e.key);
    if (e.key === 'Enter') {
        e.preventDefault();
        addCustomer();
    }
}

function addCustomer() {
    var input = document.getElementById('customer-input');
    var val = input.value.trim();
    log('addCustomer called, val="' + val + '"');
    if (!val) {
        log('输入为空，返回');
        return;
    }
    var names = val.split(/[,，]/).map(function(s){ return s.trim(); }).filter(function(s){ return s; });
    log('parsed names: ' + JSON.stringify(names));
    names.forEach(function(name){
        if (customers.indexOf(name) === -1) {
            customers.push(name);
        }
    });
    input.value = '';
    render();
    log('current customers: ' + JSON.stringify(customers));
}

function removeCustomer(name) {
    log('removeCustomer: ' + name);
    var idx = customers.indexOf(name);
    if (idx > -1) {
        customers.splice(idx, 1);
        render();
    }
}

function render() {
    var el = document.getElementById('tags');
    var html = '';
    customers.forEach(function(name){
        var esc = name.replace(/'/g, "\\'");
        html += '<span class="tag">' + name + '<span class="x" onclick="removeCustomer(\'' + esc + '\')">×</span></span>';
    });
    el.innerHTML = html;
    document.getElementById('debug').textContent += 'rendered ' + customers.length + ' tags\n';
}

log('page loaded');
</script>
</body>
</html>
