<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5">
    <title>登录 - AIDC Collector</title>
    <link rel="stylesheet" href="shared.css?v=20260415">
    <link rel="stylesheet" href="shared-light.css">
    <script src="api.js"></script>
<style>
.theme-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-strong);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-base);
  flex-shrink: 0;
}
.theme-toggle:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--brand);
}
.theme-toggle .icon-sun,
.theme-toggle .icon-moon { width: 18px; height: 18px; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
body.theme-light .theme-toggle .icon-sun { display: block; }
body.theme-light .theme-toggle .icon-moon { display: none; }
</style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <button id="themeToggle" class="theme-toggle" title="切换主题" style="margin-left:auto;margin-right:0;margin-bottom:16px;">
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
                <div class="login-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>
                </div>
                <h1 class="login-title">AIDC Collector</h1>
                <p class="login-subtitle">机房信息采集与管理平台</p>
            </div>

            <form id="login-form" class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-login">
                    登录系统
                </button>
            </form>

            <div class="login-footer">
                <p class="login-tip">请使用管理员分配的账号登录</p>
            </div>

            <div class="login-features">
                <div class="feature-item">
                    <div class="feature-item-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    </div>
                    <div class="feature-item-text">机房录入</div>
                </div>
                <div class="feature-item">
                    <div class="feature-item-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </div>
                    <div class="feature-item-text">数据查询</div>
                </div>
                <div class="feature-item">
                    <div class="feature-item-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <div class="feature-item-text">导入导出</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) {
                showToast('请输入用户名和密码', 'error');
                return;
            }
            AIDC_API.login(username, password).then(res => {
                if (res.code === 0) {
                    showToast('登录成功，正在跳转...', 'success');
                    setTimeout(() => { window.location.href = 'dashboard-v2.html'; }, 800);
                } else {
                    showToast(res.message || '登录失败', 'error');
                }
            }).catch(err => {
                showToast((err && err.message) || '登录失败，请重试', 'error');
            });
        }

        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconSvg = type === 'success'
                ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
                : '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>';
            toast.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconSvg}</svg><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 自动跳转已禁用（如需恢复，取消下面注释）
        // document.addEventListener('DOMContentLoaded', () => {
        //     if (AIDC_API.getUser()) window.location.href = 'dashboard-v2.html';
        // });
    </script>
<script>
(function(){
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  // 读取本地存储的偏好
  var saved = localStorage.getItem('aidc_theme');
  if (saved === 'light') {
    document.body.classList.add('theme-light');
  }
  btn.addEventListener('click', function(){
    document.body.classList.toggle('theme-light');
    var isLight = document.body.classList.contains('theme-light');
    localStorage.setItem('aidc_theme', isLight ? 'light' : 'dark');
  });
  // 监听 OS 级深色模式（可选支持）
  var mq = window.matchMedia('(prefers-color-scheme: dark)');
  if (!saved && !mq.matches) {
    document.body.classList.add('theme-light');
  }
})();
</script>
</body>
</html>
