<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIDC Collector — 管理后台</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #1E3A5F;
      --primary-light: #2C5282;
      --accent: #E8843C;
      --success: #2D9E6C;
      --success-bg: #ECFDF5;
      --warning: #D97706;
      --warning-bg: #FFFBEB;
      --danger: #DC2626;
      --danger-bg: #FEF2F2;
      --info: #3B82F6;
      --info-bg: #EFF6FF;
      --bg: #F4F6F9;
      --card: #FFFFFF;
      --border: #E5E7EB;
      --border-light: #F3F4F6;
      --text: #111827;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--primary); color: #fff; padding: 20px 0; position: fixed; top: 0; left: 0; bottom: 0; display: flex; flex-direction: column; z-index: 100; }
    .sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    .sidebar-logo h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .sidebar-logo .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }
    .sidebar-logo span { font-size: 11px; opacity: 0.5; font-weight: 400; }
    .sidebar-nav { flex: 1; overflow-y: auto; }
    .nav-section { margin-bottom: 20px; }
    .nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.4; padding: 0 20px; margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; font-size: 13px; }
    .nav-item:hover { background: rgba(255,255,255,0.06); }
    .nav-item.active { background: rgba(255,255,255,0.1); border-left-color: var(--accent); }
    .nav-item .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .sidebar-user { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.15s; }
    .sidebar-user:hover { background: rgba(255,255,255,0.08); }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #F5A623); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-role { font-size: 11px; opacity: 0.5; }
    .main { flex: 1; margin-left: 240px; padding: 24px 32px; min-height: 100vh; }
    .breadcrumb { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; display: flex; gap: 8px; }
    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { color: var(--primary); }
    .breadcrumb span:last-child { color: var(--text); font-weight: 500; cursor: default; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .topbar-title h2 { font-size: 22px; font-weight: 700; }
    .topbar-title p { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
    .topbar-actions { display: flex; gap: 10px; }
    .btn { padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; font-family: inherit; }
    .btn svg { width: 16px; height: 16px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #d4762f; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--bg); border-color: var(--text-secondary); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-sm svg { width: 14px; height: 14px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .stats-card { background: var(--card); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .stats-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .stats-card-title { font-size: 13px; color: var(--text-secondary); }
    .stats-card-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .stats-card-value { font-size: 28px; font-weight: 700; color: var(--text); }
    .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; }
    .stat-chip { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 20px; box-shadow: var(--shadow); flex: 1; min-width: 120px; }
    .stat-chip .stat-num { font-size: 22px; font-weight: 700; font-family: 'SF Mono', monospace; color: var(--primary); }
    .stat-chip .stat-label { font-size: 12px; color: var(--text-secondary); }
    .stat-chip.accent .stat-num { color: var(--accent); }
    .stat-chip.success .stat-num { color: var(--success); }
    .stat-chip.info .stat-num { color: var(--info); }
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 20px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card-title svg { width: 18px; height: 18px; color: var(--primary); }
    .card-body { padding: 0; }
    .filter-bar { display: flex; align-items: center; gap: 10px; padding: 14px 20px; flex-wrap: wrap; border-bottom: 1px solid var(--border-light); }
    .search-box { flex: 1; min-width: 200px; position: relative; }
    .search-box input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; transition: border-color 0.15s; font-family: inherit; }
    .search-box input:focus { border-color: var(--primary); }
    .search-box .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-muted); }
    .filter-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--card); cursor: pointer; min-width: 120px; font-family: inherit; outline: none; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 12px 20px; text-align: left; border-bottom: 1px solid var(--border-light); font-size: 13px; }
    .table th { background: var(--bg); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); }
    .table tbody tr { transition: background 0.1s; }
    .table tbody tr:hover { background: #FAFBFC; }
    .table tbody tr:last-child td { border-bottom: none; }
    .idc-name { font-weight: 600; color: var(--text); }
    .idc-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .collector-cell { display: flex; align-items: center; gap: 8px; }
    .collector-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .status-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .status-new { background: var(--info-bg); color: var(--info); }
    .status-visited { background: #EDE9FE; color: #7C3AED; }
    .status-negotiating { background: var(--warning-bg); color: var(--warning); }
    .status-contracted { background: var(--success-bg); color: var(--success); }
    .status-rejected { background: var(--danger-bg); color: var(--danger); }
    .status-approved { background: var(--success-bg); color: var(--success); }
    .status-pending { background: var(--warning-bg); color: var(--warning); }
    .status-active { background: var(--success-bg); color: var(--success); }
    .status-inactive { background: var(--danger-bg); color: var(--danger); }
    .status-paused { background: var(--warning-bg); color: var(--warning); }
    .status-churned { background: var(--danger-bg); color: var(--danger); }
    .region-badge { display: inline-flex; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: var(--border-light); color: var(--text-secondary); }
    .customer-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .customer-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; background: var(--info-bg); color: var(--info); white-space: nowrap; }
    .action-btns { display: flex; gap: 6px; }
    .action-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .action-btn:hover { background: var(--bg); border-color: var(--primary); }
    .action-btn svg { width: 14px; height: 14px; color: var(--text-secondary); }
    .action-btn.danger:hover { background: var(--danger-bg); border-color: var(--danger); }
    .action-btn.danger:hover svg { color: var(--danger); }
    .pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-top: 1px solid var(--border-light); font-size: 12px; color: var(--text-secondary); }
    .pagination-info span { font-weight: 600; color: var(--text); }
    .pagination-btns { display: flex; gap: 4px; }
    .page-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; font-family: inherit; transition: all 0.15s; }
    .page-btn:hover { background: var(--bg); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.15); width: 560px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
    .modal-lg { width: 800px; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 16px; font-weight: 600; }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-secondary); }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .form-label .required { color: var(--danger); margin-left: 2px; }
    .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; transition: border-color 0.15s; font-family: inherit; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .form-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border-light); }
    .form-section:last-child { border-bottom: none; margin-bottom: 0; }
    .form-section-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .form-section-title svg { width: 16px; height: 16px; }
    .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); background: var(--info-bg); }
    .upload-zone svg { width: 40px; height: 40px; color: var(--text-muted); margin-bottom: 12px; }
    .upload-zone .upload-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .upload-zone .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .upload-zone .upload-filename { margin-top: 12px; padding: 8px 16px; background: var(--success-bg); color: var(--success); border-radius: 6px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
    #fileInput { display: none; }
    .import-result { margin-top: 16px; padding: 16px; border-radius: var(--radius-sm); background: var(--success-bg); border: 1px solid #A7F3D0; }
    .import-result h4 { font-size: 14px; font-weight: 600; color: var(--success); margin-bottom: 8px; }
    .import-result p { font-size: 12px; color: var(--text-secondary); line-height: 1.8; }
    .import-result.error { background: var(--danger-bg); border-color: #FCA5A5; }
    .import-result.error h4 { color: var(--danger); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detail-item { padding: 10px 0; border-bottom: 1px solid var(--border-light); }
    .detail-item.full { grid-column: 1 / -1; }
    .detail-key { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .detail-val { font-size: 13px; font-weight: 500; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; box-shadow: var(--shadow); animation: slideIn 0.3s ease; min-width: 200px; }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error { background: var(--danger); color: #fff; }
    .toast.info { background: var(--info); color: #fff; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .page-container { display: none; }
    .page-container.active { display: block; }
    .stat-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
    .stat-row:last-child { border-bottom: none; }
    .stat-row-label { font-size: 13px; color: var(--text-secondary); }
    .stat-row-value { font-size: 14px; font-weight: 600; }
    .confirm-body { text-align: center; padding: 20px 0; }
    .confirm-icon { width: 48px; height: 48px; margin: 0 auto 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .confirm-icon.danger { background: var(--danger-bg); color: var(--danger); }
    .confirm-icon svg { width: 24px; height: 24px; }
    .confirm-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .confirm-desc { font-size: 13px; color: var(--text-secondary); }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .checkbox-item:hover { border-color: var(--primary); background: var(--info-bg); }
    .checkbox-item.selected { border-color: var(--primary); background: var(--info-bg); color: var(--primary); }
    .checkbox-item input { display: none; }
    .profile-card { display: flex; align-items: center; gap: 20px; padding: 24px; background: var(--bg); border-radius: var(--radius); margin-bottom: 20px; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #F5A623); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #fff; }
    .profile-info h3 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .profile-info p { color: var(--text-secondary); font-size: 13px; }
    .permission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .permission-item { padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px; }
    .permission-item label { font-size: 13px; cursor: pointer; }
    /* 客户多选下拉 */
    .multi-select { position: relative; }
    .multi-select-trigger { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: space-between; min-height: 38px; }
    .multi-select-trigger:focus { border-color: var(--primary); outline: none; }
    .multi-select-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
    .multi-select-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: var(--info-bg); color: var(--info); border-radius: 4px; font-size: 11px; }
    .multi-select-tag-remove { cursor: pointer; font-weight: 700; }
    .multi-select-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-top: 4px; max-height: 200px; overflow-y: auto; z-index: 10; display: none; box-shadow: var(--shadow); }
    .multi-select-dropdown.show { display: block; }
    .multi-select-option { padding: 8px 12px; cursor: pointer; font-size: 13px; transition: background 0.1s; }
    .multi-select-option:hover { background: var(--bg); }
    .multi-select-option.selected { background: var(--info-bg); color: var(--info); }
    @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .stats-bar { flex-wrap: wrap; } }
    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 16px; } .filter-bar { flex-direction: column; align-items: stretch; } .detail-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } .form-row-3 { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr; } .permission-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1><div class="logo-icon">A</div>AIDC Collector</h1>
      <span>AI算力机房采集管理系统</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">数据中心</div>
        <div class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>统计看板</span>
        </div>
        <div class="nav-item" data-page="datacenters" onclick="navigateTo('datacenters')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>机房列表</span>
          <span class="nav-badge" id="navTotal">0</span>
        </div>
        <div class="nav-item" data-page="customers" onclick="navigateTo('customers')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          <span>客户管理</span>
          <span class="nav-badge" id="navCustomers">0</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">运营管理</div>
        <div class="nav-item" data-page="users" onclick="navigateTo('users')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          <span>团队成员</span>
