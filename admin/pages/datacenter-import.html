<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导入导出 - AIDC Collector</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="shared-light.css">
    <style>
    /* ============================================
       导入导出页面 — 产品经理设计版
       ============================================ */
    body {
        margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #020617; color: #F1F5F9; min-height: 100vh;
    }
    .main-content { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── 卡片 ── */
    .card {
        background: #0F172A; border: 1px solid rgba(255,255,255,.08);
        border-radius: 12px; padding: 24px 28px; margin-bottom: 20px;
    }
    .card-title {
        font-size: 15px; font-weight: 600; color: #F1F5F9;
        margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .card-title svg { width: 18px; height: 18px; color: #0EA5E9; }

    /* ── 上传区（拖拽 + 点击）── */
    .upload-zone {
        border: 2px dashed rgba(255,255,255,.12);
        border-radius: 12px; padding: 40px 24px;
        text-align: center; cursor: pointer;
        transition: all .2s; background: rgba(255,255,255,.02);
    }
    .upload-zone:hover, .upload-zone.dragover {
        border-color: #0EA5E9; background: rgba(14,165,233,.06);
    }
    .upload-zone input[type="file"] { display: none; }
    .upload-icon {
        width: 48px; height: 48px; margin: 0 auto 16px;
        color: #475569;
    }
    .upload-text { font-size: 15px; color: #F1F5F9; margin-bottom: 8px; }
    .upload-hint { font-size: 13px; color: #475569; }
    .upload-formats {
        display: flex; justify-content: center; gap: 12px; margin-top: 16px;
    }
    .format-tag {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 4px 10px; border-radius: 20px;
        background: rgba(255,255,255,.06); color: #94A3B8;
        font-size: 12px;
    }
    .format-tag svg { width: 14px; height: 14px; }

    /* ── 文件列表 ── */
    .file-list { margin-top: 20px; }
    .file-item {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px; border-radius: 8px;
        background: rgba(255,255,255,.03); margin-bottom: 8px;
    }
    .file-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .file-icon.xlsx { background: rgba(34,197,94,.15); color: #22C55E; }
    .file-icon.csv { background: rgba(59,130,246,.15); color: #3B82F6; }
    .file-info { flex: 1; }
    .file-name { font-size: 14px; color: #F1F5F9; }
    .file-size { font-size: 12px; color: #475569; }
    .file-remove {
        width: 28px; height: 28px; border-radius: 6px; border: none;
        background: transparent; color: #475569; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
    }
    .file-remove:hover { background: rgba(239,68,68,.15); color: #EF4444; }

    /* ── 按钮 ── */
    .btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 10px 20px; border-radius: 8px;
        font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer;
        transition: all .15s; border: none; text-decoration: none;
    }
    .btn-secondary { background: rgba(255,255,255,.06); color: #94A3B8; border: 1px solid rgba(255,255,255,.08); }
    .btn-secondary:hover { background: rgba(255,255,255,.1); color: #F1F5F9; }
    .btn-primary { background: #0EA5E9; color: #fff; }
    .btn-primary:hover { background: #38BDF8; }
    .btn-success { background: #22C55E; color: #fff; }
    .btn-success:hover { background: #4ADE80; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    /* ── 两列布局 ── */
    .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ── 模板下载区 ── */
    .template-section {
        background: rgba(14,165,233,.04); border: 1px solid rgba(14,165,233,.15);
        border-radius: 10px; padding: 16px 20px; margin-top: 20px;
    }
    .template-title { font-size: 13px; color: #94A3B8; margin-bottom: 12px; }
    .template-list { display: flex; gap: 12px; flex-wrap: wrap; }
    .template-item {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 14px; border-radius: 6px;
        background: rgba(255,255,255,.06); color: #F1F5F9;
        font-size: 13px; cursor: pointer; transition: all .15s;
    }
    .template-item:hover { background: rgba(14,165,233,.15); color: #0EA5E9; }
    .template-item svg { width: 16px; height: 16px; }

    /* ── 导出选项 ── */
    .export-options { margin-top: 20px; }
    .option-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .option-label { font-size: 13px; color: #94A3B8; min-width: 80px; }
    .radio-group { display: flex; gap: 20px; }
    .radio-item { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; color: #F1F5F9; }
    .radio-item input { accent-color: #0EA5E9; }

    /* ── 统计信息 ── */
    .stats-row {
        display: flex; gap: 24px; margin-top: 20px;
        padding: 16px 20px; border-radius: 8px;
        background: rgba(255,255,255,.03);
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: #0EA5E9; }
    .stat-label { font-size: 12px; color: #475569; margin-top: 4px; }

    /* ── 进度条 ── */
    .progress-bar {
        height: 6px; border-radius: 3px;
        background: rgba(255,255,255,.08); margin-top: 12px;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%; border-radius: 3px;
        background: #0EA5E9; transition: width .3s;
    }

    /* ── 结果提示 ── */
    .result-box {
        padding: 16px 20px; border-radius: 8px; margin-top: 16px;
    }
    .result-box.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2); }
    .result-box.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); }
    .result-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .result-box.success .result-title { color: #22C55E; }
    .result-box.error .result-title { color: #EF4444; }
    .result-detail { font-size: 13px; color: #94A3B8; }

    /* ── 主题切换 ── */
    .theme-toggle {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 8px;
        border: 1px solid rgba(255,255,255,.12);
        background: transparent; color: #94A3B8; cursor: pointer;
    }
    .theme-toggle:hover { background: rgba(255,255,255,.06); color: #F1F5F9; }
    .theme-toggle .icon-sun { display: none; }
    body.theme-light .theme-toggle .icon-sun { display: block; }
    body.theme-light .theme-toggle .icon-moon { display: none; }

    /* ── 浅色主题 ── */
    body.theme-light { background: #F8FAFC; color: #0F172A; }
    body.theme-light .card { background: #fff; border-color: #E2E8F0; }
    body.theme-light .card-title { color: #0F172A; }
    body.theme-light .upload-zone { background: #F8FAFC; border-color: #CBD5E1; }
    body.theme-light .upload-text { color: #0F172A; }
    body.theme-light .file-item { background: #F8FAFC; }
    body.theme-light .file-name { color: #0F172A; }
    </style>

<script>
(function(){
    var u = null;
    try { u = JSON.parse(localStorage.getItem("aidc_user")); } catch(e){}
    if (u) {
        var nu = document.getElementById('navUser');
        if (nu) nu.innerHTML = '<div class="nav-avatar">'+(u.name||'管').charAt(0)+'</div><span>'+(u.name||'管理员')+'</span>';
    }
    document.getElementById('themeToggle').addEventListener('click', function(){ document.body.classList.toggle('theme-light'); });
    document.getElementById('navLogout') && document.getElementById('navLogout').addEventListener('click', function(){ localStorage.removeItem('aidc_user'); window.location.href='login.html'; });

    // 初始化 demo 数据
    AIDC_API.seedDatacenters();
    AIDC_API.seedUsers();

    // 加载统计数据
    loadStats();
})();

// ── 拖拽上传 ─────────────────────────────────────────────
var uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', function(e){ e.preventDefault(); this.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', function(e){ e.preventDefault(); this.classList.remove('dragover'); });
uploadZone.addEventListener('drop', function(e){
    e.preventDefault();
    this.classList.remove('dragover');
    var files = e.dataTransfer.files;
    handleFiles(files);
});

// ── 文件处理 ─────────────────────────────────────────────
var selectedFiles = [];

function handleFileSelect(e) {
    handleFiles(e.target.files);
}
function handleFiles(files) {
    for (var i = 0; i < files.length; i++) {
        var f = files[i];
        var ext = f.name.split('.').pop().toLowerCase();
        if (['xlsx', 'xls', 'csv'].indexOf(ext) === -1) {
            alert('不支持的文件格式：' + f.name);
            continue;
        }
        selectedFiles.push(f);
    }
    renderFileList();
}
function renderFileList() {
    var list = document.getElementById('fileList');
    var html = '';
    selectedFiles.forEach(function(f, i){
        var ext = f.name.split('.').pop().toLowerCase();
        var size = (f.size / 1024).toFixed(1) + ' KB';
        if (f.size > 1024*1024) size = (f.size / 1024 / 1024).toFixed(2) + ' MB';
        html += '<div class="file-item">';
        html += '<div class="file-icon ' + ext + '">';
        html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
        html += '</div>';
        html += '<div class="file-info"><div class="file-name">' + f.name + '</div><div class="file-size">' + size + '</div></div>';
        html += '<button class="file-remove" onclick="removeFile(' + i + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
        html += '</div>';
    });
    list.innerHTML = html;
    document.getElementById('importBtn').disabled = selectedFiles.length === 0;
}
function removeFile(i) {
    selectedFiles.splice(i, 1);
    renderFileList();
}
function clearFiles() {
    selectedFiles = [];
    renderFileList();
    document.getElementById('importResult').innerHTML = '';
}

// ── 导入 ───────────────────────────────────────────────
function doImport() {
    if (selectedFiles.length === 0) { alert('请先选择文件'); return; }

    var resultDiv = document.getElementById('importResult');
    resultDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#94A3B8;">正在导入...</div>';

    // 简化版：直接读取 CSV/JSON
    var file = selectedFiles[0];
    var reader = new FileReader();
    reader.onload = function(e) {
        var content = e.target.result;
        var data = [];
        var ext = file.name.split('.').pop().toLowerCase();

        try {
            if (ext === 'json') {
                data = JSON.parse(content);
            } else if (ext === 'csv') {
                var lines = content.split('\n');
                var headers = lines[0].split(',');
                for (var i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    var vals = lines[i].split(',');
                    var row = {};
                    headers.forEach(function(h, j){ row[h.trim()] = (vals[j]||'').trim(); });
                    data.push(row);
                }
            } else {
                // xlsx 需要 SheetJS，这里提示
                resultDiv.innerHTML = '<div class="result-box error"><div class="result-title">Excel 导入需要 SheetJS 库</div><div class="result-detail">当前版本仅支持 CSV 和 JSON 格式。请下载 CSV 模板后导入。</div></div>';
                return;
            }

            // 写入 localStorage
            var existing = JSON.parse(localStorage.getItem('aidc_datacenters') || '[]');
            var added = 0, skipped = 0;
            data.forEach(function(row){
                if (!row.name && !row.机房名称) { skipped++; return; }
                row.id = 'dc' + Date.now() + Math.random().toString(36).substr(2,9);
                row.created_at = new Date().toISOString();
                existing.push(row);
                added++;
            });
            localStorage.setItem('aidc_datacenters', JSON.stringify(existing));

            resultDiv.innerHTML = '<div class="result-box success"><div class="result-title">导入成功</div><div class="result-detail">新增 ' + added + ' 条记录' + (skipped > 0 ? '，跳过 ' + skipped + ' 条无效数据' : '') + '</div></div>';
            clearFiles();
            loadStats();
        } catch(err) {
            resultDiv.innerHTML = '<div class="result-box error"><div class="result-title">导入失败</div><div class="result-detail">' + err.message + '</div></div>';
        }
    };
    reader.readAsText(file);
}

// ── 导出 ───────────────────────────────────────────────
function doExport() {
    var format = document.querySelector('input[name="export-format"]:checked').value;
    var scope = document.querySelector('input[name="export-scope"]:checked').value;

    var data = JSON.parse(localStorage.getItem('aidc_datacenters') || '[]');
    if (data.length === 0) { alert('暂无数据可导出'); return; }

    var filename = '机房数据_' + new Date().toISOString().slice(0,10);
    var content, mimeType;

    if (format === 'json') {
        content = JSON.stringify(data, null, 2);
        mimeType = 'application/json';
        filename += '.json';
    } else if (format === 'csv') {
        var headers = Object.keys(data[0]);
        var csv = headers.join(',') + '\n';
        data.forEach(function(row){
            csv += headers.map(function(h){
                var v = row[h] || '';
                if (typeof v === 'string' && (v.indexOf(',') >= 0 || v.indexOf('"') >= 0)) {
                    v = '"' + v.replace(/"/g, '""') + '"';
                }
                return v;
            }).join(',') + '\n';
        });
        content = '\ufeff' + csv;
        mimeType = 'text/csv';
        filename += '.csv';
    } else {
        // xlsx 需要 SheetJS
        alert('Excel 导出需要 SheetJS 库，当前导出为 CSV 格式。');
        document.querySelector('input[name="export-format"][value="csv"]').checked = true;
        doExport();
        return;
    }

    downloadFile(content, filename, mimeType);
    document.getElementById('exportResult').innerHTML = '<div class="result-box success"><div class="result-title">导出成功</div><div class="result-detail">已导出 ' + data.length + ' 条记录</div></div>';
}

// ── 下载文件 ───────────────────────────────────────────
function downloadFile(content, filename, mimeType) {
    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// ── 下载模板 ───────────────────────────────────────────
function downloadTemplate(format) {
    var headers = ['name', 'provider', 'country', 'province', 'city', 'area', 'street', 'delivery_date', 'total_power_kva', 'available_power_mw', 'max_power_mw', 'expandable', 'cooling_type', 'cabinet_count', 'cabinet_available', 'cabinet_max_power', 'property_type', 'address', 'contact_person', 'contact_phone', 'source'];
    var sample = ['示例机房', 'Equinix', '中国', '广东', '深圳', '南山区', '科技园路1号', '2026-06-01', '20000', '5', '10', '是', '水冷', '500', '200', '12', '租赁', 'A栋1楼', '张经理', '13800138000', '客户推荐'];

    if (format === 'csv') {
        var csv = headers.join(',') + '\n' + sample.join(',');
        downloadFile('\ufeff' + csv, '机房导入模板.csv', 'text/csv');
    } else {
        // xlsx 模板需要 SheetJS，这里用 CSV 替代
        alert('Excel 模板需要 SheetJS 库，已下载 CSV 格式模板。');
        downloadTemplate('csv');
    }
}

// ── 加载统计 ───────────────────────────────────────────
function loadStats() {
    var data = JSON.parse(localStorage.getItem('aidc_datacenters') || '[]');
    document.getElementById('totalCount').textContent = data.length;
    var statusMap = {};
    data.forEach(function(d){
        var s = d.status || d.cooperation_status || '新建';
        statusMap[s] = (statusMap[s] || 0) + 1;
    });
    document.getElementById('newCount').textContent = statusMap['新建'] || 0;
    document.getElementById('negotiatingCount').textContent = statusMap['洽谈中'] || 0;
    document.getElementById('completedCount').textContent = statusMap['已收录'] || 0;
}
