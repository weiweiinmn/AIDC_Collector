<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导入导出 - AIDC Collector</title>
    <link rel="stylesheet" href="../../shared.css?v=1776180444">
    <link rel="stylesheet" href="../../shared-light.css">
    <style>
    /* ============================================
       导入导出页面 — 简洁版
       ============================================ */
    /* body 样式继承 shared.css */
    
    .page-container { max-width: 1440px; margin: 0 auto; padding: 32px 24px; }
    
    /* ── 页面标题 ── */
    .page-header { margin-bottom: 32px; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--text-primary); margin: 0 0 6px; }
    .page-desc { font-size: 13px; color: var(--text-muted); margin: 0; }
    
    /* ── 三列布局 ── */
    .three-cols {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
    }
    
    /* ── 卡片 ── */
    .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
    }
    .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
    }
    .card-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .card-icon.import { background: rgba(14,165,233,.12); color: #0EA5E9; }
    .card-icon.export { background: rgba(34,197,94,.12); color: #22C55E; }
    .card-icon.template { background: rgba(168,85,247,.12); color: #A855F7; }
    .card-icon svg { width: 20px; height: 20px; }
    .card-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    
    /* ── 上传区 ── */
    .upload-zone {
        border: 2px dashed var(--border-mid);
        border-radius: 10px;
        padding: 32px 20px;
        text-align: center;
        cursor: pointer;
        transition: all .2s;
        background: rgba(255,255,255,.02);
    }
    .upload-zone:hover, .upload-zone.dragover {
        border-color: var(--brand);
        background: rgba(14,165,233,.04);
    }
    .upload-zone input[type="file"] { display: none; }
    .upload-icon { width: 40px; height: 40px; margin: 0 auto 12px; color: var(--text-muted); }
    .upload-text { font-size: 14px; color: var(--text-primary); margin-bottom: 6px; }
    .upload-hint { font-size: 12px; color: var(--text-muted); }
    .upload-formats {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 12px;
    }
    .format-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 4px;
        background: rgba(255,255,255,.06);
        color: var(--text-secondary);
        font-size: 11px;
    }
    .format-tag svg { width: 12px; height: 12px; }
    
    /* ── 文件列表 ── */
    .file-list { margin-top: 16px; max-height: 200px; overflow-y: auto; }
    .file-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 6px;
        background: rgba(255,255,255,.03);
        margin-bottom: 6px;
    }
    .file-icon {
        width: 28px;
        height: 28px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .file-icon.xlsx { background: rgba(34,197,94,.12); color: #22C55E; }
    .file-icon.csv { background: rgba(59,130,246,.12); color: #3B82F6; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 11px; color: var(--text-muted); }
    .file-remove {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .file-remove:hover { background: rgba(239,68,68,.12); color: #EF4444; }
    
    /* ── 按钮 ── */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 18px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: all .15s;
        border: none;
        text-decoration: none;
    }
    .btn-block { width: 100%; }
    .btn-secondary { background: rgba(255,255,255,.06); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: rgba(255,255,255,.1); color: var(--text-primary); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: #38BDF8; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-success { background: #22C55E; color: #fff; }
    .btn-success:hover { background: #4ADE80; }
    .btn-purple { background: #A855F7; color: #fff; }
    .btn-purple:hover { background: #C084FC; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    .btn-group { display: flex; gap: 10px; margin-top: 16px; }
    
    /* ── 统计 ── */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 20px;
    }
    .stat-box {
        text-align: center;
        padding: 16px 12px;
        border-radius: 8px;
        background: rgba(255,255,255,.03);
    }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--brand); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    
    /* ── 选项 ── */
    .option-group { margin-bottom: 16px; }
    .option-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .radio-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .radio-item {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 13px;
        color: var(--text-secondary);
    }
    .radio-item input { accent-color: var(--brand); }
    
    /* ── 模板列表 ── */
    .template-list { display: flex; flex-direction: column; gap: 10px; }
    .template-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-radius: 8px;
        background: rgba(255,255,255,.03);
        cursor: pointer;
        transition: all .15s;
    }
    .template-item:hover { background: rgba(14,165,233,.08); }
    .template-info { display: flex; align-items: center; gap: 10px; }
    .template-icon {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .template-icon.xlsx { background: rgba(34,197,94,.12); color: #22C55E; }
    .template-icon.csv { background: rgba(59,130,246,.12); color: #3B82F6; }
    .template-name { font-size: 13px; color: var(--text-primary); }
    .template-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    
    /* ── 结果提示 ── */
    .result-box {
        padding: 14px 16px;
        border-radius: 8px;
        margin-top: 16px;
    }
    .result-box.success { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); }
    .result-box.error { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); }
    .result-title { font-size: 13px; font-weight: 600; }
    .result-box.success .result-title { color: #22C55E; }
    .result-box.error .result-title { color: #EF4444; }
    .result-detail { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    
    /* ── 响应式 ── */
    @media (max-width: 900px) {
        .three-cols { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
        .three-cols { grid-template-columns: 1fr; }
        .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    </style>
</head>

    <main class="page-container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">导入导出</h1>
            <p class="page-desc">批量导入机房数据或导出为文件</p>
        </div>

        <!-- 三列布局 -->
        <div class="three-cols">

            <!-- ========== 导入 ========== -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon import">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <div>
                        <div class="card-title">导入数据</div>
                        <div class="card-subtitle">支持 Excel / CSV 格式</div>
                    </div>
                </div>

                <!-- 上传区 -->
                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" multiple onchange="handleFileSelect(event)">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <div class="upload-text">拖拽或点击上传</div>
                    <div class="upload-hint">可同时选择多个文件</div>
                    <div class="upload-formats">
                        <span class="format-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>.xlsx</span>
                        <span class="format-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>.csv</span>
                    </div>
                </div>

                <!-- 文件列表 -->
                <div class="file-list" id="fileList"></div>

                <!-- 按钮 -->
                <div class="btn-group">
                    <button class="btn btn-primary" id="importBtn" onclick="doImport()" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        开始导入
                    </button>
                    <button class="btn btn-secondary" onclick="clearFiles()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>
                        清空
                    </button>
                </div>

                <!-- 结果 -->
                <div id="importResult"></div>
            </div>

            <!-- ========== 导出 ========== -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon export">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </div>
                    <div>
                        <div class="card-title">导出数据</div>
                        <div class="card-subtitle">导出为文件下载</div>
                    </div>
                </div>

                <!-- 统计 -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">总数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="newCount">0</div>
                        <div class="stat-label">新建</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="negotiatingCount">0</div>
                        <div class="stat-label">洽谈中</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="completedCount">0</div>
                        <div class="stat-label">已收录</div>
                    </div>
                </div>

                <!-- 选项 -->
                <div class="option-group">
                    <div class="option-label">导出格式</div>
                    <div class="radio-row">
                        <label class="radio-item"><input type="radio" name="export-format" value="xlsx" checked> Excel</label>
                        <label class="radio-item"><input type="radio" name="export-format" value="csv"> CSV</label>
                        <label class="radio-item"><input type="radio" name="export-format" value="json"> JSON</label>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">导出范围</div>
                    <div class="radio-row">
                        <label class="radio-item"><input type="radio" name="export-scope" value="all" checked> 全部</label>
                        <label class="radio-item"><input type="radio" name="export-scope" value="filtered"> 当前筛选</label>
                    </div>
                </div>

                <!-- 按钮 -->
                <div class="btn-group">
                    <button class="btn btn-success btn-block" onclick="doExport()">

                        导出数据
                    </button>
                </div>

                <!-- 结果 -->
                <div id="exportResult"></div>
            </div>

            <!-- ========== 模板 ========== -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon template">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </div>
                    <div>
                        <div class="card-title">下载模板</div>
                        <div class="card-subtitle">标准导入格式</div>
                    </div>
                </div>

                <!-- 模板列表 -->
                <div class="template-list">
                    <div class="template-item" onclick="downloadTemplate('xlsx')">
                        <div class="template-info">
                            <div class="template-icon xlsx">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>
                            </div>
                            <div>
                                <div class="template-name">Excel 模板</div>
                                <div class="template-desc">.xlsx 格式，推荐使用</div>
                            </div>
                        </div>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:var(--text-muted)"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </div>
                    <div class="template-item" onclick="downloadTemplate('csv')">
                        <div class="template-info">
                            <div class="template-icon csv">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>
                            </div>
                            <div>
                                <div class="template-name">CSV 模板</div>
                                <div class="template-desc">.csv 格式，通用格式</div>
                            </div>
                        </div>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:var(--text-muted)"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </div>
                </div>

                <!-- 说明 -->
                <div style="margin-top: 20px; padding: 12px; border-radius: 6px; background: rgba(255,255,255,.03);">
                    <div style="font-size: 12px; color: var(--text-muted); line-height: 1.6;">
                        <strong style="color: var(--text-secondary);">使用说明：</strong><br>
                        1. 下载模板文件<br>
                        2. 按模板格式填写数据<br>
                        3. 上传填好的文件导入
                    </div>
                </div>
            </div>
        </div>
    </main>

<script src="../../admin/pages/api.js"></script>
<script>
(function(){
    var u = null;
    try { u = JSON.parse(localStorage.getItem("aidc_user")); } catch(e){}
    if (u) {
        var nu = document.getElementById('navUser');
        if (nu) nu.innerHTML = '<div class="nav-avatar">'+(u.name||'管').charAt(0)+'</div><span>'+(u.name||'管理员')+'</span>';
    }
    document.getElementById('themeToggle').addEventListener('click', function(){ document.body.classList.toggle('theme-light'); });
    document.getElementById('navLogout') && document.getElementById('navLogout').addEventListener('click', function(){ localStorage.removeItem('aidc_user'); window.location.href='login.html'; });

    // 初始化数据
    AIDC_API.seedDatacenters();
    AIDC_API.seedUsers();
    loadStats();
})();

// ── 拖拽上传 ─────────────────────────────────────────────
var uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', function(e){ e.preventDefault(); this.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', function(e){ e.preventDefault(); this.classList.remove('dragover'); });
uploadZone.addEventListener('drop', function(e){
    e.preventDefault();
    this.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
});

// ── 文件处理 ─────────────────────────────────────────────
var selectedFiles = [];

function handleFileSelect(e) { handleFiles(e.target.files); }
function handleFiles(files) {
    for (var i = 0; i < files.length; i++) {
        var f = files[i];
        var ext = f.name.split('.').pop().toLowerCase();
        if (['xlsx', 'xls', 'csv'].indexOf(ext) === -1) {
            alert('不支持的格式：' + f.name);
            continue;
        }
        selectedFiles.push(f);
    }
    renderFileList();
}
function renderFileList() {
    var list = document.getElementById('fileList');
    var html = '';
    selectedFiles.forEach(function(f, i){
        var ext = f.name.split('.').pop().toLowerCase();
        var size = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(2)+' MB' : (f.size/1024).toFixed(1)+' KB';
        html += '<div class="file-item">';
        html += '<div class="file-icon ' + ext + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg></div>';
        html += '<div class="file-info"><div class="file-name">' + f.name + '</div><div class="file-size">' + size + '</div></div>';
        html += '<button class="file-remove" onclick="removeFile(' + i + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
        html += '</div>';
    });
    list.innerHTML = html;
    document.getElementById('importBtn').disabled = selectedFiles.length === 0;
}
function removeFile(i) { selectedFiles.splice(i, 1); renderFileList(); }
function clearFiles() { selectedFiles = []; renderFileList(); document.getElementById('importResult').innerHTML = ''; }

// ── 导入 ───────────────────────────────────────────────
function doImport() {
    if (selectedFiles.length === 0) { alert('请先选择文件'); return; }
    var resultDiv = document.getElementById('importResult');
    resultDiv.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text-muted);">正在导入...</div>';

    var file = selectedFiles[0];
    var reader = new FileReader();
    reader.onload = function(e) {
        var content = e.target.result;
        var data = [];
        var ext = file.name.split('.').pop().toLowerCase();

        try {
            if (ext === 'json') {
                data = JSON.parse(content);
            } else if (ext === 'csv') {
                var lines = content.split('\n');
                var headers = lines[0].split(',');
                for (var i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    var vals = lines[i].split(',');
                    var row = {};
                    headers.forEach(function(h, j){ row[h.trim()] = (vals[j]||'').trim(); });
                    data.push(row);
                }
            } else {
                resultDiv.innerHTML = '<div class="result-box error"><div class="result-title">Excel 导入需要 SheetJS</div><div class="result-detail">请使用 CSV 格式</div></div>';
                return;
            }

            var existing = JSON.parse(localStorage.getItem('aidc_datacenters') || '[]');
            var added = 0, skipped = 0;
            data.forEach(function(row){
                if (!row.name && !row.机房名称) { skipped++; return; }
                row.id = 'dc' + Date.now() + Math.random().toString(36).substr(2,9);
                row.created_at = new Date().toISOString();
                existing.push(row);
                added++;
            });
            localStorage.setItem('aidc_datacenters', JSON.stringify(existing));

            resultDiv.innerHTML = '<div class="result-box success"><div class="result-title">导入成功</div><div class="result-detail">新增 ' + added + ' 条' + (skipped > 0 ? '，跳过 ' + skipped + ' 条无效' : '') + '</div></div>';
            clearFiles();
            loadStats();
        } catch(err) {
            resultDiv.innerHTML = '<div class="result-box error"><div class="result-title">导入失败</div><div class="result-detail">' + err.message + '</div></div>';
        }
    };
    reader.readAsText(file);
}

// ── 导出 ───────────────────────────────────────────────
function doExport() {
    var format = document.querySelector('input[name="export-format"]:checked').value;
    var data = JSON.parse(localStorage.getItem('aidc_datacenters') || '[]');
    if (data.length === 0) { alert('暂无数据'); return; }

    var filename = '机房数据_' + new Date().toISOString().slice(0,10);
    var content, mimeType;

    if (format === 'json') {
        content = JSON.stringify(data, null, 2);
        mimeType = 'application/json';
        filename += '.json';
    } else if (format === 'csv') {
        var headers = Object.keys(data[0]);
        var csv = headers.join(',') + '\n';
        data.forEach(function(row){
            csv += headers.map(function(h){
                var v = row[h] || '';
                if (typeof v === 'string' && (v.indexOf(',') >= 0 || v.indexOf('"') >= 0)) v = '"' + v.replace(/"/g, '""') + '"';
                return v;
            }).join(',') + '\n';
        });
        content = '\ufeff' + csv;
        mimeType = 'text/csv';
        filename += '.csv';
    } else {
        alert('Excel 导出需要 SheetJS，已改为 CSV');
        document.querySelector('input[name="export-format"][value="csv"]').checked = true;
        doExport();
        return;
    }

    downloadFile(content, filename, mimeType);
    document.getElementById('exportResult').innerHTML = '<div class="result-box success"><div class="result-title">导出成功</div><div class="result-detail">已导出 ' + data.length + ' 条</div></div>';
}

// ── 下载 ───────────────────────────────────────────────
function downloadFile(content, filename, mimeType) {
    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// ── 模板 ───────────────────────────────────────────────
function downloadTemplate(format) {
    var headers = ['name', 'provider', 'country', 'province', 'city', 'delivery_date', 'cabinet_count', 'cabinet_available', 'total_power_kva', 'available_power_mw', 'cooling_type', 'property', 'address', 'contact_person', 'contact_phone'];
    var sample = ['示例机房', 'Equinix', '中国', '广东', '深圳', '2026-06-01', '500', '200', '20000', '5', '水冷', '租赁', '科技园路1号', '张经理', '13800138000'];

    if (format === 'csv') {
        var csv = headers.join(',') + '\n' + sample.join(',');
        downloadFile('\ufeff' + csv, '机房导入模板.csv', 'text/csv');
    } else {
        alert('Excel 模板需要 SheetJS，已下载 CSV');
        downloadTemplate('csv');
    }
}

// ── 统计 ───────────────────────────────────────────────
function loadStats() {
    var data = JSON.parse(localStorage.getItem('aidc_datacenters') || '[]');
    document.getElementById('totalCount').textContent = data.length;
    var statusMap = {};
    data.forEach(function(d){
        var s = d.status || d.cooperation_status || '新建';
        statusMap[s] = (statusMap[s] || 0) + 1;
    });
    document.getElementById('newCount').textContent = statusMap['新建'] || 0;
    document.getElementById('negotiatingCount').textContent = statusMap['洽谈中'] || 0;
    document.getElementById('completedCount').textContent = statusMap['已收录'] || 0;
}
</script>
