    <style>
        /* 五级联动选择器 */
        .region-cascade {
            display: grid;
            grid-template-columns: 2fr 2fr 2fr 2fr 1fr;
            gap: 10px;
            align-items: start;
        }
        .region-cascade .form-group { margin-bottom: 0; }
        .region-cascade select, .region-cascade input {
            height: 38px;
            font-size: 13px;
        }
        .region-loading {
            font-size: 12px;
            color: var(--text-muted);
            padding: 4px 0;
        }
        /* 表单 section 三列布局 */
        .form-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }
        .form-grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
        }
        .form-hint-row {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
        }
        /* 数字输入加单位 */
        .input-unit {
            position: relative;
        }
        .input-unit input {
            padding-right: 40px;
        }
        .input-unit .unit-label {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: var(--text-muted);
            pointer-events: none;
        }
        /* 二选一（单选组） */
        .radio-group {
            display: flex;
            gap: 16px;
            align-items: center;
            height: 38px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
            user-select: none;
        }
        .radio-item input[type="radio"] { display: none; }
        .radio-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.5px solid var(--gray-600);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            background: transparent;
            flex-shrink: 0;
        }
        .radio-item input:checked + .radio-dot {
            border-color: var(--accent);
            background: var(--accent);
        }
        .radio-item input:checked + .radio-dot::after {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
        }
        /* 概览卡片（顶部快速预览） */
        .form-overview {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .form-overview-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .form-overview-item strong {
            color: var(--text-primary);
            font-weight: 600;
        }
    </style>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">
                <span id="form-title-text">添加机房</span>
            </h1>
        </div>

        <!-- ========== 一、基础信息 ========== -->
        <div class="card">
            <div class="card-body">
                <div class="section-header">
                    <span class="section-icon brand">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    </span>
                    <span class="section-title">基础信息</span>
                </div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label">机房名称</label>
                        <input type="text" id="name" class="form-input" placeholder="如: etix Thailand Bangkok #1" maxlength="100">
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">所在地区</label>
                        <div class="region-cascade">
                            <div class="form-group">
                                <select id="r1-country" name="country" class="form-select" onchange="onCountryChange()">
                                    <option value="">国家</option>
                                    <option value="中国">中国</option>
                                    <option value="泰国">泰国</option>
                                    <option value="马来西亚">马来西亚</option>
                                    <option value="印尼">印尼</option>
                                    <option value="菲律宾">菲律宾</option>
                                    <option value="日本">日本</option>
                                    <option value="新加坡">新加坡</option>
                                    <option value="澳大利亚">澳大利亚</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <select id="r2-prov" name="province" class="form-select" onchange="onProvinceChange()" disabled>
                                    <option value="">省 / 州</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <select id="r3-city" name="city" class="form-select" disabled>
                                    <option value="">城市 / 区</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <input type="text" id="r4-park" name="zone" class="form-input" placeholder="园区 / 街道（选填）" maxlength="50">
                            </div>
                        </div>
                    </div>
                    <!-- 机房编码字段已移除 -->
                    <div class="form-group">
                        <label class="form-label">产权归属</label>
                        <input type="text" id="propertyType" class="form-input" placeholder="如: 自有 / 租赁 / 合资">
                    </div>
                    <div class="form-group">
                        <label class="form-label">预计交付运营时间</label>
                        <input type="month" id="expectedDate" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <select id="status" class="form-select">
                            <option value="">请选择</option>
                            <option value="空闲">空闲</option>
                            <option value="已租">已租</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">信息来源</label>
                        <input type="text" name="source" class="form-input" placeholder="如: 客户主动联系/展会/网络">
                    </div>
                    <div class="form-group">
                        <label class="form-label">对接同事</label>
                        <input type="text" name="liaison" class="form-input" placeholder="负责跟进此项目的同事">
                    </div>
                    <div class="form-group">
                        <label class="form-label">KYC 状态</label>
                        <select name="kycStatus" class="form-select">
                            <option value="">请选择</option>
                            <option value="not_started">未开始</option>
                            <option value="in_progress">进行中</option>
                            <option value="pending_doc">待补充材料</option>
                            <option value="approved">已完成</option>
                            <option value="rejected">已驳回</option>
                            <option value="not_required">不需要</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">KYC 卡点/备注</label>
                        <input type="text" name="kycRemark" class="form-input" placeholder="当前卡点及解决办法">
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== 二、机柜资源 ========== -->
        <div class="card">
            <div class="card-body">
                <div class="section-header">
                    <span class="section-icon warning">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    </span>
                    <span class="section-title">机柜资源</span>
                </div>
                <div class="form-grid-4">
                    <div class="form-group">
                        <label class="form-label">总机柜数量</label>
                        <div class="input-unit">
                            <input type="number" id="cabinetTotal" class="form-input" placeholder="设计总机柜数" min="0">
                            <span class="unit-label">个</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">当前可提供机柜</label>
                        <div class="input-unit">
                            <input type="number" id="cabinetAvail" class="form-input" placeholder="可立即交付" min="0">
                            <span class="unit-label">个</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">机柜最高支撑功率</label>
                        <div class="input-unit">
                            <input type="number" id="cabinetPower" class="form-input" placeholder="单柜最大" min="0" step="0.1">
                            <span class="unit-label">kW/柜</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="continuousCabinet" value="支持"> <span class="radio-dot"></span> 支持
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="continuousCabinet" value="不支持"> <span class="radio-dot"></span> 不支持
                            </label>
                        </div>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label">能否连续布置机柜 <span class="form-hint-row">相邻房间连续布置</span></label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="continuousLayout" value="是"> <span class="radio-dot"></span> 是
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="continuousLayout" value="否"> <span class="radio-dot"></span> 否
                            </label>
                        </div>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label">是否支持物理隔离 <span class="form-hint-row">专用房间隔离</span></label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="physicalIsolation" value="支持"> <span class="radio-dot"></span> 支持
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="physicalIsolation" value="不支持"> <span class="radio-dot"></span> 不支持
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="physicalIsolation" value="改造可行"> <span class="radio-dot"></span> 改造可行
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== 三、电力系统 ========== -->
        <div class="card">
            <div class="card-body">
                <div class="section-header">
                    <span class="section-icon accent">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    </span>
                    <span class="section-title">电力系统</span>
                </div>
                <div class="form-grid-4">
                    <div class="form-group">
                        <label class="form-label">市电总容量</label>
                        <div class="input-unit">
                            <input type="number" id="cityPowerKva" class="form-input" min="0"> <span class="unit-label">kVA</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">当前可用电力</label>
                        <div class="input-unit">
                            <input type="number" id="availPowerMw" class="form-input" min="0" step="0.01"> <span class="unit-label">MW</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">可扩容电力上限</label>
                        <div class="input-unit">
                            <input type="number" id="maxPowerMw" class="form-input" min="0" step="0.01"> <span class="unit-label">MW</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">电力可用性 SLA</label>
                        <select id="powerSla" class="form-select">
                            <option value="">请选择</option>
                            <option value="99.99%">99.99%</option>
                            <option value="99.999%">99.999%</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">变压器配置</label>
                        <select id="transformerConfig" class="form-select">
                            <option value="">请选择</option>
                            <option value="2N">2N（双路独立）</option>
                            <option value="N+1">N+1（冗余1台）</option>
                            <option value="N">N（无冗余）</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">单台变压器容量</label>
                        <div class="input-unit">
                            <input type="number" id="transformerKva" class="form-input" min="0"> <span class="unit-label">kVA</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">柴发冗余等级</label>
                        <input type="text" id="generatorRedundancy" class="form-input" placeholder="如: N+1, N+2">
                    </div>
                    <div class="form-group">
                        <label class="form-label">柴发储油时长</label>
                        <div class="input-unit">
                            <input type="number" id="generatorFuelHours" class="form-input" min="0"> <span class="unit-label">小时</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">UPS 配置</label>
                        <select id="upsConfig" class="form-select">
                            <option value="">请选择</option>
                            <option value="2N">2N</option>
                            <option value="分布式">分布式</option>
                            <option value="后备">后备</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">UPS 电池后备时间</label>
                        <div class="input-unit">
                            <input type="number" id="upsBatteryMin" class="form-input" min="0"> <span class="unit-label">分钟</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">高密度母线</label>
                        <select id="highDensityBus" class="form-select">
                            <option value="">请选择</option>
                            <option value="标配">标配</option>
                            <option value="可改造">可改造</option>
                            <option value="无">无</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">BBU / 超级电容</label>
                        <select id="bbuCapacitor" class="form-select">
                            <option value="">请选择</option>
                            <option value="配备">配备</option>
                            <option value="无">无</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== 四、制冷系统 ========== -->
        <div class="card">
            <div class="card-body">
                <div class="section-header">
                    <span class="section-icon info">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </span>
                    <span class="section-title">制冷系统</span>
                </div>
                <div class="form-grid-4">
                    <div class="form-group">
                        <label class="form-label">主制冷方式</label>
                        <select id="coolingType" class="form-select">
                            <option value="">请选择</option>
                            <option value="风冷">风冷</option>
                            <option value="水冷">水冷</option>
                            <option value="液冷">液冷</option>
                            <option value="混合">混合</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">PUE 设计值</label>
                        <div class="input-unit">
                            <input type="number" id="pueDesign" class="form-input" placeholder="如: 1.4" min="1" max="3" step="0.01"> <span class="unit-label"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">是否支持冷板式液冷</label>
                        <select id="liquidCooling" class="form-select">
                            <option value="">请选择</option>
                            <option value="标配">标配</option>
                            <option value="可改造">可改造</option>
                            <option value="无">无</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">液冷改造周期</label>
                        <div class="input-unit">
                            <input type="number" id="liquidCoolingMonths" class="form-input" min="0"> <span class="unit-label">月</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">是否配备 CDU</label>
                        <select id="cduEquipped" class="form-select">
                            <option value="">请选择</option>
                            <option value="是">是</option>
                            <option value="否">否</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">冷冻水供水温度</label>
                        <div class="input-unit">
                            <input type="number" id="chilledWaterSupply" class="form-input" step="0.1"> <span class="unit-label">℃</span>
                        </div>
                    </div>
                    <div class="form-group">

        /* ====== 初始化 ====== */
        let editId = null;
        let isEditMode = false;

        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(window.location.search);
            editId = params.get('id');
            isEditMode = !!editId;
            if (isEditMode) {
                document.querySelector('.page-title').textContent = '编辑机房';
                document.title = '编辑机房 - AIDC Collector';
                var mobileTitle = document.getElementById('mobileFormTitle');
                if (mobileTitle) mobileTitle.textContent = '编辑机房';
                loadRecord(editId);
            } else {
                document.querySelector('.page-title').textContent = '新建机房';
                document.title = '新建机房 - AIDC Collector';
                var mobileTitle = document.getElementById('mobileFormTitle');
                if (mobileTitle) mobileTitle.textContent = '新建机房';
            }
        });

        function loadRecord(id) {
            var res = AIDC_API.getDatacenters({});
            var list = res.data.list || [];
            var record = list.find(function(d){ return d.id === id; });
            if (!record) { showToast('记录不存在', 'error'); return; }
            // 填充表单字段
            Object.keys(record).forEach(function(key) {
                var el = document.querySelector('[name="'+key+'"]');
                if (el) el.value = record[key] || '';
            });
            // 联动字段（国家→省→城市）
            loadRegionFields(record);
        }

        /* ====== 三级联动（国家 → 省/州 → 城市）====== */
        function onCountryChange() {
            var country = (document.getElementById('r1-country')||{value:''}).value;
            var provEl  = document.getElementById('r2-prov');
            var cityEl  = document.getElementById('r3-city');
            provEl.innerHTML = '<option value="">省 / 州</option>';
            provEl.disabled  = !country;
            cityEl.innerHTML = '<option value="">城市 / 区</option>';
            cityEl.disabled  = true;
            if (!country || !REGION_DATA[country]) return;
            Object.keys(REGION_DATA[country]).forEach(function(prov) {
                provEl.innerHTML += '<option value="'+prov+'">'+prov+'</option>';
            });
            provEl.disabled = false;
        }

        function onProvinceChange() {
            var country  = (document.getElementById('r1-country')||{value:''}).value;
            var province = (document.getElementById('r2-prov')||{value:''}).value;
            var cityEl   = document.getElementById('r3-city');
            cityEl.innerHTML = '<option value="">城市 / 区</option>';
            cityEl.disabled  = !province;
            if (!province || !REGION_DATA[country] || !REGION_DATA[country][province]) return;
            var cities = REGION_DATA[country][province];
            if (Array.isArray(cities)) {
                cities.forEach(function(city) { cityEl.innerHTML += '<option value="'+city+'">'+city+'</option>'; });
            } else {
                Object.keys(cities).forEach(function(city) { cityEl.innerHTML += '<option value="'+city+'">'+city+'</option>'; });
            }
            cityEl.disabled = false;
        }

        function loadRegionFields(record) {
            if (record.country) {
                var countryEl = document.getElementById('r1-country');
                if (countryEl) {
                    countryEl.value = record.country;
                    onCountryChange();
                }
            }
            if (record.province) {
                setTimeout(function() {
                    var provEl = document.getElementById('r2-prov');
                    if (provEl) {
                        provEl.value = record.province;
                        onProvinceChange();
                    }
                }, 100);
            }
            if (record.city) {
                setTimeout(function() {
                    var cityEl = document.getElementById('r3-city');
                    if (cityEl) cityEl.value = record.city;
                }, 200);
            }
            if (record.zone) {
                setTimeout(function() {
                    var zoneEl = document.getElementById('r4-park');
                    if (zoneEl) zoneEl.value = record.zone;
                }, 200);
            }
        }

        function esc(str) {
            var d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        /* ====== 表单提交 ====== */
        function collectFormData() {
            var formData = {};
            // 所有有 name 属性的 input/select/textarea
            document.querySelectorAll('[name]').forEach(function(el) {
                formData[el.name] = el.value;
            });
            return formData;
        }

        function doSave(onSuccess) {
            var formData = collectFormData();
            if (!formData.name) { showToast('请输入机房名称', 'error'); return; }
            var res;
            if (isEditMode) {
                res = AIDC_API.updateDatacenter(editId, formData);
            } else {
                res = AIDC_API.createDatacenter(formData);
            }
            if (res.code === 0) {
                showToast(isEditMode ? '修改成功' : '创建成功', 'success');
                if (onSuccess) onSuccess(res.data);
            } else {
                showToast(res.message || '操作失败', 'error');
            }
        }

        function saveAndBack()    { doSave(function(){ setTimeout(function(){ window.location.href='datacenter-list.html'; }, 800); }); }
        function saveAndContinue(){ doSave(function(d){ editId=d.id; isEditMode=true; showToast('已保存，可继续编辑', 'success'); }); }
        function handleFormSubmit(e) { e.preventDefault(); saveAndBack(); }

        function showToast(message, type) {
            type = type || 'success';
            var existing = document.querySelector('.toast');
            if (existing) existing.remove();
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            var icons = {
                success: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
                error:   '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
                warning: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
            };
            toast.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+(icons[type]||icons.success)+'</svg><span>'+message+'</span>';
            document.body.appendChild(toast);
            setTimeout(function(){ toast.remove(); }, 3000);
        }
    </script>
<script>
(function(){
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  // 读取本地存储的偏好
  var saved = localStorage.getItem('aidc_theme');
  if (saved === 'light') {
    document.body.classList.add('theme-light');
  }
  btn.addEventListener('click', function(){
    document.body.classList.toggle('theme-light');
    var isLight = document.body.classList.contains('theme-light');
    localStorage.setItem('aidc_theme', isLight ? 'light' : 'dark');
  });
  // 监听 OS 级深色模式（可选支持）
  var mq = window.matchMedia('(prefers-color-scheme: dark)');
  if (!saved && !mq.matches) {
    document.body.classList.add('theme-light');
  }
})();
</script>
