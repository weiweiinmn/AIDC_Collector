    <meta charset="UTF-8">

<link rel="stylesheet" href="shared-light.css">
    <style>
        /* ===== 页面私有样式 ===== */
        .visit-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .visit-stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        .visit-stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .visit-stat-card.pending::before { background: var(--warning); }
        .visit-stat-card.scheduled::before { background: var(--info); }
        .visit-stat-card.completed::before { background: var(--success); }
        .visit-stat-card.overdue::before { background: var(--danger); }

        .visit-stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .visit-stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .visit-stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        /* 任务卡片 */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: all var(--transition-base);
        }

        .task-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .task-status-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .task-status-icon svg { width: 22px; height: 22px; }

        .task-status-icon.pending {
            background: var(--warning-bg);
            color: var(--warning);
        }

        .task-status-icon.scheduled {
            background: var(--info-bg);
            color: var(--info);
        }

        .task-status-icon.completed {
            background: var(--success-bg);
            color: var(--success);
        }

        .task-status-icon.overdue {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .task-content { flex: 1; min-width: 0; }

        .task-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-title a {
            color: var(--primary);
            transition: color var(--transition-fast);
        }

        .task-title a:hover {
            color: var(--accent);
        }

        .task-badges {
            display: flex;
            gap: 6px;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .task-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-meta-item svg { width: 14px; height: 14px; }

        .task-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 日历视图切换 */
        .view-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-page);
            padding: 4px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
        }

        .view-tab {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .view-tab:hover {
            color: var(--text-primary);
        }

        .view-tab.active {
            background: var(--bg-card);
            color: var(--primary);
            box-shadow: var(--shadow-xs);
        }

        /* 状态标签 */
        .visit-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
        }

        .visit-status.pending { background: var(--warning-bg); color: var(--warning); }
        .visit-status.scheduled { background: var(--info-bg); color: var(--info); }
        .visit-status.completed { background: var(--success-bg); color: var(--success); }
        .visit-status.overdue { background: var(--danger-bg); color: var(--danger); }

        .visit-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* 负责人 */
        .assignee {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .assignee-avatar {
            width: 24px;
            height: 24px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
        }

        /* 日历视图 */
        .calendar-view {
            display: none;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .calendar-view.show { display: block; }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--bg-page);
            border-bottom: 1px solid var(--border-light);
        }

        .calendar-header-cell {
            padding: 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .calendar-body {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .calendar-cell {
            min-height: 100px;
            padding: 8px;
            border-right: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .calendar-cell:nth-child(7n) { border-right: none; }

        .calendar-date {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .calendar-date.today {
            width: 28px;
            height: 28px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-event {
            padding: 4px 6px;
            border-radius: var(--radius-xs);
            font-size: 11px;
            margin-bottom: 2px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .calendar-event.scheduled {
            background: var(--info-bg);
            color: var(--info);
        }

        .calendar-event.completed {
            background: var(--success-bg);
            color: var(--success);
        }
        }

        
    </style>

    <script>
        let tasks = [];

        function loadTasks() {
            var res = AIDC_API.getVisits();
            tasks = res.success ? res.data : [];
            renderTasks();
        }

        const STATUS_MAP = {
            'pending': '待安排',
            'scheduled': '已安排',
            'completed': '已完成',
            'overdue': '已逾期'
        };

        document.addEventListener('DOMContentLoaded', function(){
            loadTasks();
        });

        function renderTasks(data) {
            if (!data) data = tasks;
            const container = document.getElementById('taskList');
            container.innerHTML = data.map(t => `
                <div class="task-card">
                    <div class="task-status-icon ${t.status}">
                        ${t.status === 'pending' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' :
                          t.status === 'scheduled' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' :
                          t.status === 'completed' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' :
                          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'}
                    </div>
                    <div class="task-content">
                        <div class="task-header">
                            <div class="task-title">
                                <a href="datacenter-view.html?id=${t.id}">${t.datacenter}</a>
                                <span class="visit-status ${t.status}">${STATUS_MAP[t.status]}</span>
                            </div>
                        </div>
                        <div class="task-meta">
                            <div class="task-meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                ${t.city}
                            </div>
                            ${t.date ? `
                            <div class="task-meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
                                ${t.date} ${t.time || ''}
                            </div>
                            ` : ''}
                            <div class="task-meta-item">
                                <div class="assignee">
                                    <div class="assignee-avatar">${t.assignee.charAt(0)}</div>
                                    ${t.assignee}
                                </div>
                            </div>
                        </div>
                        ${t.purpose ? `<div style="font-size:13px;color:var(--text-secondary);margin-top:6px;">${t.purpose}</div>` : ''}
                    </div>
                    <div class="task-actions">
                        ${t.status === 'pending' ? `<button class="btn btn-sm btn-primary" onclick="scheduleTask(${t.id})">安排</button>` : ''}
                        ${t.status === 'scheduled' ? `<button class="btn btn-sm btn-secondary" onclick="completeTask(${t.id})">完成</button>` : ''}
                        <button class="btn btn-sm btn-ghost" onclick="viewDetail(${t.id})">详情</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('listCount').textContent = `共 ${data.length} 条任务`;
        }

        function switchView(view) {
            document.querySelectorAll('.view-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            if (view === 'list') {
                document.getElementById('listView').style.display = 'block';
                document.getElementById('calendarView').classList.remove('show');
            } else {
                document.getElementById('listView').style.display = 'none';
                document.getElementById('calendarView').classList.add('show');
                renderCalendar();
            }
        }

        function renderCalendar() {
            const body = document.getElementById('calendarBody');
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let html = '';
            for (let i = 0; i < firstDay; i++) {
                html += '<div class="calendar-cell"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const isToday = day === today.getDate();

                html += `<div class="calendar-cell">
                    <div class="calendar-date ${isToday ? 'today' : ''}">${day}</div>
                    ${dayTasks.map(t => `<div class="calendar-event ${t.status}" onclick="viewDetail(${t.id})">${t.datacenter}</div>`).join('')}
                </div>`;
            }

            body.innerHTML = html;
        }

        function filterTasks() {
            const keyword = document.getElementById('searchKeyword').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const assignee = document.getElementById('filterAssignee').value;

            let filtered = tasks.filter(t => {
                const matchKeyword = !keyword || t.datacenter.toLowerCase().includes(keyword);
                const matchStatus = !status || t.status === status;
                const matchAssignee = !assignee || t.assignee === assignee;
                return matchKeyword && matchStatus && matchAssignee;
            });

            renderTasks(filtered);
        }

        function resetFilters() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterAssignee').value = '';
            renderTasks();
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = '安排考察';
            document.getElementById('visitDatacenter').value = '';
            document.getElementById('visitDate').value = '';
            document.getElementById('visitTime').value = '10:00';
            document.getElementById('visitAssignee').value = '陈思远';
            document.getElementById('visitPurpose').value = '';
            document.getElementById('visitModal').classList.add('show');
        }

        function scheduleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('visitDatacenter').value = id;
                document.getElementById('visitModal').classList.add('show');
            }
        }

        function completeTask(id) {
            var res = AIDC_API.updateVisit(id, { status: 'completed' });
            if (res.success) {
                showToast('任务已标记为完成', 'success');
                loadTasks();
            } else {
                showToast('操作失败', 'error');
            }
        }

        function viewDetail(id) {
            showToast('查看任务详情', 'info');
        }

        function closeModal() {
            document.getElementById('visitModal').classList.remove('show');
        }

        function saveVisit() {
            var datacenter = document.getElementById('visitDatacenter').value;
            var date       = document.getElementById('visitDate').value;
            var time       = document.getElementById('visitTime').value;
            var assignee   = document.getElementById('visitAssignee').value;
            var purpose    = document.getElementById('visitPurpose').value;

            if (!datacenter || !date) {
                showToast('请填写必填项', 'error');
                return;
            }

            var res = AIDC_API.createVisit({
                datacenter: datacenter,
                date: date,
                time: time || '',
                assignee: assignee,
                purpose: purpose || ''
            });

            if (res.success) {
                showToast('考察已安排', 'success');
                closeModal();
                loadTasks();
            } else {
                showToast('保存失败', 'error');
            }
        }

        function exportVisits() {
            showToast('正在导出考察任务...', 'info');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
<script>
(function(){
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  // 读取本地存储的偏好
  var saved = localStorage.getItem('aidc_theme');
  if (saved === 'light') {
    document.body.classList.add('theme-light');
  }
  btn.addEventListener('click', function(){
    document.body.classList.toggle('theme-light');
    var isLight = document.body.classList.contains('theme-light');
    localStorage.setItem('aidc_theme', isLight ? 'light' : 'dark');
  });
  // 监听 OS 级深色模式（可选支持）
  var mq = window.matchMedia('(prefers-color-scheme: dark)');
  if (!saved && !mq.matches) {
    document.body.classList.add('theme-light');
  }
})();
</script>
</body>
</html>
