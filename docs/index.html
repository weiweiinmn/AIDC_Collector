<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDC Collector - 机房数据采集系统</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #020617 0%, #0F172A 100%);
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        color: #F1F5F9;
    }
    .container {
        text-align: center; padding: 60px 40px;
        background: rgba(15, 23, 42, 0.8); border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
        max-width: 600px;
    }
    .logo {
        width: 80px; height: 80px; margin: 0 auto 24px;
        background: linear-gradient(135deg, #0EA5E9, #22C55E);
        border-radius: 20px; display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 48px; height: 48px; color: white; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: #94A3B8; margin-bottom: 32px; line-height: 1.6; }
    .btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 14px 32px; border-radius: 10px;
        background: #0EA5E9; color: white;
        font-size: 16px; font-weight: 600; text-decoration: none;
        transition: all 0.2s;
    }
    .btn:hover { background: #38BDF8; transform: translateY(-2px); }
    .btn svg { width: 20px; height: 20px; }
    .features {
        display: grid; grid-template-columns: repeat(2, 1fr);
        gap: 16px; margin-top: 40px; text-align: left;
    }
    .feature {
        padding: 16px; border-radius: 10px;
        background: rgba(255,255,255,0.05);
    }
    .feature-title { font-size: 14px; font-weight: 600; color: #0EA5E9; margin-bottom: 4px; }
    .feature-desc { font-size: 12px; color: #64748B; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="4" y="4" width="16" height="16" rx="2"/>
                <rect x="9" y="9" width="6" height="6"/>
            </svg>
        </div>
        <h1>AIDC Collector</h1>
        <p>AIDC 机房数据采集管理系统<br>支持机房信息录入、导入导出、项目进度跟踪</p>
        <a href="dashboard-v2.html" class="btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="9" rx="1"/>
                <rect x="14" y="3" width="7" height="5" rx="1"/>
                <rect x="14" y="12" width="7" height="9" rx="1"/>
                <rect x="3" y="16" width="7" height="5" rx="1"/>
            </svg>
            进入系统
        </a>
        <div class="features">
            <div class="feature">
                <div class="feature-title">仪表盘</div>
                <div class="feature-desc">KPI 指标、状态分布</div>
            </div>
            <div class="feature">
                <div class="feature-title">机房列表</div>
                <div class="feature-desc">搜索、筛选、详情</div>
            </div>
            <div class="feature">
                <div class="feature-title">导入导出</div>
                <div class="feature-desc">Excel/CSV 批量处理</div>
            </div>
            <div class="feature">
                <div class="feature-title">项目进度</div>
                <div class="feature-desc">甘特图时间轴</div>
            </div>
        </div>
    </div>
</body>
</html>
