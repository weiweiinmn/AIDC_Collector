    <style>
        /* ===== 页面私有样式 ===== */
        .customer-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .customer-stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: all var(--transition-base);
        }

        .customer-stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .customer-stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .customer-stat-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .customer-stat-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .customer-stat-icon svg { width: 16px; height: 16px; }
        .customer-stat-icon.brand { background: var(--primary-lighter); color: var(--primary); }
        .customer-stat-icon.accent { background: var(--accent-light); color: var(--accent); }
        .customer-stat-icon.success { background: var(--success-bg); color: var(--success); }
        .customer-stat-icon.warning { background: var(--warning-bg); color: var(--warning); }

        .customer-stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        /* 客户标签 */
        .customer-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
        }

        .customer-tag.byteDance { background: #E3F2FD; color: #1976D2; }
        .customer-tag.alibaba { background: #FFF3E0; color: #E65100; }
        .customer-tag.meituan { background: #E8F5E9; color: #388E3C; }
        .customer-tag.tencent { background: #E8EAF6; color: #3F51B5; }
        .customer-tag.other { background: var(--bg-page); color: var(--text-secondary); }

        /* 跟进状态 */
        .follow-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
        }

        .follow-status.initial { background: var(--info-bg); color: var(--info); }
        .follow-status.sent { background: var(--warning-bg); color: var(--warning); }
        .follow-status.negotiating { background: var(--accent-light); color: var(--accent); }
        .follow-status.signed { background: var(--success-bg); color: var(--success); }
        .follow-status.lost { background: var(--danger-bg); color: var(--danger); }

        .follow-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* 客户经理 */
        .manager-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .manager-avatar {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
        }

        /* 机房关联数 */
        .datacenter-count {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: var(--primary-lighter);
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }

        .datacenter-count svg { width: 14px; height: 14px; }
        }

        
    </style>

    <script>
        // 从 API 加载
        let customers = [];

        function loadCustomers() {
            var res = AIDC_API.getCustomers();
            customers = res.success ? res.data : [];
            renderCustomers();
        }

        const STATUS_MAP = {
            'initial': '初步沟通',
            'sent': '方案已发',
            'negotiating': '谈判中',
            'signed': '已签约',
            'lost': '已流失'
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadCustomers();
        });

        function renderCustomers(data) {
            if (!data) data = customers;
            const tbody = document.getElementById('customerTableBody');
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td>
                        <div style="font-weight:600;">${c.name}</div>
                        <div style="font-size:12px;color:var(--text-muted);">${c.level}级客户</div>
                    </td>
                    <td>${c.industry}</td>
                    <td><span class="datacenter-count"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> ${c.datacenters}</span></td>
                    <td><span class="follow-status ${c.status}">${STATUS_MAP[c.status]}</span></td>
                    <td>
                        <div class="manager-info">
                            <div class="manager-avatar">${c.manager.charAt(0)}</div>
                            <span>${c.manager}</span>
                        </div>
                    </td>
                    <td>${c.lastFollow}</td>
                    <td>
                        <div class="table-actions">
                            <button class="table-action-btn" title="查看" onclick="viewCustomer(${c.id})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                            <button class="table-action-btn" title="编辑" onclick="editCustomer(${c.id})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button class="table-action-btn danger" title="删除" onclick="deleteCustomer(${c.id})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            document.getElementById('listCount').textContent = `共 ${data.length} 个客户`;
        }

        function filterCustomers() {
            const keyword = document.getElementById('searchKeyword').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const manager = document.getElementById('filterManager').value;

            let filtered = customers.filter(c => {
                const matchKeyword = !keyword || c.name.toLowerCase().includes(keyword);
                const matchStatus = !status || c.status === status;
                const matchManager = !manager || c.manager === manager;
                return matchKeyword && matchStatus && matchManager;
            });

            renderCustomers(filtered);
        }

        function resetFilters() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterManager').value = '';
            renderCustomers();
        }

        function showAddModal() {
            _editingCustomerId = null;
            document.getElementById('modalTitle').textContent = '添加客户';
            document.getElementById('customerName').value = '';
            document.getElementById('customerIndustry').value = '互联网';
            document.getElementById('customerLevel').value = 'B';
            document.getElementById('customerManager').value = '陈思远';
            document.getElementById('customerStatus').value = 'initial';
            document.getElementById('customerNote').value = '';
            document.getElementById('customerModal').classList.add('show');
        }

        function editCustomer(id) {
            var customer = customers.find(function(c){ return c.id === id; });
            if (!customer) return;
            _editingCustomerId = id;

            document.getElementById('modalTitle').textContent = '编辑客户';
            document.getElementById('customerName').value = customer.name || '';
            document.getElementById('customerIndustry').value = customer.industry || '互联网';
            document.getElementById('customerLevel').value = customer.level || 'B';
            document.getElementById('customerManager').value = customer.manager || '';
            document.getElementById('customerStatus').value = customer.status || 'initial';
            document.getElementById('customerNote').value = customer.note || '';
            document.getElementById('customerModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('customerModal').classList.remove('show');
        }

        let _editingCustomerId = null;

        function saveCustomer() {
            var name     = document.getElementById('customerName').value.trim();
            var industry = document.getElementById('customerIndustry').value.trim();
            var level    = document.getElementById('customerLevel').value.trim();
            var manager  = document.getElementById('customerManager').value.trim();
            var status   = document.getElementById('customerStatus').value;
            var note     = document.getElementById('customerNote').value.trim();

            if (!name) { showToast('请输入客户名称', 'error'); return; }

            var data = { name: name, industry: industry, level: level, manager: manager, status: status, note: note };

            var res;
            if (_editingCustomerId) {
                res = AIDC_API.updateCustomer(_editingCustomerId, data);
            } else {
                res = AIDC_API.createCustomer(data);
            }

            if (res.success) {
                showToast(_editingCustomerId ? '客户已更新' : '客户已添加', 'success');
                closeModal();
                loadCustomers();
            } else {
                showToast('保存失败：' + (res.error||'未知错误'), 'error');
            }
        }

        function deleteCustomer(id) {
            if (!confirm('确定要删除这个客户吗？')) return;
            var res = AIDC_API.deleteCustomer(id);
            if (res.success) {
                showToast('删除成功', 'success');
                loadCustomers();
            } else {
                showToast('删除失败', 'error');
            }
        }

        function viewCustomer(id) {
            // 跳转到客户详情页
            showToast('查看客户详情', 'info');
        }

        function exportCustomers() {
            showToast('正在导出客户数据...', 'info');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
<script>
(function(){
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  // 读取本地存储的偏好
  var saved = localStorage.getItem('aidc_theme');
  if (saved === 'light') {
    document.body.classList.add('theme-light');
  }
  btn.addEventListener('click', function(){
    document.body.classList.toggle('theme-light');
    var isLight = document.body.classList.contains('theme-light');
    localStorage.setItem('aidc_theme', isLight ? 'light' : 'dark');
  });
  // 监听 OS 级深色模式（可选支持）
  var mq = window.matchMedia('(prefers-color-scheme: dark)');
  if (!saved && !mq.matches) {
    document.body.classList.add('theme-light');
  }
})();
</script>
</body>
</html>
