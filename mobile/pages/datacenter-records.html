<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的记录</title>
  <link rel="stylesheet" href="../css/mobile.css?v=20260413-7">
  <style>
    /* ── 本页私有 ─────────────────────────────────────── */
    .record-header {
      background: var(--c-primary);
      color: #fff;
      padding: 18px 16px 14px;
    }
    .record-header .rh-title {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .record-header .rh-count {
      font-size: 28px;
      font-weight: 700;
    }
    .record-header .rh-sub {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 2px;
    }

    .record-card {
      background: #fff;
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .record-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .record-card .rc-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .record-card .rc-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--c-text-primary);
      flex: 1;
    }
    .record-card .rc-city {
      font-size: 12px;
      color: var(--c-text-secondary);
    }
    .record-card .rc-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--c-text-muted);
    }
    .record-card .rc-meta-item {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .record-card .rc-bar {
      margin-top: 8px;
      height: 4px;
      background: var(--c-gray-bg);
     
      overflow: hidden;
    }
    .record-card .rc-bar-fill {
      height: 100%;
     
      transition: width 0.4s ease;
    }
    .record-card .rc-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--c-text-muted);
      margin-top: 4px;
    }

    /* 统计摘要 */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 16px 12px;
      background: var(--c-primary);
    }
    .stats-row .sr-item {
      text-align: center;
      background: rgba(255,255,255,0.1);
      border-radius: var(--radius-md);
      padding: 10px 6px;
      cursor: pointer;
    }
    .stats-row .sr-item:active { background: rgba(255,255,255,0.2); }
    .stats-row .sr-num {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .stats-row .sr-label {
      font-size: 10px;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }
  </style>
</head>

<script>
var currentFilter = null;

document.addEventListener('DOMContentLoaded', function() {
  Drawer.init();
  if (!AIDC_API.isLoggedIn()) { window.location.href = 'login.html'; return; }
  var user = AIDC_API.getUser();
  if (user) {
    document.getElementById('drawerName').textContent = user.name || '用户';
    var roleMap = { admin:'管理员', manager:'BD经理', user:'商务拓展' };
    document.getElementById('drawerRole').textContent = roleMap[user.role] || '商务拓展';
  }
  loadMyRecords();
});

async function loadMyRecords() {
  console.log('[DEBUG] loadMyRecords called');
  try {
    var user = AIDC_API.getUser();
    var params = {};
    // 不按创建者过滤，显示所有数据
    var res = await AIDC_API.getDatacenters(params);
    console.log('[DEBUG] getDatacenters result:', res);
    if (res.code !== 0) { console.error('[ERROR] getDatacenters failed'); return; }
    var all = res.data && res.data.list ? res.data.list : [];
    var filtered = currentFilter ? all.filter(function(d){ return d.status === currentFilter; }) : all;
    renderStats(all);
    renderList(filtered);
  } catch(e) {
    console.error('[ERROR] loadMyRecords failed:', e);
  }
}

function renderStats(all) {
  var dist = {};
  all.forEach(function(d){ dist[d.status] = (dist[d.status]||0)+1; });
  document.getElementById('statNew').textContent = dist['new']||0;
  document.getElementById('statCollected').textContent = dist['collected']||0;
  document.getElementById('statSigned').textContent = dist['signed']||0;
}

function filterList(status) {
  currentFilter = currentFilter === status ? null : status;
  loadMyRecords();
}

function renderList(list) {
  var el = document.getElementById('dcList');
  var empty = document.getElementById('emptyState');
  if (!list || list.length === 0) {
    el.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  var html = '<div style="padding:0 16px">';
  list.forEach(function(d) {
    var statusLabel = AIDC_API.getStatusLabel(d.status);
    html += '<div class="record-card" onclick="goDetail(\'' + d.id + '\')">';
    html += '<div class="rc-top">';
    html += '<div style="flex:1;min-width:0">';
    html += '<div class="rc-name">' + escHtml(d.name||'') + '</div>';
    html += '<div style="font-size:12px;color:var(--c-text-muted)">📍 ' + escHtml(d.city||'') + (d.country ? ' · ' + d.country : '') + '</div>';
    html += '</div>';
    html += '<span class="rc-status">' + statusLabel + '</span>';
    html += '</div>';
    if (d.rackCount) {
      html += '<div style="font-size:12px;color:var(--c-text-muted);margin-top:4px">🏢️ ' + d.rackCount + ' 柜 · ▪ ' + (d.powerPerRack||'-') + 'kW/rack · PUE ' + (d.pue||'-') + '</div>';
    }
    if (d.customer) {
      html += '<div style="font-size:12px;color:var(--c-text-muted);margin-top:2px">🏢 ' + escHtml(d.customer) + '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function goDetail(id) { window.location.href = 'datacenter-detail.html?id=' + id; }

function doLogout() {
  AIDC_API.logout();
  window.location.href = 'login.html';
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
