<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="../js/api.js?v=20260413-7"></script>
<script src="../js/drawer.js?v=20260413-7"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  Drawer.init();
  if (!AIDC_API.isLoggedIn()) { window.location.href = 'login.html'; return; }
  var u = AIDC_API.getUser();
  document.getElementById('userName').textContent = u.name || '用户';
  var roleMap = { admin:'管理员', manager:'BD经理', user:'商务拓展' };
  document.getElementById('userRole').textContent = roleMap[u.role] || '商务拓展';
  document.getElementById('drawerName').textContent = u.name || '用户';
  document.getElementById('drawerRole').textContent = roleMap[u.role] || '商务拓展';
});

function doLogout() {
  AIDC_API.logout();
  window.location.href = 'login.html';
}

function showToast(msg, type) {
  type = type || 'error';
  var tc = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.innerHTML = msg;
  tc.appendChild(t);
  setTimeout(function(){ t.classList.add('toast-fadeout'); setTimeout(function(){ t.remove(); }, 300); }, 2000);
}
</script>
