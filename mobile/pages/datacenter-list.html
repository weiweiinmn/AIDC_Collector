<script>
console.log('[DEBUG] datacenter-list.html 开始加载');
window.onerror = function(msg, url, line, col, error) {
    console.error('[ERROR]', msg, 'at line', line);
    document.getElementById('dcList').innerHTML = '<div style="padding:20px;color:red;">页面加载出错: ' + msg + '</div>';
    return false;
};
</script>
<script src="../js/api.js?v=20260413-7"></script>
<script src="../js/drawer.js?v=20260413-7"></script>
<script>
var currentStatus = '';
var currentSearch = '';
var countryFlags = {
  '中国':'🇨🇳','泰国':'🇹🇭','马来西亚':'🇲🇾','印尼':'🇮🇩',
  '菲律宾':'🇵🇭','日本':'🇯🇵','新加坡':'🇸🇬','澳大利亚':'🇦🇺'
};
var statusMap = {
  'new':         '新增',
  'collected':   '已收录',
  'negotiating': '洽谈中',
  'signed':      '已签约',
  'rejected':    '已淘汰'
};
var coolingIcon = {
  '冷水': '💧',
  '风冷': '💨',
  '液冷': '🌊',
  '自然冷却': '🍃'
};

// ── 初始化 ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  Drawer.init();
  if (!AIDC_API.isLoggedIn()) { window.location.href = 'login.html'; return; }
  var user = AIDC_API.getUser();
  if (user) {
    var roleMap = { admin:'管理员', manager:'BD经理', user:'商务拓展' };
    document.getElementById('drawerName').textContent = user.name||'用户';
    document.getElementById('drawerRole').textContent = roleMap[user.role]||'商务拓展';
  }
  // URL 参数
  var params = new URLSearchParams(window.location.search);
  var s = params.get('status');
  if (s) {
    currentStatus = s;
    document.querySelectorAll('.filter-tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.status === s);
    });
  }
  setupEvents();
  loadList();
});

function setupEvents() {
  // 搜索
  var si = document.getElementById('searchInput');
  si.addEventListener('input', debounce(function() {
    currentSearch = si.value.trim();
    document.getElementById('searchClear').classList.toggle('show', !!currentSearch);
    loadList();
  }, 200));

  // 筛选
  document.querySelectorAll('.filter-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      currentStatus = tab.dataset.status;
      loadList();
    });
  });
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  document.getElementById('searchClear').classList.remove('show');
  loadList();
}

async function loadList() {
  console.log('[DEBUG] loadList called, currentStatus=', currentStatus, 'currentSearch=', currentSearch);
  try {
    var params = {};
    if (currentStatus) params.status = currentStatus;
    if (currentSearch) params.keyword = currentSearch;
    var res = await AIDC_API.getDatacenters(params);
    console.log('[DEBUG] getDatacenters result:', res);
    if (res.code !== 0) {
      console.error('[ERROR] getDatacenters failed:', res.message);
      showToast(res.message || '加载失败');
      return;
    }
    var list = res.data && res.data.list ? res.data.list : [];
    var allRes = await AIDC_API.getDatacenters();
    var all = allRes.data && allRes.data.list ? allRes.data.list : [];
    var dist = {};
    all.forEach(function(d){ dist[d.status] = (dist[d.status]||0)+1; });
    var sumAllEl = document.getElementById('sumAll');
    if (sumAllEl) sumAllEl.textContent = all.length;
    var sumIdleEl = document.getElementById('sumIdle');
    if (sumIdleEl) sumIdleEl.textContent = dist['new']||0;
    var sumRentedEl = document.getElementById('sumRented');
    if (sumRentedEl) sumRentedEl.textContent = dist['collected']||0;
    renderList(list);
    console.log('[DEBUG] loadList completed, rendered', list.length, 'items');
  } catch(e) {
    console.error('[ERROR] loadList failed:', e);
    showToast('加载失败: ' + e.message);
  }
}

function renderList(list) {
  var el = document.getElementById('dcList');
  var emptyEl = document.getElementById('emptyState');
  if (!emptyEl) { console.error('[ERROR] emptyState not found'); return; }
  emptyEl.classList.toggle('hidden', list && list.length > 0);
  if (!list || !list.length) {
    el.innerHTML = '';
    console.log('[DEBUG] renderList: no data, list is', list);
    return;
  }
  console.log('[DEBUG] renderList: rendering', list.length, 'items');
  el.innerHTML = list.map(function(d) {
    // 进度条计算
    var pct = d.cabinetUsed !== undefined && d.rackCount 
      ? Math.round(d.cabinetUsed / d.rackCount * 100) : 0;
    var pctColor = pct < 50 ? '#10B981' : pct < 80 ? '#F59E0B' : '#EF4444';
    var statusLabel = AIDC_API.getStatusLabel(d.status);
    var statusCls   = AIDC_API.getStatusCls(d.status);
    return '<div class="dc-card" onclick="goDetail(\'' + d.id + '\')">' +
      '<div class="dc-card-top">' +
        '<span class="dc-flag">' + (countryFlags[d.country]||'▪') + '</span>' +
        '<div style="flex:1;min-width:0">' +
          '<div class="dc-name">' + (d.name||'') + '</div>' +
          '<div class="dc-location">📍 ' + (d.city||'') + (d.address ? ' · ' + d.address : '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="dc-tags">' +
        '<span class="badge badge-' + statusCls + '">' + statusLabel + '</span>' +
        (d.customer ? '<span class="dc-tag">🏢 ' + d.customer + '</span>' : '') +
      '</div>' +
      '<div class="dc-usage-row">' +
        '<span class="dc-usage-label">机柜</span>' +
        '<div class="dc-progress-sm"><div class="dc-progress-fill-sm" style="width:' + pct + '%;background:' + pctColor + '"></div></div>' +
        '<span class="dc-usage-nums">' + (d.rackCount||0) + '  ' + pct + '%</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

function goDetail(id) { window.location.href = 'datacenter-detail.html?id=' + id; }
function goTab(url) { window.location.href = url; }
function doLogout() { AIDC_API.logout(); window.location.href = 'login.html'; }

function debounce(fn, delay) {
  var t;
  return function() { var ctx=this, args=arguments; clearTimeout(t); t=setTimeout(function(){ fn.apply(ctx,args); }, delay); };
}
function showToast(msg, type) {
  var tc = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast toast-' + (type||'error');
  var icons = { success:'▪', error:'✕', warning:'⚠', info:'ℹ' };
  t.innerHTML = '<span>' + (icons[type]||'') + '</span> ' + msg;
  tc.appendChild(t);
  setTimeout(function() {
    t.classList.add('toast-fadeout');
    setTimeout(function(){ t.remove(); }, 300);
  }, type==='success' ? 2000 : 3000);
}
</script>
