<path d="M3.5 2.5L20.5 2.5L20.5 21.5L3.5 21.5L3.5 2.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

<path d="M20 21V19C20 16.7909 18.2091 15 16 15H8C5.79086 15 4 16.7909 4 19V21H20Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>

    <div class="drawer-nav">

<path d="M3.5 2.5L20.5 2.5L20.5 21.5L3.5 21.5L3.5 2.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
<path d="M8 8H16M8 12H16M8 16H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>机房列表</div>
      <div class="drawer-menu-item" onclick="Drawer.nav('datacenter-form.html')"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5L12 19M19 12L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>添加机房</div>
      <div class="drawer-menu-item" onclick="Drawer.nav('settings.html')"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path fill-rule="evenodd" clip-rule="evenodd" d="M20.6604 7L12.0001 2L3.33984 7V17L12.0001 22L20.6604 17V7ZM12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16Z" fill="none"/>
<path d="M16 12C16 14.2091 14.2091 16 12 16C9.79086 16 8 14.2091 8 12C8 9.79086 9.79086 8 12 8C14.2091 8 16 9.79086 16 12Z" fill="none"/>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="../js/api.js?v=20260413-7"></script>
<script src="../js/drawer.js?v=20260413-7"></script>
<script>
var dcId = null;
var dcData = null;

document.addEventListener('DOMContentLoaded', function() {
  Drawer.init();

  if (!AIDC_API.isLoggedIn()) {
    window.location.href = 'login.html';
    return;
  }
  dcId = new URLSearchParams(window.location.search).get('id');
  if (!dcId) {
    showToast('缺少参数');
    setTimeout(function(){ history.back(); }, 1500);
    return;
  }
  loadDetail();
});

async function loadDetail() {
  var res = await AIDC_API.getDatacenter(dcId);
  if (res.code !== 0) {
    showToast(res.message || '加载失败');
    return;
  }
  dcData = res.data;
  renderDetail(dcData);
}

function renderDetail(d) {
  if (!d) return;

  // Hero
  document.getElementById('heroName').textContent = d.name || '';
  document.getElementById('heroLocation').innerHTML = '📍 ' + (d.city||'') + (d.country ? ' · ' + d.country : '');
  document.getElementById('kpiTotal').textContent = d.rackCount || '–';
  document.getElementById('kpiUsed').textContent = d.powerPerRack ? d.powerPerRack + 'kW' : '–';
  document.getElementById('kpiPower').textContent = d.pue || '–';

  // 状态 badge
  var statusLabel = AIDC_API.getStatusLabel(d.status);
  var statusCls = AIDC_API.getStatusCls(d.status);
  var sBadge = '<span class="badge badge-' + statusCls + '">' + statusLabel + '</span>';
  var kycBadge = d.kycStatus ? '<span class="badge" style="background:rgba(255,255,255,0.15);color:#fff;">' + AIDC_API.getKycLabel(d.kycStatus) + '</span>' : '';
  document.getElementById('heroBadges').innerHTML = sBadge + kycBadge;

  // KPI 标签修正：第二个是"功率密度"而非"已用"，第三个是"PUE"而非"主电路"
  document.getElementById('kpiUsed').parentElement.querySelector('.detail-kpi-label').textContent = '功率密度';
  document.getElementById('kpiPower').parentElement.querySelector('.detail-kpi-label').textContent = 'PUE';

  // 备注
  var remarkEl = document.getElementById('remarkBlock');
  if (d.remark && d.remark.trim()) {
    document.getElementById('remarkText').textContent = d.remark;
    remarkEl.classList.remove('hidden');
  } else {
    remarkEl.classList.add('hidden');
  }

  // 折叠分组
  var groups = [
    { icon:'📍', title:'基础信息', rows:[
      ['机房名称', d.name], ['客户/业主', d.customer],
      ['国家', d.country], ['省/州', d.province],
      ['城市', d.city], ['地址', d.address],
      ['状态', statusLabel],
      ['创建人', d.createdByName], ['创建时间', formatTime(d.createdAt)],
      ['更新时间', formatTime(d.updatedAt)]
    ]},
    { icon:'🏢️', title:'机柜资源', rows:[
      ['机柜数量', d.rackCount ? d.rackCount + ' 柜' : ''],
      ['单柜功率', d.powerPerRack ? d.powerPerRack + ' kW' : ''],
    ]},
    { icon:'▪', title:'电力与效率', rows:[
      ['PUE', d.pue],
      ['KYC状态', AIDC_API.getKycLabel(d.kycStatus)]
    ]},
  ];

  // 过滤空行
  groups.forEach(function(g) {
    g.rows = g.rows.filter(function(r) { return r[1] !== undefined && r[1] !== null && r[1] !== ''; });
  });
  groups = groups.filter(function(g) { return g.rows.length > 0; });

  var el = document.getElementById('accordionGroups');
  el.innerHTML = groups.map(function(g, i) {
    var content = g.rows.map(function(r) {
      return '<div class="detail-row"><span class="detail-row-key">' + r[0] + '</span><span class="detail-row-val">' + r[1] + '</span></div>';
    }).join('');
    return '<div class="accordion-section">' +
      '<div class="accordion-header' + (i===0?' open':'') + '" onclick="toggleAccordion(this)">' +
        '<div class="accordion-title"><span class="accordion-icon">' + g.icon + '</span>' + g.title + '</div>' +
        '<span class="accordion-arrow">▼</span>' +
      '</div>' +
      '<div class="accordion-body"' + (i===0?' style="max-height:800px"':'') + '>' +
        content +
      '</div>' +
    '</div>';
  }).join('');

  // 操作日志
  var logRes = AIDC_API.getDatacenterChangelogs(dcId);
  var logs = logRes.data || [];
  var countEl = document.getElementById('logCount');
  if (countEl) countEl.textContent = logs.length;
  var logEl = document.getElementById('logList');
  if (!logEl) return;
  if (!logs.length) {
    logEl.innerHTML = '<div style="color:var(--c-text-muted);text-align:center;padding:16px">暂无操作记录</div>';
  } else {
    logEl.innerHTML = logs.map(function(log) {
      return '<div class="log-item" style="padding:8px 0;border-bottom:1px solid var(--c-border)">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<span style="font-weight:500">' + escHtml(log.content||'') + '</span>' +
          '<span style="font-size:11px;color:var(--c-text-muted)">' + escHtml(log.operatorName||'') + '</span>' +
        '</div>' +
        '<div style="font-size:11px;color:var(--c-text-muted);margin-top:2px">' + formatTime(log.createdAt) + '</div>' +
      '</div>';
    }).join('');
  }

  // 权限
  if (AIDC_API.isAdmin()) {
    var delBtn = document.getElementById('deleteBtn');
    if (delBtn) delBtn.classList.remove('hidden');
  }
}

function toggleAccordion(header) {
  var body = header.nextElementSibling;
  var isOpen = header.classList.contains('open');
  header.classList.toggle('open');
  body.style.maxHeight = isOpen ? '0' : body.scrollHeight + 'px';
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatTime(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

async function doEdit() {
  window.location.href = 'datacenter-form.html?id=' + dcId;
}

async function doDelete() {
  if (!confirm('确定删除该机房记录？')) return;
  var res = await AIDC_API.deleteDatacenter(dcId);
  if (res.code === 0) {
    showToast('已删除', 'success');
    setTimeout(function(){ window.location.href = 'datacenter-list.html'; }, 800);
  } else {
    showToast(res.message || '删除失败');
  }
}

function showToast(msg, type) {
  type = type || 'error';
  var tc = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.innerHTML = msg;
  tc.appendChild(t);
  setTimeout(function(){ t.classList.add('toast-fadeout'); setTimeout(function(){ t.remove(); }, 300); }, 2000);
}
</script>
