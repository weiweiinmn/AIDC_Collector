<script>
// ── 初始化 ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  Drawer.init();
  if (!AIDC_API.isLoggedIn()) {
    window.location.href = 'login.html';
    return;
  }
  var user = AIDC_API.getUser();
  renderUser(user);
  loadStats();
});

function renderUser(user) {
  var hour = new Date().getHours();
  var greet = hour < 12 ? '早上好' : hour < 18 ? '下午好' : '晚上好';
  document.getElementById('greetingText').textContent = greet;
  document.getElementById('userName').textContent = user.name || '用户';
  document.getElementById('currentDate').textContent = formatDate(new Date());
  var roleMap = { admin:'管理员', manager:'BD经理', user:'商务拓展' };
  document.getElementById('roleBadge').textContent = roleMap[user.role] || '商务拓展';
  document.getElementById('drawerName').textContent = user.name || '用户';
  document.getElementById('drawerRole').textContent = roleMap[user.role] || '商务拓展';
}

function formatDate(d) {
  var w = ['周日','周一','周二','周三','周四','周五','周六'];
  return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日 ' + w[d.getDay()];
}

async function loadStats() {
  console.log('[DEBUG] loadStats called');
  try {
    var res = await AIDC_API.getStats();
    if (res.code !== 0) { console.error('[ERROR] getStats failed:', res.message); return; }
    var s = res.data || {};
    var dist = s.statusDist || {};

    // 四个统计：总数 / 本周新增 / 已签约 / 总电力
    document.getElementById('statTotal').textContent = s.total || 0;
    document.getElementById('statIdle').textContent = dist.new || 0;   // API 的 new = 本周新增
    document.getElementById('statRented').textContent = dist.signed || 0;

    // 合计电力（功率密度 × 机柜数）
    var allRes = await AIDC_API.getDatacenters();
    var all = (allRes.data && allRes.data.list) ? allRes.data.list : [];
    var totalPower = 0;
    all.forEach(function(d) { totalPower += (d.powerPerRack || 0) * (d.rackCount || 0); });
    document.getElementById('statPower').textContent = totalPower >= 1000
      ? (totalPower / 1000).toFixed(1) + 'GW'
      : totalPower + 'MW';

    // ── 待跟进 ─────────────────────────────────────────
    var taskSection = document.getElementById('taskSection');
    var taskListEl = document.getElementById('taskList');
    var tasks = [];
    all.forEach(function(d) {
      if (!d) return;
      // 签约推进中 / 商务跟进中
      if (d.status === 'in_progress' || d.status === 'negotiating') {
        var label = d.status === 'in_progress' ? '签约推进中' : '商务跟进中';
        tasks.push({ id: d.id, name: d.name||'', city: d.city||'', status: d.status, label: label, color: '#D97706' });
      }
      // KYC 进行中
      var kyc = ((d.kycRemark||'') + (d.remark||'')).toLowerCase();
      if (kyc.includes('进行') || kyc.includes('pending') || kyc.includes('待') || kyc.includes('kyc')) {
        tasks.push({ id: d.id, name: d.name||'', city: d.city||'', status: d.status, label: 'KYC 进行中', color: '#2563EB' });
      }
      // 已签约但无电力配置
      if (d.status === 'signed' && (!d.powerCapacity || d.powerCapacity < 100)) {
        tasks.push({ id: d.id, name: d.name||'', city: d.city||'', status: d.status, label: '电力待配置', color: '#DC2626' });
      }
    });

    if (taskSection && taskListEl) {
      if (tasks.length === 0) {
        taskSection.style.display = 'none';
      } else {
        taskSection.style.display = 'block';
        taskListEl.innerHTML = tasks.slice(0, 5).map(function(t) {
          var sl = AIDC_API.getStatusLabel(t.status);
          var sc = AIDC_API.getStatusCls(t.status);
          return '<div class="dc-card" onclick="goDetail(\'' + t.id + '\')" style="cursor:pointer">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">' +
              '<div style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;font-size:14px">' + t.name + '</div>' +
              '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;background:' + t.color + ';color:#fff;flex-shrink:0;letter-spacing:0.02em">' + t.label + '</span>' +
            '</div>' +
            '<div style="font-size:12px;color:var(--c-text-secondary);margin-top:5px">' +
              '<span class="badge badge-' + sc + '">' + sl + '</span>' +
              '<span style="margin-left:8px">' + t.city + '</span>' +
            '</div>' +
          '</div>';
        }).join('');
      }
    }

    // 国家分布
    var countryDist = {};
    all.forEach(function(d) {
      if (d.country) countryDist[d.country] = (countryDist[d.country] || 0) + 1;
    });
    var maxCount = Math.max.apply(null, Object.values(countryDist).concat([1]));
    var countryBarsEl = document.getElementById('countryBars');
    if (countryBarsEl) {
      var flagMap = {'中国':'🇨🇳','新加坡':'🇸🇬','泰国':'🇹🇭','印尼':'🇮🇩','菲律宾':'🇵🇭','日本':'🇯🇵','澳大利亚':'🇦🇺','马来西亚':'🇲🇾','越南':'🇻🇳','印度':'🇮🇳','韩国':'🇰🇷'};
      countryBarsEl.innerHTML = Object.keys(countryDist).sort(function(a,b){ return countryDist[b] - countryDist[a]; }).map(function(c) {
        var pct = Math.round(countryDist[c] / maxCount * 100);
        return '<div class="country-bar-item">' +
          '<span class="country-flag">' + (flagMap[c]||'') + '</span>' +
          '<span class="country-name">' + c + '</span>' +
          '<div class="country-bar-wrap"><div class="country-bar-fill" style="width:' + pct + '%"></div></div>' +
          '<span class="country-count">' + countryDist[c] + '</span>' +
        '</div>';
      }).join('');
    }

    // 最近3条
    var list = all.slice(0, 3);
    var listEl = document.getElementById('recentList');
    if (!list.length) {
      listEl.innerHTML = '<div style="text-align:center;color:var(--c-text-muted);padding:20px">暂无数据</div>';
      return;
    }
    listEl.innerHTML = list.map(function(d) {
      var statusLabel = AIDC_API.getStatusLabel(d.status);
      var statusCls = AIDC_API.getStatusCls(d.status);
      return '<div class="recent-item" onclick="goDetail(\'' + d.id + '\')">' +
        '<div class="recent-name">' + (d.name||'') + '</div>' +
        '<div class="recent-meta">' +
          '<span class="badge badge-' + statusCls + '">' + statusLabel + '</span>' +
          '<span style="color:var(--c-text-muted);font-size:12px">' + (d.city||'') + '</span>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    console.error('[loadStats ERROR]', e);
  }
}

function goDetail(id) { window.location.href = 'datacenter-detail.html?id=' + id; }

function goList(status) {
  var url = 'datacenter-list.html';
  if (status) url += '?status=' + encodeURIComponent(status);
  window.location.href = url;
}

function doLogout() {
  AIDC_API.logout();
  window.location.href = 'login.html';
}
</script>
</body>
</html>
